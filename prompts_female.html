<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — Женская фотосессия с ИИ</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #201F28;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            position: sticky;
            top: 0;
            background: #201F28;
            z-index: 10;
        }
        .logo-pb {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
        }
        .logo-pb .p { color: #00CBF5; }
        .logo-pb .b { color: #14E9FC; }
        .logo-sub {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .logo-sub .photo { color: #00CBF5; }
        .logo-sub .bot { color: #14E9FC; }
        .header h1 {
            font-size: 20px;
            color: #fff;
            font-weight: 600;
            margin-top: 8px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 16px 60px;
        }
        .prompt-card {
            margin-bottom: 32px;
            background: #222;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2A2A2A;
        }
        .prompt-card .image-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 14px;
        }
        .prompt-card .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .prompt-card .card-body {
            padding: 16px;
        }
        .prompt-card .card-number {
            color: #00CBF5;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .prompt-card textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #ddd;
            padding: 12px;
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
            outline: none;
            transition: 0.2s;
        }
        .prompt-card textarea:focus { border-color: #00CBF5; }
        .prompt-card .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .prompt-card .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Montserrat', sans-serif;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-align: center;
        }
        .btn-copy {
            background: #00CBF5;
            color: #201F28;
        }
        .btn-copy:hover { background: #14E9FC; }
        .btn-telegram {
            background: #2A2A2A;
            color: #fff;
            border: 1px solid #444;
        }
        .btn-telegram:hover { background: #333; border-color: #00CBF5; }
        .btn-app {
            background: #2A2A2A;
            color: #666;
            border: 1px solid #333;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #00CBF5;
            color: #201F28;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .back-link {
            display: block;
            text-align: center;
            padding: 20px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
        .back-link:hover { color: #00CBF5; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-pb"><span class="p">P</span><span class="b">B</span></div>
        <div class="logo-sub"><span class="photo">Photo</span><span class="bot">Bot</span></div>
        <h1>🌸 Женская фотосессия с ИИ<br>10 промтов для создания женских образов</h1>
    </div>

    <div class="container" id="container"></div>

    <a href="prompts.html" class="back-link">← К базе промтов</a>
    <div class="toast" id="toast">Скопировано!</div>

    <script>
        const prompts = [
            { img: "prompts_img/female_1.jpg", text: "" },
            { img: "prompts_img/female_2.jpg", text: "" },
            { img: "prompts_img/female_3.jpg", text: "" },
            { img: "prompts_img/female_4.jpg", text: "" },
            { img: "prompts_img/female_5.jpg", text: "" },
            { img: "prompts_img/female_6.jpg", text: "" },
            { img: "prompts_img/female_7.jpg", text: "" },
            { img: "prompts_img/female_8.jpg", text: "" },
            { img: "prompts_img/female_9.jpg", text: "" },
            { img: "prompts_img/female_10.jpg", text: "" }
        ];

        const container = document.getElementById('container');
        prompts.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `
                <div class="image-placeholder">
                    ${item.img ? `<img src="${item.img}" alt="Пример #${i + 1}" onerror="this.parentElement.innerHTML='🖼️ Пример #${i + 1}'">` : `🖼️ Пример #${i + 1}`}
                </div>
                <div class="card-body">
                    <div class="card-number">#${i + 1}</div>
                    <textarea placeholder="Введите промт...">${item.text}</textarea>
                    <div class="card-actions">
                        <button class="btn btn-copy" onclick="copyPrompt(this)">📋 Скопировать</button>
                        <a class="btn btn-telegram" href="https://t.me/PhotoDocumentsBot_bot" target="_blank">✈️ Скопировать в Telegram</a>
                        <button class="btn btn-app" disabled>📱 Будет доступно позже</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        function copyPrompt(btn) {
            const textarea = btn.parentElement.parentElement.querySelector('textarea');
            navigator.clipboard.writeText(textarea.value || textarea.placeholder);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }
    </script>
</body>
</html>

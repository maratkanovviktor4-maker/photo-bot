<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — DeepSeek V4 Flash</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #201F28;
            color: #fff;
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 260px;
            background: #1A1A2E;
            display: flex;
            flex-direction: column;
            padding: 16px;
            border-right: 1px solid #2A2A2A;
            flex-shrink: 0;
        }
        .sidebar .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .sidebar .logo-row img { height: 32px; }
        .sidebar .logo-row span { font-weight: 700; font-size: 16px; color: #00CBF5; }
        .sidebar .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: #00CBF5;
            color: #201F28;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 16px;
        }
        .sidebar .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        .sidebar .chat-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar .chat-item:hover { background: #2A2A2A; color: #fff; }
        .sidebar .chat-item.active { background: #2A2A2A; color: #fff; }
        .sidebar .back-link {
            margin-top: auto;
            text-align: center;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
        .sidebar .back-link:hover { color: #00CBF5; }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid #2A2A2A;
        }
        .top-bar .model-badge {
            background: #2A2A2A;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Montserrat', sans-serif;
        }
        .top-bar .model-badge.active { background: #00CBF5; color: #201F28; }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: #2A2A2A;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1A1A2E;
            border: 1px solid #2A2A2A;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #2A2A2A;
            display: flex;
            gap: 10px;
        }
        .input-area textarea {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #2A2A2A;
            background: #1A1A2E;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            outline: none;
            resize: none;
            height: 44px;
        }
        .input-area textarea:focus { border-color: #00CBF5; }
        .input-area button {
            padding: 10px 20px;
            background: #00CBF5;
            color: #201F28;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-row">
            <img src="deepseek_flash.png" alt="Flash">
            <span>V4 Flash</span>
        </div>
        <button class="new-chat-btn" onclick="newChat()">+ Новый чат</button>
        <div class="chat-list" id="chatList"></div>
        <a href="index.html" class="back-link">← На главную</a>
    </div>
    <div class="main">
        <div class="top-bar">
            <button class="model-badge active" onclick="setMode('chat')">💬 Chat</button>
            <button class="model-badge" onclick="setMode('reasoner')">🧠 Reasoner</button>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="message assistant">👋 Привет! Я DeepSeek V4 Flash. Задайте любой вопрос.</div>
        </div>
        <div class="input-area">
            <textarea id="userInput" placeholder="Введите сообщение..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://api.фото-бот.рф";
        let currentMode = 'chat';
        let chats = [];
        let currentChatId = null;
        let sessionToken = '';
        let currentUserId = null;

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            loadChats();
        }

        function loadChats() {
            const saved = localStorage.getItem('v4flash_chats');
            if (saved) {
                chats = JSON.parse(saved);
                renderChatList();
                if (chats.length > 0) {
                    openChat(chats[0].id);
                }
            }
        }

        function saveChats() {
            localStorage.setItem('v4flash_chats', JSON.stringify(chats));
        }

        function newChat() {
            const chat = { id: Date.now(), title: 'Новый чат', messages: [] };
            chats.unshift(chat);
            currentChatId = chat.id;
            saveChats();
            renderChatList();
            renderMessages();
        }

        function openChat(id) {
            currentChatId = id;
            renderChatList();
            renderMessages();
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => 
                `<div class="chat-item${c.id === currentChatId ? ' active' : ''}" onclick="openChat(${c.id})">${c.title}</div>`
            ).join('');
        }

        function renderMessages() {
            const chat = chats.find(c => c.id === currentChatId);
            const area = document.getElementById('chatArea');
            if (!chat || chat.messages.length === 0) {
                area.innerHTML = '<div class="message assistant">👋 Привет! Я DeepSeek V4 Flash. Задайте любой вопрос.</div>';
            } else {
                area.innerHTML = chat.messages.map(m => 
                    `<div class="message ${m.role}">${escapeHtml(m.content)}</div>`
                ).join('');
            }
            area.scrollTop = area.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.model-badge').forEach(b => b.classList.remove('active'));
            document.querySelector(`.model-badge[onclick="setMode('${mode}')"]`).classList.add('active');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            if (!currentUserId) { alert('Авторизуйтесь на главной странице'); return; }

            if (!currentChatId) newChat();
            input.value = '';

            const chat = chats.find(c => c.id === currentChatId);
            chat.messages.push({ role: 'user', content: text });
            if (chat.title === 'Новый чат' && chat.messages.length === 1) {
                chat.title = text.substring(0, 30);
            }
            saveChats();
            renderChatList();
            renderMessages();

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.textContent = '...';
            document.getElementById('chatArea').appendChild(typingDiv);

            try {
                const body = {
                    user_id: currentUserId,
                    message: text,
                    model: 'flash',
                    mode: currentMode
                };
                const resp = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify(body)
                });
                const data = await resp.json();
                typingDiv.remove();
                if (data.reply) {
                    chat.messages.push({ role: 'assistant', content: data.reply });
                    saveChats();
                    renderMessages();
                } else {
                    chat.messages.push({ role: 'assistant', content: 'Ошибка. Попробуйте позже.' });
                    saveChats();
                    renderMessages();
                }
            } catch (e) {
                typingDiv.remove();
                chat.messages.push({ role: 'assistant', content: 'Ошибка соединения.' });
                saveChats();
                renderMessages();
            }
        }
    </script>
</body>
</html>

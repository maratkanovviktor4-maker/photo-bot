    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Свернуть панель" style="position:fixed;top:64px;left:232px;width:28px;height:28px;background:var(--dsw-specific-selector);backdrop-filter:blur(10px);border:1px solid var(--dsw-alias-border-l2);border-radius:8px;color:var(--dsw-alias-label-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;transition:left 0.3s ease;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="sidebar">
        <div class="logo-row">
            <img src="deepseek_logo.png" alt="DeepSeek Flash" onerror="this.style.display='none'" style="height:32px;">
            <span class="logo-text">V4 Flash</span>
        </div>
        <div class="search-row">
            <input class="chat-search" id="chatSearch" placeholder="Поиск чата..." oninput="filterChats()">
        </div>
        <button class="new-chat" onclick="newChat()">Новый чат</button>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <a href="index.html">На главную</a>
        </div>
    </div>
    <div class="main">
        <div class="top-bar">
            <span id="balanceDisplay"> ...</span>
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle" style="margin-left:auto;">☀️</button>
        </div>
        <div class="chat-wrapper">
            <div class="chat-area" id="chatArea">
                <div class="empty-state" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dsw-alias-label-tertiary);">
                    <img src="deepseek_logo.png" style="height:60px;opacity:0.6;" onerror="this.style.display='none'">
                    <div class="title" style="font-size:22px;font-weight:600;color:var(--dsw-alias-label-secondary);">DeepSeek V4 Flash</div>
                    <div style="color:var(--dsw-alias-label-caption);font-size:13px;">Задайте любой вопрос или прикрепите файл</div>
                </div>
            </div>
            <div class="input-area" id="inputArea">
                <div id="dropZone" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;display:none;align-items:center;justify-content:center;background:var(--dsw-alias-interactive-bg-hover);border:2px dashed var(--dsw-alias-brand-primary);border-radius:10px;font-size:14px;color:var(--dsw-alias-brand-primary);">Отпустите файл для загрузки</div>
                <div class="file-list" id="fileList" style="width:100%;display:flex;flex-wrap:wrap;gap:4px;padding:6px 6px 0 6px;"></div>
                <div class="input-row-wrapper">
                    <div class="input-row">
                        <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
                        <textarea id="userInput" placeholder="Введите сообщение..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();if(isSending){stopTyping();}else{sendMessage();}}" oninput="this.style.height='auto';var h=this.scrollHeight;this.style.height=Math.min(h,300)+'px';" onfocus="if(!this._init){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,300)+'px';this._init=true;}"></textarea>
                    </div>
                    <div class="input-toolbar">
                        <button class="mode-btn" id="reasonerToggle" onclick="toggleReasoner()" style="font-size:11px;padding:4px 10px;">Reasoner</button>
                        <span class="file-name-inline" id="fileNameInline"></span>
                        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
                        <button id="sendBtn" onclick="sendMessage()" title="Отправить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
                    </div>
                </div>
            </div>
            <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom()">↓</button>
        </div>
        <div class="nav-strip" id="navStrip" onmouseenter="showNavStrip(event)" onmouseleave="hideNavStrip()"></div>
    </div>

    <script>
        var autoScroll = true;
        const SERVER_URL = CONFIG.SERVER_URL;
        let currentMode = 'chat';
        let chats = [];
        let currentChatId = null;
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let typingInterval = null;
        let pendingFile = null;
        let activeStreamId = null;

        window.addEventListener('wheel', function(e) {
            const area = document.getElementById('chatArea');
            if (!area || isSending) return;
            const target = e.target;
            if (target && (target.closest('.chat-list') || target.closest('.chat-menu-dropdown') || target.closest('.sidebar'))) return;
            if (target && target.closest('#userInput')) return;
            area.scrollTop += e.deltaY;
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
        window.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); });
        function toggleTheme() {
            document.body.classList.toggle('light');
            document.body.toggleAttribute('data-ds-dark-theme');
            var isDark = document.body.hasAttribute('data-ds-dark-theme');
            localStorage.setItem('photobot_theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
        }
        (function() {
            var saved = localStorage.getItem('photobot_theme');
            if (saved === 'dark') {
                document.body.setAttribute('data-ds-dark-theme', '');
                document.getElementById('themeToggle').textContent = '☀️';
            } else {
                document.body.removeAttribute('data-ds-dark-theme');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            var savedMode = localStorage.getItem('photobot_mode');
            if (savedMode === 'reasoner') {
                currentMode = 'reasoner';
                var btn = document.getElementById('reasonerToggle');
                if (btn) btn.classList.add('active');
            }
        })();

        function scrollToBottom() {
            var area = document.getElementById('chatArea');
            area.scrollTop = area.scrollHeight;
            autoScroll = true;
        }

        document.addEventListener('scroll', function(e) {
            var btn = document.getElementById('scrollBottomBtn');
            var area = document.getElementById('chatArea');
            if (!area) return;
            var atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 300;
            if (atBottom) {
                btn.style.display = 'none';
                autoScroll = true;
            } else {
                btn.style.display = 'flex';
                autoScroll = false;
            }
        }, true);

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            if (!sessionToken || !currentUserId) {
                alert('Сессия устарела. Авторизуйтесь заново на главной странице.');
                window.location.href = 'index.html';
            } else {
                loadChatsFromServer();
                updateBalance();
            }
        } else {
            alert('Авторизуйтесь на главной странице');
            window.location.href = 'index.html';
        }

        async function loadChatsFromServer() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_chat_history?user_id=${currentUserId}&model=flash&session_token=${sessionToken}`);
                if (resp.status === 403) { alert('Сессия устарела. Авторизуйтесь заново.'); window.location.href = 'index.html'; return; }
                const data = await resp.json();
                if (data.history) {
                    chats = [];
                    for (const [chatId, messages] of Object.entries(data.history)) {
                        const title = data.titles && data.titles[chatId] ? data.titles[chatId] : ('Чат ' + chatId);
                        chats.push({ id: chatId, title: title, messages: messages });
                    }
                    chats.sort((a, b) => a.id.localeCompare(b.id));
                }
            } catch (e) { console.error(e); }
            if (chats.length === 0) { const chat = { id: String(Date.now()), title: 'Новый чат', messages: [] }; chats.push(chat); }
            renderChatList();
            currentChatId = chats[chats.length - 1].id;
            openChat(currentChatId);
        }
        async function updateBalance() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_balance?user_id=${currentUserId}&session_token=${sessionToken}`);
                if (resp.ok) { const data = await resp.json(); document.getElementById('balanceDisplay').textContent = `${data.flash.toFixed(1)} Stars`; }
            } catch(e) { console.error(e); }
        }
        function escapeHtml(text) { return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        function newChat() { const chat = { id: Date.now().toString(), title: 'Новый чат', messages: [] }; chats.push(chat); currentChatId = chat.id; renderChatList(); renderMessages(); }
        function openChat(id) { currentChatId = id; renderChatList(); renderMessages(); setTimeout(function() { var area = document.getElementById('chatArea'); if (area) area.scrollTop = area.scrollHeight; }, 150); }
        function toggleChatMenu(e, id) { e.stopPropagation(); document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show')); const dropdown = document.getElementById('menu_' + id); if (dropdown) dropdown.classList.toggle('show'); }
        async function renameChat(id) { const chat = chats.find(c => c.id === id); const newName = prompt('Новое название:', chat?.title || ''); if (newName && chat) { chat.title = newName; renderChatList(); try { await fetch(`${SERVER_URL}/rename_chat`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken }, body: JSON.stringify({ user_id: currentUserId, model: 'flash', chat_id: String(id), title: newName }) }); } catch (e) {} } }
        async function deleteChat(id) { if (!confirm('Удалить чат?')) return; try { await fetch(`${SERVER_URL}/delete_chat?user_id=${currentUserId}&model=flash&chat_id=${id}&session_token=${sessionToken}`, { method: 'DELETE' }); } catch (e) {} chats = chats.filter(c => c.id !== id); if (currentChatId === id) currentChatId = chats.length > 0 ? chats[chats.length - 1].id : null; renderChatList(); renderMessages(); document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show')); }
        function renderChatList() { const list = document.getElementById('chatList'); list.innerHTML = chats.map(c => `<div class="chat-item${c.id === currentChatId ? ' active' : ''}" onclick="openChat('${c.id}')"><span class="chat-name">${c.title}</span><button class="chat-menu-btn" onclick="toggleChatMenu(event, '${c.id}')">...</button><div class="chat-menu-dropdown" id="menu_${c.id}"><button onclick="renameChat('${c.id}')">Переименовать</button><button class="delete" onclick="deleteChat('${c.id}')">Удалить</button></div></div>`).join(''); }
        function filterChats() { var query = document.getElementById('chatSearch').value.toLowerCase(); document.querySelectorAll('.chat-item').forEach(function(item) { var name = item.querySelector('.chat-name').textContent.toLowerCase(); item.style.display = name.includes(query) ? 'flex' : 'none'; }); }
        function toggleSidebar() { var sidebar = document.querySelector('.sidebar'); var toggle = document.getElementById('sidebarToggle'); sidebar.classList.toggle('collapsed'); document.body.classList.toggle('collapsed-sidebar'); if (sidebar.classList.contains('collapsed')) { toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'; toggle.title = 'Развернуть панель'; toggle.style.left = '8px'; } else { toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>'; toggle.title = 'Свернуть панель'; toggle.style.left = '232px'; } }
        function renderMessages() {
            const chat = chats.find(c => c.id === currentChatId);
            const area = document.getElementById('chatArea');
            if (!chat || chat.messages.length === 0) {
                area.innerHTML = `<div class="empty-state" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dsw-alias-label-tertiary);"><img src="deepseek_logo.png" style="height:60px;opacity:0.6;" onerror="this.style.display='none'"><div style="font-size:22px;font-weight:600;color:var(--dsw-alias-label-secondary);">DeepSeek V4 Flash</div><div style="color:var(--dsw-alias-label-caption);font-size:13px;">Задайте любой вопрос или прикрепите файл</div></div>`;
            } else {
                area.innerHTML = chat.messages.map((m, i) => {
                    let actionsHtml = '<div class="message-actions" style="display:flex;gap:6px;margin-top:6px;">';
                    if (m.role === 'user') {
                        actionsHtml += `<button onclick="editMessage(${i})" style="background:transparent;border:none;color:var(--dsw-alias-label-tertiary);cursor:pointer;padding:6px 8px;border-radius:8px;font-family:Inter,sans-serif;display:inline-flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>`;
                        actionsHtml += `<button onclick="copyMessage(${i})" id="copy-btn-${i}" style="background:transparent;border:none;color:var(--dsw-alias-label-tertiary);cursor:pointer;padding:6px 8px;border-radius:8px;font-family:Inter,sans-serif;display:inline-flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
                    } else {
                        actionsHtml += `<button onclick="copyMessage(${i})" id="copy-btn-${i}" style="background:transparent;border:none;color:var(--dsw-alias-label-tertiary);cursor:pointer;padding:6px 8px;border-radius:8px;font-family:Inter,sans-serif;display:inline-flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
                        if (m.interrupted) actionsHtml += `<button onclick="continueMessage(${i})" style="background:transparent;border:none;color:var(--dsw-alias-label-tertiary);cursor:pointer;padding:6px 8px;border-radius:8px;font-family:Inter,sans-serif;display:inline-flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>`;
                    }
                    actionsHtml += '</div>';
                    return `<div class="message-row ${m.role}"><div><div class="message-content">${formatMessage(m.content)}</div>${actionsHtml}</div></div>`;
                }).join('');
            }
            setTimeout(function() { var area = document.getElementById('chatArea'); if (area) area.scrollTop = area.scrollHeight; hljs.highlightAll(); buildNavDots(); }, 100);
        }
        function copyMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            navigator.clipboard.writeText(chat.messages[index].content);
            const btn = document.getElementById('copy-btn-' + index);
            if (btn) {
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                setTimeout(function() { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></svg>'; }, 2000);
            }
        }
        function editMessage(index) { const chat = chats.find(c => c.id === currentChatId); if (chat) { var input = document.getElementById('userInput'); input.value = chat.messages[index].content; input.focus(); input.dispatchEvent(new Event('input', { bubbles: true })); } }
        function toggleReasoner() { if (currentMode === 'reasoner') { currentMode = 'chat'; document.getElementById('reasonerToggle').classList.remove('active'); } else { currentMode = 'reasoner'; document.getElementById('reasonerToggle').classList.add('active'); } localStorage.setItem('photobot_mode', currentMode); }
        function autoNameChat(chat) { const lastAssistant = [...chat.messages].reverse().find(m => m.role === 'assistant'); if (lastAssistant && chat.title.startsWith('Чат ')) { chat.title = lastAssistant.content.replace(/[#*`>\n]/g, ' ').split(' ').slice(0, 6).join(' ') || 'Новый чат'; if (chat.title.length > 40) chat.title = chat.title.substring(0, 40) + '...'; } }
        function updateFileList() { const inline = document.getElementById('fileNameInline'); if (!pendingFile) { if (inline) inline.innerHTML = ''; return; } if (inline) inline.innerHTML = '📎 ' + escapeHtml(pendingFile.name) + ' <button onclick="pendingFile=null;updateFileList();" style="background:transparent;border:none;color:#e74c3c;cursor:pointer;font-size:14px;padding:0;line-height:1;">✕</button>'; }
        async function handleFileSelect(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(ev) { const base64 = ev.target.result.split(',')[1]; pendingFile = { name: file.name, mime: file.type, data: base64 }; updateFileList(); }; reader.readAsDataURL(file); document.getElementById('fileInput').value = ''; }
        function setupDragDrop() { const inputArea = document.getElementById('inputArea'); const dropZone = document.getElementById('dropZone'); if (!inputArea || !dropZone) return; ['dragenter','dragover','dragleave','drop'].forEach(eventName => { inputArea.addEventListener(eventName, function(e) { e.preventDefault(); e.stopPropagation(); }); }); ['dragenter','dragover'].forEach(eventName => { inputArea.addEventListener(eventName, function() { dropZone.style.display = 'flex'; }); }); ['dragleave','drop'].forEach(eventName => { inputArea.addEventListener(eventName, function() { dropZone.style.display = 'none'; }); }); inputArea.addEventListener('drop', function(e) { const files = e.dataTransfer.files; if (files.length > 0) { const file = files[0]; const reader = new FileReader(); reader.onload = function(ev) { const base64 = ev.target.result.split(',')[1]; pendingFile = { name: file.name, mime: file.type, data: base64 }; updateFileList(); }; reader.readAsDataURL(file); } }); }
        function setupPaste() { const userInput = document.getElementById('userInput'); if (!userInput) return; userInput.addEventListener('paste', function(e) { const items = e.clipboardData.items; for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf('image') !== -1) { e.preventDefault(); const blob = items[i].getAsFile(); const reader = new FileReader(); reader.onload = function(ev) { const base64 = ev.target.result.split(',')[1]; pendingFile = { name: 'screenshot.png', mime: blob.type, data: base64 }; updateFileList(); }; reader.readAsDataURL(blob); break; } } }); }
        setupDragDrop(); setupPaste();
        var input = document.getElementById('userInput');
        var btn = document.getElementById('sendBtn');
        function updateSendBtn() { var hasText = input.value.trim().length > 0; var hasFile = pendingFile !== null; btn.disabled = !(hasText || hasFile); }
        input.addEventListener('input', updateSendBtn); updateSendBtn();
        function sendBtnArrow() { var btn = document.getElementById('sendBtn'); btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>'; btn.onclick = sendMessage; }
        function sendBtnStop() { var btn = document.getElementById('sendBtn'); btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>'; btn.onclick = function() { stopTyping(); }; }
        async function sendMessage() {
            if (isSending) return;
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !pendingFile) return;
            if (!currentUserId) { alert('Авторизуйтесь на главной странице'); return; }
            if (!currentChatId) { newChat(); }
            input.value = ''; input.style.height = 'auto'; input._init = false;
            isSending = true;
            if (typingInterval) { clearTimeout(typingInterval); typingInterval = null; }
            sendBtnStop();
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            var lastMsg = chat.messages[chat.messages.length - 1];
            if (lastMsg && lastMsg.role === 'assistant' && lastMsg.interrupted) { lastMsg.interrupted = false; lastMsg.finished = true; lastMsg._streamWords = undefined; lastMsg._streamPos = undefined; }
            let displayText = text || (pendingFile ? '[Файл: ' + pendingFile.name + ']' : '');
            chat.messages.push({ role: 'user', content: displayText });
            renderChatList(); renderMessages();
            const placeholderId = 'msg_' + Date.now();
            const area = document.getElementById('chatArea');
            const typingRow = document.createElement('div');
            typingRow.className = 'message-row assistant'; typingRow.id = placeholderId;
            typingRow.innerHTML = '<div><div class="message-content"><svg width="40" height="8" viewBox="0 0 40 8"><circle cx="4" cy="4" r="3" fill="var(--dsw-alias-brand-primary)"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle><circle cx="16" cy="4" r="3" fill="var(--dsw-alias-brand-primary)"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="28" cy="4" r="3" fill="var(--dsw-alias-brand-primary)"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle></svg></div></div>';
            area.appendChild(typingRow); area.scrollTop = area.scrollHeight;
            try {
                const resp = await fetch(`${SERVER_URL}/chat`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken }, body: JSON.stringify({ user_id: currentUserId, message: text, model: 'flash', mode: currentMode, chat_id: currentChatId, file_data: pendingFile ? pendingFile.data : '', file_name: pendingFile ? pendingFile.name : '', file_mime: pendingFile ? pendingFile.mime : '' }) });
                const el = document.getElementById(placeholderId); if (el) el.remove();
                if (resp.status === 403) { chat.messages.push({ role: 'assistant', content: 'Сессия устарела. Авторизуйтесь заново на главной странице.' }); renderMessages(); isSending = false; sendBtnArrow(); activeStreamId = null; return; }
                if (resp.status === 402) { const data = await resp.json(); chat.messages.push({ role: 'assistant', content: 'Недостаточно средств.' }); renderMessages(); updateBalance(); isSending = false; sendBtnArrow(); activeStreamId = null; return; }
                if (!resp.ok) { chat.messages.push({ role: 'assistant', content: 'Ошибка сервера. Попробуйте позже.' }); renderMessages(); isSending = false; sendBtnArrow(); activeStreamId = null; return; }
                const data = await resp.json();
                if (data.reply) {
                    const fullContent = data.reasoning ? 'Размышление:\n' + data.reasoning + '\n\nОтвет:\n' + data.reply : data.reply;
                    chat.messages.push({ role: 'assistant', content: '', finished: false, _streamWords: null, _streamPos: 0 });
                    const msgIndex = chat.messages.length - 1;
                    const streamId = 'stream_' + msgIndex;
                    activeStreamId = streamId;
                    renderChatList();
                    const area2 = document.getElementById('chatArea');
                    const newRow = document.createElement('div');
                    newRow.className = 'message-row assistant';
                    newRow.innerHTML = '<div><div class="message-content" id="stream-' + msgIndex + '"></div><div class="message-actions" id="actions-' + msgIndex + '" style="display:flex;gap:6px;margin-top:6px;"><button onclick="copyMessage(' + msgIndex + ')" id="copy-btn-' + msgIndex + '" style="background:transparent;border:none;color:var(--dsw-alias-label-tertiary);cursor:pointer;padding:6px 8px;border-radius:8px;font-family:Inter,sans-serif;display:inline-flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div></div>';
                    area2.appendChild(newRow);
                    let pos = 0;
                    const streamDiv = document.getElementById('stream-' + msgIndex);
                    const streamAction = document.getElementById('actions-' + msgIndex);
                    const words = fullContent.split(/(\s+)/);
                    chat.messages[msgIndex]._streamWords = words;
                    function streamNext() {
                        if (activeStreamId !== streamId) return;
                        let chunk = ''; let wordCount = 0;
                        while (pos < words.length && wordCount < 2) { chunk += words[pos]; wordCount++; pos++; }
                        chat.messages[msgIndex]._streamPos = pos;
                        if (chunk) {
                            chat.messages[msgIndex].content = words.slice(0, pos).join('');
                            streamDiv.innerHTML = formatMessage(chat.messages[msgIndex].content);
                            streamDiv.querySelectorAll('pre code').forEach(function(block) { hljs.highlightElement(block); });
                            if (autoScroll) { document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight; }
                            typingInterval = setTimeout(streamNext, 20);
                        } else {
                            chat.messages[msgIndex].finished = true;
                            chat.messages[msgIndex].interrupted = false;
                            typingInterval = null;
                            streamAction.innerHTML = '<button onclick="copyMessage(' + msgIndex + ')" id="copy-btn-' + msgIndex + '" style="background:transparent;border:none;color:var(--dsw-alias-label-tertiary);cursor:pointer;padding:6px 8px;border-radius:8px;font-family:Inter,sans-serif;display:inline-flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';

                const el = document.getElementById(placeholderId); if (el) el.remove();

            }
            pendingFile = null; updateFileList(); updateBalance();
        }
        function formatMessage(text) {
            var B = String.fromCharCode(96);
            if (/^\s*<(!DOCTYPE|html)/i.test(text)) { text = B + B + B + 'html\n' + text + '\n' + B + B + B; }
            let parts = []; let lastIndex = 0;
            const regex = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) parts.push({type: 'text', content: text.substring(lastIndex, match.index)});
                parts.push({type: 'code', lang: match[1], content: match[2]});
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) parts.push({type: 'text', content: text.substring(lastIndex)});
            let result = '';
            for (const part of parts) {
                if (part.type === 'code') { var lang = part.lang || ''; result += '<pre><code class="' + (lang ? 'language-' + escapeHtml(lang) : '') + '">' + escapeHtml(part.content) + '</code></pre>'; }
                else { result += escapeHtml(part.content).replace(/`([^`]+)`/g, '<code>' + '$1' + '</code>').replace(/\n/g, '<br>'); }
            }
            return result;
        }
        function stopTyping() {
            if (typingInterval) { clearTimeout(typingInterval); typingInterval = null; }
            const chat = chats.find(c => c.id === currentChatId);
            if (chat && chat.messages.length > 0) { const lastMsg = chat.messages[chat.messages.length - 1]; if (lastMsg.role === 'assistant' && !lastMsg.finished) { lastMsg.interrupted = true; } }
            activeStreamId = null; renderMessages(); isSending = false; sendBtnArrow();
        }
        async function continueMessage(index) {
            if (isSending) return;
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            const msg = chat.messages[index];
            if (!msg || msg.role !== 'assistant' || !msg.interrupted) return;
            isSending = true; sendBtnStop();
            const words = msg._streamWords; let pos = msg._streamPos || 0;
            if (!words || pos >= words.length) { msg.interrupted = false; msg.finished = true; renderMessages(); isSending = false; sendBtnArrow(); return; }
            msg.interrupted = false; msg.finished = false;
            const streamId = 'stream_' + index; activeStreamId = streamId;
            const shownContent = words.slice(0, pos).join('');
            msg.content = shownContent; renderMessages();
            var input = document.getElementById('userInput'); if (input) input.focus();
            await new Promise(r => setTimeout(r, 50));
            const allAssistant = document.querySelectorAll('.message-row.assistant .message-content');
            const allActions = document.querySelectorAll('.message-row.assistant .message-actions');
            let assistantIdx = 0;
            for (let i = 0; i <= index; i++) { if (chat.messages[i].role === 'assistant' && i === index) break; if (chat.messages[i].role === 'assistant') assistantIdx++; }
            const streamDiv = allAssistant[assistantIdx]; const streamAction = allActions[assistantIdx];
            if (streamDiv) streamDiv.innerHTML = formatMessage(shownContent);
            function streamNext() {
                if (activeStreamId !== streamId) return;
                let chunk = ''; let wordCount = 0;
                while (pos < words.length && wordCount < 2) { chunk += words[pos]; wordCount++; pos++; }
                msg._streamPos = pos;
                if (chunk) {
                    chat.messages[index].content = words.slice(0, pos).join('');
                    if (streamDiv) { streamDiv.innerHTML = formatMessage(chat.messages[index].content); streamDiv.querySelectorAll('pre code').forEach(function(block) { hljs.highlightElement(block); }); }
                    if (autoScroll) { document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight; }
                    typingInterval = setTimeout(streamNext, 20);
                } else {
                    chat.messages[index].finished = true; chat.messages[index].interrupted = false; typingInterval = null;
                    if (streamAction) streamAction.innerHTML = '<button onclick="copyMessage(' + index + ')" id="copy-btn-' + index + '" style="background:transparent;border:none;color:var(--dsw-alias-label-tertiary);cursor:pointer;padding:6px 8px;border-radius:8px;font-family:Inter,sans-serif;display:inline-flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';
                    autoNameChat(chat); renderChatList();
                    if (autoScroll) { document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight; }
                    if (activeStreamId === streamId) { isSending = false; activeStreamId = null; sendBtnArrow(); }
                }
            }
            streamNext();
        }
        document.addEventListener('click', () => document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show')));
        function buildNavDots() { var strip = document.getElementById('navStrip'); if (!strip) return; var chat = chats.find(c => c.id === currentChatId); if (!chat || chat.messages.length === 0) { strip.innerHTML = ''; return; } var html = ''; for (var i = 0; i < chat.messages.length; i++) { if (chat.messages[i].role === 'assistant' && chat.messages[i].content) { html += '<div class="nav-dot" data-msg-index="' + i + '"></div>'; } } strip.innerHTML = html; }
        function showNavStrip(e) { var popup = document.getElementById('navPopup'); if (!popup) { popup = document.createElement('div'); popup.id = 'navPopup'; popup.className = 'nav-popup'; popup.style.cssText = 'position:fixed;background:var(--dsw-specific-menu);backdrop-filter:blur(20px);border:1px solid var(--dsw-alias-border-l2);border-radius:12px;padding:12px;width:320px;max-height:300px;overflow-y:auto;font-size:12px;color:var(--dsw-alias-label-secondary);z-index:100;display:none;pointer-events:auto;'; document.body.appendChild(popup); } var chat = chats.find(c => c.id === currentChatId); if (!chat) { popup.style.display = 'none'; return; } var html = ''; for (var i = 0; i < chat.messages.length; i++) { if (chat.messages[i].role === 'assistant' && chat.messages[i].content) { var preview = chat.messages[i].content.substring(0, 80); html += '<div class="nav-popup-item" data-msg-index="' + i + '" style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;border-radius:6px;transition:background 0.1s;"><div class="nav-dot" style="width:6px;height:6px;border-radius:50%;background:var(--dsw-alias-brand-primary);flex-shrink:0;"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--dsw-alias-label-tertiary);">' + escapeHtml(preview) + '</span></div>'; } } if (!html) { popup.style.display = 'none'; return; } popup.innerHTML = html; popup.style.display = 'block'; popup.style.right = '20px'; popup.style.top = '50%'; popup.style.transform = 'translateY(-50%)'; popup.style.left = 'auto'; }
        function hideNavStrip() { setTimeout(function() { var popup = document.getElementById('navPopup'); if (popup && !popup.matches(':hover')) { popup.style.display = 'none'; } }, 200); }
        document.addEventListener('click', function(e) { var item = e.target.closest('.nav-popup-item'); if (item) { var index = parseInt(item.getAttribute('data-msg-index')); if (!isNaN(index)) scrollToMsg(index); } });
        function scrollToMsg(index) { var chat = chats.find(c => c.id === currentChatId); if (!chat) return; var area = document.getElementById('chatArea'); if (!area) return; var rows = area.querySelectorAll('.message-row'); var asstCount = 0; for (var r = 0; r < rows.length; r++) { if (rows[r].classList.contains('assistant')) { if (asstCount === index) { rows[r].scrollIntoView({ behavior: 'smooth', block: 'center' }); var popup = document.getElementById('navPopup'); if (popup) popup.style.display = 'none'; return; } asstCount++; } } }

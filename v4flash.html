                <div class="empty-state">

                <div class="file-list" id="fileList"></div>
                <div class="input-row-wrapper">
                    <div class="input-row">
                        <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
                        <textarea id="userInput" placeholder="Введите сообщение..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();if(isSending){stopTyping();}else{sendMessage();}}" oninput="this.style.height='auto';var h=this.scrollHeight;this.style.height=Math.min(h,300)+'px';" onfocus="if(!this._init){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,300)+'px';this._init=true;}"></textarea>

                        <button id="sendBtn" onclick="sendMessage()" title="Отправить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>

    <script>
        var autoScroll = true;

        const SERVER_URL = CONFIG.SERVER_URL;
        let currentMode = 'chat';
        let chats = [];
        let currentChatId = null;
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let typingInterval = null;
        let pendingFile = null;
        let activeStreamId = null;

        window.addEventListener('wheel', function(e) {
            const area = document.getElementById('chatArea');
            if (!area || isSending) return;
            const target = e.target;
            if (target && (target.closest('.chat-list') || target.closest('.chat-menu-dropdown') || target.closest('.sidebar'))) return;
            if (target && target.closest('#userInput')) return;
            area.scrollBy({ top: e.deltaY, behavior: 'smooth' });
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
        window.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); });
        function toggleTheme() {
            document.body.classList.toggle('light');

                    return;

                        chats.push({ id: chatId, title: title, messages: messages });
                    }
                    chats.sort((a, b) => a.id.localeCompare(b.id));
                }

                console.error('loadChatsFromServer error:', e);

        async function sendMessage() {

            if (typingInterval) { clearTimeout(typingInterval); typingInterval = null; }
            sendBtnStop();

            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            var lastMsg = chat.messages[chat.messages.length - 1];
            if (lastMsg && lastMsg.role === 'assistant' && lastMsg.interrupted) {
                lastMsg.interrupted = false;
                lastMsg.finished = true;
                lastMsg._streamWords = undefined;
                lastMsg._streamPos = undefined;
            }

            let displayText = text || (pendingFile ? '[Файл: ' + pendingFile.name + ']' : '');
            chat.messages.push({ role: 'user', content: displayText });
            renderChatList();
            renderMessages();

            const placeholderId = 'msg_' + Date.now();
            const area = document.getElementById('chatArea');

            typingRow.className = 'message-row assistant'; typingRow.id = placeholderId;
            typingRow.innerHTML = '<div><div class="message-content"><svg width="40" height="8" viewBox="0 0 40 8"><circle cx="4" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle><circle cx="16" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="28" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle></svg></div></div>';
            area.appendChild(typingRow);
            area.scrollTop = area.scrollHeight;

            try {
                const resp = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, message: text, model: 'flash', mode: currentMode, chat_id: currentChatId, file_data: pendingFile ? pendingFile.data : '', file_name: pendingFile ? pendingFile.name : '', file_mime: pendingFile ? pendingFile.mime : '' })

                const el = document.getElementById(placeholderId); if (el) el.remove();

                    return;
                }
                const data = await resp.json();
                if (data.reply) {
                    const fullContent = data.reasoning ? 'Размышление:\n' + data.reasoning + '\n\nОтвет:\n' + data.reply : data.reply;
                    chat.messages.push({ role: 'assistant', content: '', finished: false, _streamWords: null, _streamPos: 0 });
                    const msgIndex = chat.messages.length - 1;
                    const streamId = 'stream_' + msgIndex;
                    activeStreamId = streamId;
                    renderChatList();
                    const area2 = document.getElementById('chatArea');
                    const newRow = document.createElement('div');
                    newRow.className = 'message-row assistant';
                    newRow.innerHTML = '<div><div class="message-content" id="stream-' + msgIndex + '"></div><div class="message-actions" id="actions-' + msgIndex + '"><button onclick="copyMessage(' + msgIndex + ')" id="copy-btn-' + msgIndex + '" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div></div>';
                    area2.appendChild(newRow);
                    let pos = 0;
                    const streamDiv = document.getElementById('stream-' + msgIndex);
                    const streamAction = document.getElementById('actions-' + msgIndex);
                    const words = fullContent.split(/(\s+)/);
                    chat.messages[msgIndex]._streamWords = words;
                    function streamNext() {
                        if (activeStreamId !== streamId) return;
                        let chunk = '';
                        let wordCount = 0;
                        while (pos < words.length && wordCount < 2) {
                            chunk += words[pos];
                            wordCount++;
                            pos++;
                        }
                        chat.messages[msgIndex]._streamPos = pos;
                        if (chunk) {
                            chat.messages[msgIndex].content = words.slice(0, pos).join('');
                            streamDiv.innerHTML = formatMessage(chat.messages[msgIndex].content);

                    isSending = false; sendBtnArrow(); activeStreamId = null;

                const el = document.getElementById(placeholderId); if (el) el.remove();
                chat.messages.push({ role: 'assistant', content: 'Ошибка соединения.' });
                renderMessages();
                isSending = false; sendBtnArrow(); activeStreamId = null;
            }
            pendingFile = null;
            updateFileList();
            updateBalance();
        }
        function formatMessage(text) {
            var B = String.fromCharCode(96);
            if (/^\s*<(!DOCTYPE|html)/i.test(text)) {
                text = B + B + B + 'html\n' + text + '\n' + B + B + B;
            }
            let parts = [];
            let lastIndex = 0;
            const regex = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({type: 'text', content: text.substring(lastIndex, match.index)});
                }
                parts.push({type: 'code', lang: match[1], content: match[2]});
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
                parts.push({type: 'text', content: text.substring(lastIndex)});
            }
            let result = '';
            for (const part of parts) {
                if (part.type === 'code') {
                    var lang = part.lang || '';
                    result += '<pre><code class="' + (lang ? 'language-' + escapeHtml(lang) : '') + '">' + escapeHtml(part.content) + '</code></pre>';
                } else {
                    result += escapeHtml(part.content).replace(/`([^`]+)`/g, '<code>' + '$1' + '</code>').replace(/\n/g, '<br>');
                }
            }
            return result;
        }
        function stopTyping() {
            if (typingInterval) {
                clearTimeout(typingInterval);
                typingInterval = null;
            }
            const chat = chats.find(c => c.id === currentChatId);
            if (chat && chat.messages.length > 0) {
                const lastMsg = chat.messages[chat.messages.length - 1];
                if (lastMsg.role === 'assistant' && !lastMsg.finished) {
                    lastMsg.interrupted = true;
                }
            }
            activeStreamId = null;
            renderMessages();
            isSending = false;
            sendBtnArrow();
        }
        async function continueMessage(index) {
            if (isSending) return;
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            const msg = chat.messages[index];
            if (!msg || msg.role !== 'assistant' || !msg.interrupted) return;
            isSending = true;
            sendBtnStop();
            const words = msg._streamWords;
            let pos = msg._streamPos || 0;
            if (!words || pos >= words.length) {
                msg.interrupted = false;
                msg.finished = true;
                renderMessages();
                isSending = false;
                sendBtnArrow();
                return;
            }
            msg.interrupted = false;
            msg.finished = false;
            const streamId = 'stream_' + index;
            activeStreamId = streamId;
            const shownContent = words.slice(0, pos).join('');
            msg.content = shownContent;
            renderMessages();
            var input = document.getElementById('userInput');
            if (input) input.focus();
            await new Promise(r => setTimeout(r, 50));
            const allAssistant = document.querySelectorAll('.message-row.assistant .message-content');
            const allActions = document.querySelectorAll('.message-row.assistant .message-actions');
            let assistantIdx = 0;
            for (let i = 0; i <= index; i++) {
                if (chat.messages[i].role === 'assistant' && i === index) break;
                if (chat.messages[i].role === 'assistant') assistantIdx++;
            }
            const streamDiv = allAssistant[assistantIdx];
            const streamAction = allActions[assistantIdx];
            if (streamDiv) streamDiv.innerHTML = formatMessage(shownContent);
            function streamNext() {
                if (activeStreamId !== streamId) return;
                let chunk = '';
                let wordCount = 0;
                while (pos < words.length && wordCount < 2) {
                    chunk += words[pos];
                    wordCount++;
                    pos++;
                }
                msg._streamPos = pos;
                if (chunk) {
                    chat.messages[index].content = words.slice(0, pos).join('');
                    if (streamDiv) {
                        streamDiv.innerHTML = formatMessage(chat.messages[index].content);
                        streamDiv.querySelectorAll('pre code').forEach(function(block) { hljs.highlightElement(block); });
                    }
                    if (autoScroll) {
                        document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                    }
                    typingInterval = setTimeout(streamNext, 20);
                } else {
                    chat.messages[index].finished = true;
                    chat.messages[index].interrupted = false;
                    typingInterval = null;
                    if (streamAction) streamAction.innerHTML = '<button onclick="copyMessage(' + index + ')" id="copy-btn-' + index + '" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';
                    autoNameChat(chat);
                    renderChatList();
                    if (autoScroll) {
                        document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                    }
                    if (activeStreamId === streamId) {
                        isSending = false;
                        activeStreamId = null;
                        sendBtnArrow();
                    }
                }
            }
            streamNext();
        }
        document.addEventListener('click', () => document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show')));
        function setupFloatingCopyButtons() {
            document.querySelectorAll('.floating-copy-btn').forEach(function(btn) { btn.remove(); });
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                if (pre.querySelector('.floating-copy-btn')) return;
                var btn = document.createElement('button');
                btn.className = 'floating-copy-btn';
                btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                btn.title = 'Копировать';
                btn.style.cssText = 'position:fixed; background:transparent; border:none; color:#888; cursor:pointer; padding:6px 8px; border-radius:8px; font-family:Inter,sans-serif; z-index:9999; display:none; line-height:1; transition:background 0.15s;';
                btn.onmouseenter = function() { btn.style.background = 'rgba(255,255,255,0.08)'; };
                btn.onmouseleave = function() { btn.style.background = 'transparent'; };
                btn.onclick = function() {
                    var code = pre.querySelector('code').textContent;
                    navigator.clipboard.writeText(code);
                    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                    setTimeout(function() { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'; }, 2000);
                };
                document.body.appendChild(btn);
                if (document.body.classList.contains('light')) {
                    btn.style.color = '#555';
                    btn.onmouseenter = function() { btn.style.background = 'rgba(0,0,0,0.06)'; };
                    btn.onmouseleave = function() { btn.style.background = 'transparent'; };
                }
                pre._floatBtn = btn;
            });
        }

        function updateFloatingButtons() {
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                var btn = pre._floatBtn;
                if (!btn) return;
                var rect = pre.getBoundingClientRect();
                var visible = rect.bottom > 0 && rect.top < window.innerHeight;
                if (visible) {
                    btn.style.display = 'block';
                    btn.style.top = Math.max(rect.top, 60) + 'px';
                    btn.style.right = (window.innerWidth - rect.right + 8) + 'px';
                } else {
                    btn.style.display = 'none';
                }
            });
        }

        function buildNavContainer() {
            var container = document.getElementById('navContainer');
            if (!container) return;
            var chat = chats.find(c => c.id === currentChatId);
            if (!chat || chat.messages.length === 0) { container.innerHTML = ''; return; }
            var html = '';
            for (var i = 0; i < chat.messages.length; i++) {
                if (chat.messages[i].role === 'assistant' && chat.messages[i].content) {
                    var preview = chat.messages[i].content.substring(0, 80);
                    html += '<div class="nav-strip" data-msg-index="' + i + '" onclick="scrollToMsg(' + i + ')"><div class="nav-bar"></div><span class="nav-text">' + escapeHtml(preview) + '</span></div>';
                }
            }
            container.innerHTML = html;
        }
        function updateActiveNavFromScroll() {
            var area = document.getElementById('chatArea');
            if (!area) return;
            var rows = area.querySelectorAll('.message-row.assistant[data-msg-index]');
            var areaRect = area.getBoundingClientRect();
            var closestIndex = null;
            var closestDist = Infinity;
            for (var r = 0; r < rows.length; r++) {
                var rect = rows[r].getBoundingClientRect();
                var mid = rect.top + rect.height / 2;
                var dist = Math.abs(mid - (areaRect.top + areaRect.height / 2));
                if (dist < closestDist) {
                    closestDist = dist;
                    closestIndex = rows[r].getAttribute('data-msg-index');
                }
            }
            document.querySelectorAll('.nav-strip').forEach(function(s) { s.classList.remove('active'); });
            if (closestIndex !== null) {
                var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + closestIndex + '"]');
                if (activeStrip) {
                    activeStrip.classList.add('active');
                    var container = document.getElementById('navContainer');
                    if (container) {
                        var stripTop = activeStrip.offsetTop;
                        var containerH = container.clientHeight;
                        container.scrollTo({ top: stripTop - containerH / 2 + activeStrip.offsetHeight / 2, behavior: 'smooth' });
                    }
                }
            }
        }
        var chatAreaEl = document.getElementById('chatArea');
        if (chatAreaEl) {
            chatAreaEl.addEventListener('scroll', updateActiveNavFromScroll);
        }
        document.getElementById('navContainer').addEventListener('wheel', function(e) {
            e.stopPropagation();
        });
        function scrollToMsg(index) {
            var area = document.getElementById('chatArea');
            if (!area) return;
            var target = area.querySelector('.message-row.assistant[data-msg-index="' + index + '"]');
            if (target) {
                target.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
            document.querySelectorAll('.nav-strip').forEach(function(s) { s.classList.remove('active'); });
            var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + index + '"]');
            if (activeStrip) { activeStrip.classList.add('active'); }
        }

        var chatAreaObserver = new MutationObserver(function() {
            setupFloatingCopyButtons();
            updateFloatingButtons();
        });
        window.addEventListener('load', function() {
            var chatArea = document.getElementById('chatArea');
            if (chatArea) {
                chatAreaObserver.observe(chatArea, { childList: true, subtree: true });
            }
            setupFloatingCopyButtons();
            updateFloatingButtons();
        });
        window.addEventListener('scroll', updateFloatingButtons, true);
        window.addEventListener('resize', updateFloatingButtons);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek V4 Flash</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #e3eaf2;
            background: #0f1115;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; outline: none; }
        input, textarea { font-family: inherit; outline: none; border: none; background: none; color: inherit; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ===== CSS VARIABLES (DeepSeek Dark) ===== */
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #151517;
            --bg-tertiary: #1b1b1c;
            --bg-elevated: #232324;
            --bg-hover: rgba(255,255,255,0.06);
            --bg-active: rgba(255,255,255,0.1);
            --bg-message-user: rgba(57,100,254,0.15);
            --bg-message-assistant: #1b1b1c;
            --bg-input: #151517;
            --bg-sidebar: #0f1115;
            --bg-sidebar-hover: rgba(255,255,255,0.04);
            --bg-sidebar-active: rgba(255,255,255,0.08);
            --bg-code: #151517;
            --bg-code-header: #1b1b1c;
            --bg-tooltip: #2c2c2e;
            --bg-dropdown: #232324;
            --bg-badge: rgba(255,255,255,0.08);
            --border-primary: rgba(255,255,255,0.06);
            --border-secondary: rgba(255,255,255,0.1);
            --border-strong: rgba(255,255,255,0.15);
            --text-primary: #e3eaf2;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            --text-link: #679efe;
            --text-link-hover: #5686fe;
            --accent: #3964fe;
            --accent-hover: #4d6bfe;
            --accent-soft: rgba(57,100,254,0.1);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.6);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --transition: 0.2s ease;
        }

        /* ===== LAYOUT ===== */
        .app { display: flex; height: 100vh; width: 100vw; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-primary);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        .sidebar-header {
            padding: 16px 16px 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-logo { height: 28px; width: auto; }
        .sidebar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .sidebar-title span { color: var(--accent); }
        .sidebar-search {
            margin: 0 12px 8px;
            padding: 6px 10px;
            border-radius: var(--radius-md);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            color: var(--text-secondary);
            font-size: 12px;
            transition: var(--transition);
        }
        .sidebar-search:focus { border-color: var(--accent); color: var(--text-primary); }
        .sidebar-search::placeholder { color: var(--text-tertiary); }
        .sidebar-new-chat {
            margin: 4px 12px 8px;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(57,100,254,0.3);
        }
        .sidebar-new-chat:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(57,100,254,0.4); }
        .sidebar-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            gap: 8px;
            position: relative;
        }
        .sidebar-item:hover { background: var(--bg-sidebar-hover); color: var(--text-primary); }
        .sidebar-item.active { background: var(--bg-sidebar-active); color: var(--text-primary); font-weight: 500; }
        .sidebar-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-item-menu {
            opacity: 0;
            width: 24px; height: 24px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            transition: var(--transition);
        }
        .sidebar-item:hover .sidebar-item-menu { opacity: 1; }
        .sidebar-item-menu:hover { background: var(--bg-hover); color: var(--text-primary); }
        .sidebar-footer {
            border-top: 1px solid var(--border-primary);
            padding: 12px 16px;
            text-align: center;
        }
        .sidebar-footer a { font-size: 12px; color: var(--text-tertiary); transition: var(--transition); }
        .sidebar-footer a:hover { color: var(--text-link); }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
            position: relative;
        }
        .topbar {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            border-bottom: 1px solid var(--border-primary);
            background: var(--bg-primary);
            gap: 12px;
            flex-shrink: 0;
        }
        .topbar-balance { font-size: 12px; color: var(--text-link); white-space: nowrap; }
        .topbar-mode {
            padding: 4px 14px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--border-secondary);
            transition: var(--transition);
        }
        .topbar-mode:hover { border-color: var(--accent); color: var(--text-primary); }
        .topbar-mode.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        .topbar-theme {
            margin-left: auto;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            border: 1px solid var(--border-primary);
            transition: var(--transition);
        }
        .topbar-theme:hover { border-color: var(--accent); color: var(--text-primary); }

        /* ===== CHAT ===== */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 775px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            min-height: 0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-tertiary);
        }
        .chat-empty-logo { height: 60px; opacity: 0.4; }
        .chat-empty-title { font-size: 22px; font-weight: 600; color: var(--text-secondary); }
        .chat-empty-sub { font-size: 13px; color: var(--text-tertiary); }

        /* ===== MESSAGES ===== */
        .message { display: flex; gap: 12px; align-items: flex-start; max-width: 100%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .message-bubble {
            padding: 10px 16px;
            border-radius: var(--radius-lg);
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 100%;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .message.assistant .message-bubble {
            background: var(--bg-message-assistant);
            color: var(--text-primary);
            border: 1px solid var(--border-primary);
        }
        .message.user .message-bubble {
            background: var(--accent-soft);
            color: var(--text-primary);
            border: 1px solid rgba(57,100,254,0.25);
            border-radius: var(--radius-xl);
        }
        .message-bubble pre {
            background: var(--bg-code);
            padding: 14px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            font-size: 13px;
            margin: 8px 0;
            border: 1px solid var(--border-primary);
            font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
        }
        .message-bubble code {
            font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
            font-size: 0.875em;
            background: var(--bg-hover);
            padding: 1px 6px;
            border-radius: 4px;
        }
        .message-bubble pre code { background: transparent; padding: 0; font-size: 13px; }
        .message-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            opacity: 0;
            transition: var(--transition);
        }
        .message:hover .message-actions { opacity: 1; }
        .message-actions button {
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            color: var(--text-tertiary);
            font-size: 12px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .message-actions button:hover { background: var(--bg-hover); color: var(--text-secondary); }

        /* ===== INPUT ===== */
        .input-area {
            padding: 0 0 20px;
            flex-shrink: 0;
            position: relative;
        }
        .input-wrapper {
            background: var(--bg-input);
            border: 1px solid var(--border-secondary);
            border-radius: var(--radius-xl);
            transition: var(--transition);
            overflow: hidden;
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 14px 0;
        }
        .input-row textarea {
            flex: 1;
            resize: none;
            min-height: 24px;
            max-height: 200px;
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-primary);
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
        }
        .input-row textarea::placeholder { color: var(--text-tertiary); }
        .input-toolbar {
            display: flex;
            align-items: center;
            padding: 6px 12px 10px;
            gap: 8px;
        }
        .input-attach {
            padding: 6px;
            border-radius: var(--radius-md);
            color: var(--text-tertiary);
            transition: var(--transition);
            display: flex;
        }
        .input-attach:hover { color: var(--accent); background: var(--bg-hover); }
        .input-file-name {
            font-size: 12px;
            color: var(--accent);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-left: auto;
        }
        .input-send {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(57,100,254,0.3);
        }
        .input-send:hover { background: var(--accent-hover); transform: scale(1.05); }
        .input-send:disabled { background: var(--bg-tertiary); color: var(--text-tertiary); cursor: not-allowed; box-shadow: none; transform: none; }

        /* ===== SCROLL TO BOTTOM ===== */
        .scroll-bottom {
            position: absolute;
            bottom: 80px; right: 20px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow-md);
            z-index: 5;
            transition: var(--transition);
        }
        .scroll-bottom:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        /* ===== SIDEBAR TOGGLE ===== */
        .sidebar-toggle {
            position: fixed;
            top: 56px; left: 232px;
            width: 28px; height: 28px;
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: left 0.3s ease, var(--transition);
        }
        .sidebar-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
        .collapsed .sidebar-toggle { left: 8px; }

        /* ===== DROPDOWN ===== */
        .dropdown-menu {
            position: absolute;
            right: 0; top: 100%;
            background: var(--bg-dropdown);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: 4px;
            min-width: 140px;
            box-shadow: var(--shadow-lg);
            display: none;
            z-index: 30;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            text-align: left;
        }
        .dropdown-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .dropdown-item.danger { color: var(--danger); }
        .dropdown-item.danger:hover { background: rgba(239,68,68,0.1); }

        /* ===== THINKING DOTS ===== */
        .thinking { display: inline-flex; align-items: center; gap: 4px; }
        .thinking span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: think 1.4s infinite ease-in-out both;
        }
        .thinking span:nth-child(1) { animation-delay: 0s; }
        .thinking span:nth-child(2) { animation-delay: 0.16s; }
        .thinking span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes think {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ===== FILE TAG ===== */
        .file-tag {
            display: inline-flex;
            align-items: center;
            background: var(--accent-soft);
            border: 1px solid rgba(57,100,254,0.3);
            border-radius: var(--radius-sm);
            padding: 2px 8px;
            font-size: 12px;
            color: var(--accent);
            gap: 6px;
        }
        .file-tag button { color: var(--danger); font-size: 14px; cursor: pointer; background: none; border: none; padding: 0; line-height: 1; }

        /* ===== HLJS OVERRIDE ===== */
        .hljs { background: var(--bg-code) !important; border-radius: var(--radius-md) !important; padding: 14px !important; font-size: 13px !important; font-family: 'Menlo', 'Monaco', 'Consolas', monospace !important; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
            .sidebar-toggle { display: flex; left: 12px !important; top: 12px; }
            .chat-container { max-width: 100%; padding: 0 12px; }
            .topbar { padding: 8px 12px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="config.js"></script>
</head>
<body>
<div class="app">
    <!-- Sidebar Toggle -->
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Свернуть панель">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="deepseek_logo.png" class="sidebar-logo" alt="DeepSeek" onerror="this.style.display='none'">
            <div class="sidebar-title"><span>V4</span> Flash</div>
        </div>
        <input class="sidebar-search" id="chatSearch" placeholder="Поиск чата..." oninput="filterChats()">
        <button class="sidebar-new-chat" onclick="newChat()">Новый чат</button>
        <div class="sidebar-list" id="chatList"></div>
        <div class="sidebar-footer">
            <a href="index.html">На главную</a>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="topbar">
            <span class="topbar-balance" id="balanceDisplay">...</span>
            <button class="topbar-mode" id="reasonerToggle" onclick="toggleReasoner()">Reasoner</button>
            <button class="topbar-theme" onclick="toggleTheme()" id="themeToggle">☀️</button>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatArea">
                <div class="chat-empty">
                    <img src="deepseek_logo.png" class="chat-empty-logo" onerror="this.style.display='none'">
                    <div class="chat-empty-title">DeepSeek V4 Flash</div>
                    <div class="chat-empty-sub">Задайте любой вопрос или прикрепите файл</div>
                </div>
            </div>

            <!-- Input -->
            <div class="input-area" id="inputArea">
                <div id="dropZone" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;display:none;align-items:center;justify-content:center;background:var(--accent-soft);border:2px dashed var(--accent);border-radius:var(--radius-xl);font-size:14px;color:var(--accent);">Отпустите файл для загрузки</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 6px 0 6px;" id="fileList"></div>
                <div class="input-wrapper">
                    <div class="input-row">
                        <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
                        <textarea id="userInput" placeholder="Введите сообщение..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();if(isSending){stopTyping();}else{sendMessage();}}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,200)+'px';"></textarea>
                    </div>
                    <div class="input-toolbar">
                        <button class="input-attach" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <span class="input-file-name" id="fileNameInline"></span>
                        <button class="input-send" id="sendBtn" onclick="sendMessage()" title="Отправить">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <button class="scroll-bottom" id="scrollBottomBtn" onclick="scrollToBottom()">↓</button>
        </div>
    </div>
</div>

<script>
    var autoScroll = true;
    const SERVER_URL = CONFIG.SERVER_URL;
    let currentMode = 'chat';
    let chats = [];
    let currentChatId = null;
    let sessionToken = '';
    let currentUserId = null;
    let isSending = false;
    let typingInterval = null;
    let pendingFile = null;
    let activeStreamId = null;

    window.addEventListener('wheel', function(e) {
        const area = document.getElementById('chatArea');
        if (!area || isSending) return;
        const target = e.target;
        if (target && (target.closest('.sidebar-list') || target.closest('.dropdown-menu') || target.closest('.sidebar'))) return;
        if (target && target.closest('#userInput')) return;
        area.scrollTop += e.deltaY;
        e.preventDefault();
    }, { passive: false });

    window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
    window.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); });

    function toggleTheme() {
        var isDark = document.body.style.getPropertyValue('--bg-primary') === '#0f1115';
        if (isDark) {
            document.body.style.setProperty('--bg-primary', '#ffffff');
            document.body.style.setProperty('--bg-secondary', '#f9fafb');
            document.body.style.setProperty('--bg-tertiary', '#f3f4f6');
            document.body.style.setProperty('--bg-elevated', '#ffffff');
            document.body.style.setProperty('--bg-hover', 'rgba(0,0,0,0.04)');
            document.body.style.setProperty('--bg-active', 'rgba(0,0,0,0.08)');
            document.body.style.setProperty('--bg-message-user', 'rgba(57,100,254,0.08)');
            document.body.style.setProperty('--bg-message-assistant', '#ffffff');
            document.body.style.setProperty('--bg-input', '#ffffff');
            document.body.style.setProperty('--bg-sidebar', '#f9fafb');
            document.body.style.setProperty('--bg-sidebar-hover', 'rgba(0,0,0,0.04)');
            document.body.style.setProperty('--bg-sidebar-active', 'rgba(0,0,0,0.06)');
            document.body.style.setProperty('--bg-code', '#f9fafb');

    async function sendMessage() {
        if (isSending) return;
        var text = input.value.trim();
        if (!text && !pendingFile) return;
        if (!currentUserId) { alert('Авторизуйтесь на главной странице'); return; }
        if (!currentChatId) newChat();

        if (!chat) return;
        var last = chat.messages[chat.messages.length - 1];
        if (last && last.role === 'assistant' && last.interrupted) { last.interrupted = false; last.finished = true; last._streamWords = undefined; last._streamPos = undefined; }
        var display = text || (pendingFile ? '[Файл: ' + pendingFile.name + ']' : '');

            var el = document.getElementById(pid); if (el) el.remove();
            if (resp.status === 403) { chat.messages.push({ role: 'assistant', content: 'Сессия устарела.' }); renderMessages(); isSending = false; sendBtnArrow(); activeStreamId = null; return; }
            if (resp.status === 402) { chat.messages.push({ role: 'assistant', content: 'Недостаточно средств.' }); renderMessages(); updateBalance(); isSending = false; sendBtnArrow(); activeStreamId = null; return; }
            if (!resp.ok) { chat.messages.push({ role: 'assistant', content: 'Ошибка сервера.' }); renderMessages(); isSending = false; sendBtnArrow(); activeStreamId = null; return; }
            var data = await resp.json();
            if (data.reply) {
                var full = data.reasoning ? 'Размышление:\n' + data.reasoning + '\n\nОтвет:\n' + data.reply : data.reply;
                chat.messages.push({ role: 'assistant', content: '', finished: false, _streamWords: null, _streamPos: 0 });
                var mi = chat.messages.length - 1;
                var sid = 'stream_' + mi;
                activeStreamId = sid;
                renderChatList();
                var nr = document.createElement('div'); nr.className = 'message assistant';
                nr.innerHTML = '<div><div class="message-bubble" id="stream-' + mi + '"></div><div class="message-actions" id="actions-' + mi + '"><button onclick="copyMessage(' + mi + ')" id="copy-btn-' + mi + '" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div></div>';
                area.appendChild(nr);
                var pos = 0;
                var sd = document.getElementById('stream-' + mi);
                var sa = document.getElementById('actions-' + mi);
                var words = full.split(/(\s+)/);
                chat.messages[mi]._streamWords = words;
                function sn() {
                    if (activeStreamId !== sid) return;
                    var chunk = ''; var cnt = 0;
                    while (pos < words.length && cnt < 2) { chunk += words[pos]; cnt++; pos++; }
                    chat.messages[mi]._streamPos = pos;
                    if (chunk) {
                        chat.messages[mi].content = words.slice(0, pos).join('');
                        sd.innerHTML = formatMessage(chat.messages[mi].content);
                        sd.querySelectorAll('pre code').forEach(function(b) { hljs.highlightElement(b); });
                        if (autoScroll) { document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight; }
                        typingInterval = setTimeout(sn, 20);
                    } else {

                        sa.innerHTML = '<button onclick="copyMessage(' + mi + ')" id="copy-btn-' + mi + '" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';

    function formatMessage(text) {
        var B = String.fromCharCode(96);
        if (/^\s*<(!DOCTYPE|html)/i.test(text)) text = B + B + B + 'html\n' + text + '\n' + B + B + B;
        var parts = []; var last = 0;
        var re = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
        var m;
        while ((m = re.exec(text)) !== null) {
            if (m.index > last) parts.push({t: 'text', c: text.substring(last, m.index)});
            parts.push({t: 'code', l: m[1], c: m[2]});
            last = re.lastIndex;
        }
        if (last < text.length) parts.push({t: 'text', c: text.substring(last)});
        var r = '';
        for (var p of parts) {
            if (p.t === 'code') { r += '<pre><code class="' + (p.l ? 'language-' + escapeHtml(p.l) : '') + '">' + escapeHtml(p.c) + '</code></pre>'; }
            else { r += escapeHtml(p.c).replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\n/g, '<br>'); }
        }
        return r;
    }

    function stopTyping() {
        if (typingInterval) { clearTimeout(typingInterval); typingInterval = null; }
        var chat = chats.find(c => c.id === currentChatId);
        if (chat && chat.messages.length > 0) { var last = chat.messages[chat.messages.length - 1]; if (last.role === 'assistant' && !last.finished) last.interrupted = true; }
        activeStreamId = null; renderMessages(); isSending = false; sendBtnArrow();
    }

    async function continueMessage(index) {
        if (isSending) return;
        var chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        var msg = chat.messages[index];
        if (!msg || msg.role !== 'assistant' || !msg.interrupted) return;
        isSending = true; sendBtnStop();
        var words = msg._streamWords; var pos = msg._streamPos || 0;
        if (!words || pos >= words.length) { msg.interrupted = false; msg.finished = true; renderMessages(); isSending = false; sendBtnArrow(); return; }
        msg.interrupted = false; msg.finished = false;
        var sid = 'stream_' + index; activeStreamId = sid;
        msg.content = words.slice(0, pos).join(''); renderMessages();
        document.getElementById('userInput').focus();
        await new Promise(r => setTimeout(r, 50));
        var allB = document.querySelectorAll('.message.assistant .message-bubble');
        var allA = document.querySelectorAll('.message.assistant .message-actions');
        var ai = 0;
        for (var i = 0; i <= index; i++) { if (chat.messages[i].role === 'assistant' && i === index) break; if (chat.messages[i].role === 'assistant') ai++; }
        var sd = allB[ai]; var sa = allA[ai];
        if (sd) sd.innerHTML = formatMessage(msg.content);
        function sn() {
            if (activeStreamId !== sid) return;
            var chunk = ''; var cnt = 0;
            while (pos < words.length && cnt < 2) { chunk += words[pos]; cnt++; pos++; }
            msg._streamPos = pos;
            if (chunk) {
                chat.messages[index].content = words.slice(0, pos).join('');
                if (sd) { sd.innerHTML = formatMessage(chat.messages[index].content); sd.querySelectorAll('pre code').forEach(function(b) { hljs.highlightElement(b); }); }
                if (autoScroll) { document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight; }
                typingInterval = setTimeout(sn, 20);
            } else {
                chat.messages[index].finished = true; chat.messages[index].interrupted = false; typingInterval = null;
                if (sa) sa.innerHTML = '<button onclick="copyMessage(' + index + ')" id="copy-btn-' + index + '" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';
                autoNameChat(chat); renderChatList();
                if (autoScroll) { document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight; }
                if (activeStreamId === sid) { isSending = false; activeStreamId = null; sendBtnArrow(); }
            }
        }
        sn();
    }

    document.addEventListener('click', function() { document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show')); });
</script>

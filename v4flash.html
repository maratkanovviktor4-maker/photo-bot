<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — DeepSeek V4 Flash</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
        body { font-family: 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; background: #201F28; color: #e0e0e0; height: 100vh; display: flex; overflow: hidden; width: 100vw; }
        .sidebar { width: 280px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); display: flex; flex-direction: column; padding: 16px; border-right: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
        .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .logo-row img { height: 32px; }
        .logo-text { font-size: 15px; font-weight: 600; color: #00CBF5; margin-top: 4px; font-family: 'Inter', sans-serif; }
        .new-chat { width: 100%; padding: 10px; background: linear-gradient(90deg, #00CBF5, #14E9FC); color: #201F28; border: 2px solid transparent; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; margin-bottom: 12px; transition: 0.3s ease; box-shadow: 0 4px 16px rgba(0,203,245,0.3); }
        .new-chat:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,203,245,0.4); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #a0a0b0; margin-bottom: 2px; transition: 0.15s; position: relative; font-family: 'Inter', sans-serif; }
        .chat-item:hover { background: rgba(0,203,245,0.1); color: #e0e0e0; }
        .chat-item.active { background: rgba(0,203,245,0.15); color: #00CBF5; font-weight: 600; }
        .chat-item .chat-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .chat-menu-btn { width: 24px; height: 24px; border-radius: 4px; border: none; background: transparent; color: #666; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 6px; font-family: 'Inter', sans-serif; }
        .chat-item .chat-menu-btn:hover { background: rgba(0,203,245,0.2); color: #e0e0e0; }
        .chat-menu-dropdown { position: absolute; right: 0; top: 100%; background: rgba(34,34,34,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 4px; z-index: 10; display: none; min-width: 140px; }
        .chat-menu-dropdown.show { display: block; }
        .chat-menu-dropdown button { display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; color: #e0e0e0; font-size: 12px; cursor: pointer; text-align: left; border-radius: 4px; font-family: 'Inter', sans-serif; }
        .chat-menu-dropdown button:hover { background: rgba(0,203,245,0.15); }
        .chat-menu-dropdown button.delete { color: #e74c3c; }
        .chat-menu-dropdown button.delete:hover { background: rgba(231,76,60,0.15); }
        .sidebar-footer { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; margin-top: 8px; }
        .sidebar-footer a { color: #888; text-decoration: none; font-size: 12px; display: block; text-align: center; font-family: 'Inter', sans-serif; transition: 0.2s; }
        .sidebar-footer a:hover { color: #00CBF5; }
        .main { flex: 1; display: flex; flex-direction: column; background: #201F28; max-width: calc(100vw - 280px); overflow: hidden; width: calc(100vw - 280px); }
        .top-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); background: #201F28; flex-shrink: 0; }
        .mode-btn { padding: 6px 16px; border-radius: 16px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent; background: rgba(34,34,34,0.8); color: #a0a0b0; font-family: 'Inter', sans-serif; transition: 0.3s ease; }
        .mode-btn.active { background: linear-gradient(90deg, #00CBF5, #14E9FC); border-color: transparent; color: #201F28; font-weight: 600; box-shadow: 0 4px 16px rgba(0,203,245,0.3); }
        .mode-btn:hover:not(.active) { border-color: #00CBF5; color: #e0e0e0; }
        #balanceDisplay { margin-left: auto; font-size: 12px; color: #00CBF5; font-family: 'Inter', sans-serif; white-space: nowrap; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; position: relative; min-height: 0; }
        .scroll-bottom-btn { position: fixed; bottom: 100px; right: 30px; width: 44px; height: 44px; border-radius: 50%; background: rgba(0,203,245,0.85); color: #201F28; border: none; cursor: pointer; font-size: 22px; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,203,245,0.4); transition: 0.3s ease; z-index: 999; }
        .scroll-bottom-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,203,245,0.6); }
        .chat-area .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #555; }
        .chat-area .empty-state .logo-lg { height: 60px; opacity: 0.6; }
        .chat-area .empty-state .title { font-size: 22px; font-weight: 600; color: #777; font-family: 'Inter', sans-serif; }
        .message-row { display: flex; gap: 12px; align-items: flex-start; max-width: 100%; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-row.assistant { align-self: flex-start; }
        .message-content { padding: 10px 14px; border-radius: 12px; font-size: 16px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; max-width: 100%; overflow-x: hidden; }
        .message-row.assistant .message-content { background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.06); }
        .message-row.user .message-content { background: rgba(0,203,245,0.15); border: 1px solid rgba(0,203,245,0.2); }
        .message-content pre { background: #0a0a1a; padding: 14px; border-radius: 10px; overflow-x: auto; font-size: 14px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.06); white-space: pre-wrap; word-break: break-all; position: relative; }
        .message-content pre code { font-family: 'Courier New', monospace; font-size: 14px; background: transparent; padding: 0; border-radius: 0; display: block; }
        .message-content code { font-family: 'Courier New', monospace; font-size: 14px; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
        .message-content pre .copy-btn { position: sticky; top: 0; float: right; background: rgba(255,255,255,0.1); border: none; color: #aaa; cursor: pointer; font-size: 11px; padding: 4px 10px; border-radius: 4px; font-family: 'Inter', sans-serif; transition: 0.2s; z-index: 5; opacity: 1; margin-bottom: -28px; }
        .message-content pre .copy-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .message-actions { display: flex; gap: 6px; margin-top: 6px; }
        .message-actions button { background: rgba(34,34,34,0.6); border: 1px solid rgba(255,255,255,0.06); color: #888; cursor: pointer; font-size: 11px; padding: 4px 10px; border-radius: 4px; font-family: 'Inter', sans-serif; transition: 0.2s; }
        .message-actions button:hover { background: rgba(0,203,245,0.2); color: #e0e0e0; }
        .input-area { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 10px; align-items: flex-end; background: #201F28; flex-shrink: 0; max-width: 100%; overflow: hidden; }
        .input-area textarea { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: rgba(34,34,34,0.6); color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; font-size: 15px; outline: none; resize: none; max-height: 280px; overflow-y: auto; transition: border-color 0.2s, box-shadow 0.2s; min-width: 0; }
        .input-area textarea:focus { border-color: #00CBF5; box-shadow: 0 0 0 3px rgba(0,203,245,0.15); }
        .input-area button { padding: 10px 18px; background: linear-gradient(90deg, #00CBF5, #14E9FC); color: #201F28; border: 2px solid transparent; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; transition: 0.3s ease; flex-shrink: 0; box-shadow: 0 4px 16px rgba(0,203,245,0.3); }
        .input-area button:disabled { background: #2a2a2a; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }
        .input-area button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,203,245,0.4); }
        .attach-btn { padding: 10px; background: rgba(34,34,34,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #00CBF5; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 18px; flex-shrink: 0; transition: 0.3s ease; }
        .attach-btn:hover { color: #14E9FC; border-color: #00CBF5; background: rgba(0,203,245,0.1); }
        .remove-attach-btn { padding: 10px; background: rgba(34,34,34,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #E74C3C; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 16px; display: none; flex-shrink: 0; transition: 0.3s ease; }
        .remove-attach-btn:hover { color: #FF6B6B; border-color: #E74C3C; background: rgba(231,76,60,0.1); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-row">
            <img src="deepseek_logo.png" alt="DeepSeek Flash" onerror="this.style.display='none'">
            <span class="logo-text"><span style="color:#8B5CF6;">V4 Flash</span></span>
        </div>
        <button class="new-chat" onclick="newChat()">Новый чат</button>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <a href="index.html">На главную</a>
        </div>
    </div>
    <div class="main">
        <div class="top-bar">
            <button class="mode-btn active" data-mode="chat" onclick="setMode('chat')">Chat</button>
            <button class="mode-btn" data-mode="reasoner" onclick="setMode('reasoner')">Reasoner</button>
            <span id="balanceDisplay" style="margin-left:auto;font-size:12px;color:#00CBF5;"> ...</span>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <img src="deepseek_logo.png" class="logo-lg" alt="DeepSeek Flash" onerror="this.style.display='none'">
                <div class="title">DeepSeek V4 Flash</div>
                <div style="color:#666;font-size:13px;">Задайте любой вопрос или прикрепите файл</div>
            </div>
        </div>
        <div class="input-area">
            <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">+</button>
            <button class="remove-attach-btn" id="removeFileBtn" onclick="removeFile()" title="Удалить вложение">x</button>
            <textarea id="userInput" placeholder="Введите сообщение..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}" oninput="this.style.height='auto';var h=this.scrollHeight;this.style.height=Math.min(h,280)+'px';" onfocus="if(!this._init){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,280)+'px';this._init=true;}"></textarea>
            <button id="sendBtn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom()">↓</button>

    <script>
        var autoScroll = true;

        const SERVER_URL = "https://api.фото-бот.рф";
        let currentMode = 'chat';
        let chats = [];
        let currentChatId = null;
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let typingInterval = null;
        let pendingFileData = null;
        let pendingFileName = '';
        let pendingFileMime = '';

        function scrollToBottom() {
            var area = document.getElementById('chatArea');
            area.scrollTop = area.scrollHeight;
            autoScroll = true;
        }

        document.addEventListener('scroll', function(e) {
            var btn = document.getElementById('scrollBottomBtn');
            var area = document.getElementById('chatArea');
            if (!area) return;
            var atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 300;
            if (atBottom) {
                btn.style.display = 'none';
                autoScroll = true;
            } else {
                btn.style.display = 'flex';
                autoScroll = false;
            }
        }, true);

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            if (!sessionToken || !currentUserId) {
                alert('Сессия устарела. Авторизуйтесь заново на главной странице.');
                window.location.href = 'index.html';
            } else {
                loadChatsFromServer();
                updateBalance();
            }
        } else {
            alert('Авторизуйтесь на главной странице');
            window.location.href = 'index.html';
        }

        async function loadChatsFromServer() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_chat_history?user_id=${currentUserId}&model=flash&session_token=${sessionToken}`);
                if (resp.status === 403) {
                    alert('Сессия устарела. Авторизуйтесь заново.');
                    window.location.href = 'index.html';
                    return;
                }
                const data = await resp.json();
                if (data.history) {
                    chats = [];
                    for (const [chatId, messages] of Object.entries(data.history)) {
                        chats.push({ id: chatId, title: 'Чат ' + chatId, messages: messages });
                    }
                    chats.sort((a, b) => a.id.localeCompare(b.id));
                }
            } catch (e) {
                console.error('loadChatsFromServer error:', e);
            }
            if (chats.length === 0) {
                const chat = { id: Date.now().toString(), title: 'Новый чат', messages: [] };
                chats.push(chat);
            }
            renderChatList();
            currentChatId = chats[chats.length - 1].id;
            openChat(currentChatId);
        }
        async function updateBalance() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_balance?user_id=${currentUserId}&session_token=${sessionToken}`);
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('balanceDisplay').textContent = `${data.flash.toFixed(1)} Stars`;
                }
            } catch(e) {
                console.error(e);
            }
        }
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function newChat() {
            const chat = { id: Date.now().toString(), title: 'Новый чат', messages: [] };
            chats.push(chat);
            currentChatId = chat.id;
            renderChatList();
            renderMessages();
        }
        function openChat(id) {
            currentChatId = id;
            renderChatList();
            renderMessages();
            setTimeout(function() {
                var area = document.getElementById('chatArea');
                if (area) area.scrollTop = area.scrollHeight;
            }, 150);
        }
        function toggleChatMenu(e, id) {
            e.stopPropagation();
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
            const dropdown = document.getElementById('menu_' + id);
            if (dropdown) dropdown.classList.toggle('show');
        }
        function renameChat(id) {
            const chat = chats.find(c => c.id === id);
            const newName = prompt('Новое название:', chat?.title || '');
            if (newName && chat) { chat.title = newName; renderChatList(); }
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
        }
        async function deleteChat(id) {
            if (!confirm('Удалить чат?')) return;
            try {
                await fetch(`${SERVER_URL}/delete_chat?user_id=${currentUserId}&model=flash&chat_id=${id}&session_token=${sessionToken}`, {
                    method: 'DELETE'
                });
            } catch (e) {}
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) currentChatId = chats.length > 0 ? chats[chats.length - 1].id : null;
            renderChatList();
            renderMessages();
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
        }
        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => `
                <div class="chat-item${c.id === currentChatId ? ' active' : ''}" onclick="openChat('${c.id}')">
                    <span class="chat-name">${c.title}</span>
                    <button class="chat-menu-btn" onclick="toggleChatMenu(event, '${c.id}')">...</button>
                    <div class="chat-menu-dropdown" id="menu_${c.id}">
                        <button onclick="renameChat('${c.id}')">Переименовать</button>
                        <button class="delete" onclick="deleteChat('${c.id}')">Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        function renderMessages() {
            const chat = chats.find(c => c.id === currentChatId);
            const area = document.getElementById('chatArea');
            if (!chat || chat.messages.length === 0) {
                area.innerHTML = `<div class="empty-state"><img src="deepseek_logo.png" class="logo-lg" alt="DeepSeek V4 Flash" onerror="this.style.display='none'"><div class="title">DeepSeek V4 Flash</div><div style="color:#666;font-size:13px;">Задайте любой вопрос или прикрепите файл</div></div>`;
            } else {
                area.innerHTML = chat.messages.map((m, i) => {
                    let actionsHtml = '<div class="message-actions">';
                    if (m.role === 'user') actionsHtml += `<button onclick="editMessage(${i})">Редактировать</button>`;
                    actionsHtml += `<button onclick="copyMessage(${i})">Копировать</button>`;
                    if (m.role === 'assistant' && m.interrupted) actionsHtml += `<button onclick="continueMessage(${i})">Продолжить</button>`;
                    actionsHtml += '</div>';
                    return `<div class="message-row ${m.role}"><div><div class="message-content">${formatMessage(m.content)}</div>${actionsHtml}</div></div>`;
                }).join('');
            }
            setTimeout(function() {
                var area = document.getElementById('chatArea');
                if (area) area.scrollTop = area.scrollHeight;
            }, 100);
        }
        function copyCode(btn) {
            const code = btn.previousElementSibling.textContent;
            navigator.clipboard.writeText(code);
            btn.textContent = 'Скопировано';
            setTimeout(() => btn.textContent = 'Копировать', 2000);
        }
        function copyMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) navigator.clipboard.writeText(chat.messages[index].content);
        }
        function editMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                document.getElementById('userInput').value = chat.messages[index].content;
                document.getElementById('userInput').focus();
            }
        }
        function setMode(mode) { currentMode = mode; document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode)); }
        function autoNameChat(chat) {
            const lastAssistant = [...chat.messages].reverse().find(m => m.role === 'assistant');
            if (lastAssistant && chat.title.startsWith('Чат ')) {
                chat.title = lastAssistant.content.replace(/[#*`>\n]/g, ' ').split(' ').slice(0, 6).join(' ') || 'Новый чат';
                if (chat.title.length > 40) chat.title = chat.title.substring(0, 40) + '...';
            }
        }
        function removeFile() {
            pendingFileData = null;
            pendingFileName = '';
            pendingFileMime = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('removeFileBtn').style.display = 'none';
            const ind = document.getElementById('fileIndicator');
            if (ind) ind.remove();
        }
        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            removeFile();
            const reader = new FileReader();
            reader.onload = function(ev) {
                const base64 = ev.target.result.split(',')[1];
                pendingFileData = base64;
                pendingFileName = file.name;
                pendingFileMime = file.type;
                const indicator = document.createElement('div');
                indicator.id = 'fileIndicator';
                indicator.style.cssText = 'padding:6px 12px;background:rgba(34,34,34,0.6);border-radius:8px;font-size:11px;color:#00CBF5;margin-bottom:4px;';
                indicator.textContent = file.name;
                document.querySelector('.input-area').insertBefore(indicator, document.getElementById('userInput'));
                document.getElementById('removeFileBtn').style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }
        async function sendMessage() {
            if (isSending) return;
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !pendingFileData) return;
            if (!currentUserId) { alert('Авторизуйтесь на главной странице'); return; }
            if (!currentChatId) { newChat(); }
            input.value = ''; input.style.height = 'auto'; input._init = false;
            isSending = true;
            document.getElementById('sendBtn').textContent = 'Стоп';
            document.getElementById('sendBtn').onclick = stopTyping;

            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            const displayText = text || (pendingFileName ? `[Файл: ${pendingFileName}]` : '');
            chat.messages.push({ role: 'user', content: displayText });
            renderChatList();
            renderMessages();

            const placeholderId = 'msg_' + Date.now();
            const area = document.getElementById('chatArea');
            const typingRow = document.createElement('div');
            typingRow.className = 'message-row assistant'; typingRow.id = placeholderId;
            typingRow.innerHTML = '<div><div class="message-content">Думаю...</div></div>';
            area.appendChild(typingRow);
            area.scrollTop = area.scrollHeight;

            try {
                const resp = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, message: text, model: 'flash', mode: currentMode, chat_id: currentChatId, file_data: pendingFileData || '', file_name: pendingFileName, file_mime: pendingFileMime })
                });
                const el = document.getElementById(placeholderId); if (el) el.remove();
                if (resp.status === 403) {
                    chat.messages.push({ role: 'assistant', content: 'Сессия устарела. Авторизуйтесь заново на главной странице.' });
                    renderMessages();
                    isSending = false; document.getElementById('sendBtn').textContent = 'Отправить'; document.getElementById('sendBtn').onclick = sendMessage;
                    return;
                }
                if (resp.status === 402) {
                    const data = await resp.json();
                    chat.messages.push({ role: 'assistant', content: 'Недостаточно средств.' });
                    renderMessages(); updateBalance();
                    isSending = false; document.getElementById('sendBtn').textContent = 'Отправить'; document.getElementById('sendBtn').onclick = sendMessage;
                    return;
                }
                if (!resp.ok) {
                    chat.messages.push({ role: 'assistant', content: 'Ошибка сервера. Попробуйте позже.' });
                    renderMessages();
                    isSending = false; document.getElementById('sendBtn').textContent = 'Отправить'; document.getElementById('sendBtn').onclick = sendMessage;
                    return;
                }
                const data = await resp.json();
                if (data.reply) {
                    const fullContent = data.reasoning ? 'Размышление:\n' + data.reasoning + '\n\nОтвет:\n' + data.reply : data.reply;
                    chat.messages.push({ role: 'assistant', content: '', finished: false });
                    const msgIndex = chat.messages.length - 1;
                    renderChatList();
                    const area2 = document.getElementById('chatArea');
                    const newRow = document.createElement('div');
                    newRow.className = 'message-row assistant';
                    newRow.innerHTML = '<div><div class="message-content" id="stream-' + msgIndex + '"></div><div class="message-actions" id="actions-' + msgIndex + '"><button onclick="copyMessage(' + msgIndex + ')">Копировать</button></div></div>';
                    area2.appendChild(newRow);
                    let i = 0;
                    const streamDiv = document.getElementById('stream-' + msgIndex);
                    const streamAction = document.getElementById('actions-' + msgIndex);
                    function streamNext() {
                        if (i < fullContent.length) {
                            chat.messages[msgIndex].content = fullContent.substring(0, i + 1);
                            streamDiv.innerHTML = formatMessage(chat.messages[msgIndex].content);
                            if (autoScroll) {
                                document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                            }
                            i++;
                            setTimeout(streamNext, 5);
                        } else {
                            chat.messages[msgIndex].finished = true;
                            streamAction.innerHTML = '<button onclick="copyMessage(' + msgIndex + ')">Копировать</button>';
                            autoNameChat(chat);
                            renderChatList();
                            if (autoScroll) {
                                document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                            }
                            isSending = false;
                            document.getElementById('sendBtn').textContent = 'Отправить';
                            document.getElementById('sendBtn').onclick = sendMessage;
                        }
                    }
                    streamNext();
                } else {
                    chat.messages.push({ role: 'assistant', content: 'Ошибка. Попробуйте позже.' });
                    renderMessages();
                }
            } catch (e) {
                const el = document.getElementById(placeholderId); if (el) el.remove();
                chat.messages.push({ role: 'assistant', content: 'Ошибка соединения.' });
                renderMessages();
            }
            pendingFileData = null; pendingFileName = ''; pendingFileMime = '';
            const ind = document.getElementById('fileIndicator'); if (ind) ind.remove();
            document.getElementById('removeFileBtn').style.display = 'none';
            isSending = false; document.getElementById('sendBtn').disabled = false;
            updateBalance();
        }
        function formatMessage(text) {
            var B = String.fromCharCode(96);
            if (/^\s*<(!DOCTYPE|html)/i.test(text)) {
                text = B + B + B + 'html\n' + text + '\n' + B + B + B;
            }
            let parts = [];
            let lastIndex = 0;
            const regex = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({type: 'text', content: text.substring(lastIndex, match.index)});
                }
                parts.push({type: 'code', lang: match[1], content: match[2]});
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
                parts.push({type: 'text', content: text.substring(lastIndex)});
            }
            let result = '';
            for (const part of parts) {
                if (part.type === 'code') {
                    result += '<pre><code>' + escapeHtml(part.content) + '</code><button class="copy-btn" onclick="copyCode(this)">Копировать</button></pre>';
                } else {
                    result += escapeHtml(part.content).replace(/`([^`]+)`/g, '<code>' + '$1' + '</code>').replace(/\n/g, '<br>');
                }
            }
            return result;
        }
        function stopTyping() {
            if (typingInterval) {
                clearInterval(typingInterval);
                typingInterval = null;
                const chat = chats.find(c => c.id === currentChatId);
                if (chat && chat.messages.length > 0) {
                    const lastMsg = chat.messages[chat.messages.length - 1];
                    if (lastMsg.role === 'assistant' && !lastMsg.finished) {
                        lastMsg.interrupted = true;
                    }
                }
                renderMessages();
                isSending = false;
                document.getElementById('sendBtn').textContent = 'Отправить';
                document.getElementById('sendBtn').onclick = sendMessage;
            }
        }
        async function continueMessage(index) {
            if (isSending) return;
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            isSending = true;
            document.getElementById('sendBtn').textContent = 'Стоп';
            document.getElementById('sendBtn').onclick = stopTyping;
            try {
                const resp = await fetch(`${SERVER_URL}/get_full_response?user_id=${currentUserId}&model=flash&chat_id=${currentChatId}&session_token=${sessionToken}`);
                if (resp.status === 403) {
                    alert('Сессия устарела.');
                    window.location.href = 'index.html';
                    return;
                }
                const data = await resp.json();
                if (data.full_text) {
                    const fullContent = data.full_text;
                    const startLen = chat.messages[index].content.length;
                    if (fullContent.length <= startLen) {
                        chat.messages[index].finished = true;
                        chat.messages[index].interrupted = false;
                        renderMessages();
                        isSending = false; document.getElementById('sendBtn').textContent = 'Отправить'; document.getElementById('sendBtn').onclick = sendMessage;
                        return;
                    }
                    chat.messages[index].finished = false;
                    chat.messages[index].interrupted = true;
                    const remaining = fullContent.substring(startLen);
                    let i = 0;
                    const streamDiv = document.querySelectorAll('.message-row.assistant .message-content')[index];
                    const streamAction = document.querySelectorAll('.message-row.assistant .message-actions')[index] || document.querySelectorAll('.message-row.assistant')[index]?.querySelector('.message-actions');
                    function streamNext() {
                        if (i < remaining.length) {
                            chat.messages[index].content = fullContent.substring(0, startLen + i + 1);
                            if (streamDiv) streamDiv.innerHTML = formatMessage(chat.messages[index].content);
                            if (autoScroll) {
                                document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                            }
                            i++;
                            setTimeout(streamNext, 5);
                        } else {
                            chat.messages[index].finished = true;
                            chat.messages[index].interrupted = false;
                            if (streamAction) streamAction.innerHTML = '<button onclick="copyMessage(' + index + ')">Копировать</button>';
                            autoNameChat(chat);
                            renderChatList();
                            if (autoScroll) {
                                document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                            }
                            isSending = false;
                            document.getElementById('sendBtn').textContent = 'Отправить';
                            document.getElementById('sendBtn').onclick = sendMessage;
                        }
                    }
                    streamNext();
                } else {
                    renderMessages();
                    isSending = false; document.getElementById('sendBtn').textContent = 'Отправить'; document.getElementById('sendBtn').onclick = sendMessage;
                }
            } catch (e) {
                renderMessages();
                isSending = false; document.getElementById('sendBtn').textContent = 'Отправить'; document.getElementById('sendBtn').onclick = sendMessage;
            }
        }
        document.addEventListener('click', () => document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show')));
    </script>

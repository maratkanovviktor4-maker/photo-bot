    <div id="customPersonalityModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:10001;align-items:center;justify-content:center;">

            <textarea id="customPersonalityInput" placeholder="Опиши, как должен отвечать ассистент..." style="width:100%;min-height:120px;background:#0d0d1a;color:#e0e0e0;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;font-family:Inter,sans-serif;font-size:13px;resize:vertical;outline:none;"></textarea>

                <button id="copyHistoryConfirmBtn" onclick="confirmCopyHistory()" style="padding:8px 16px;background:linear-gradient(90deg,#FFA500,#FF8C00);border:none;color:#201F28;border-radius:8px;cursor:pointer;font-family:Inter,sans-serif;font-weight:600;">Перенести</button>

        <div style="background:#1a1a2e;border-radius:16px;padding:20px;width:90%;max-width:400px;border:1px solid rgba(255,255,255,0.08);">
            <div style="font-size:16px;font-weight:600;margin-bottom:12px;color:#e0e0e0;">📋 Перенос истории</div>
            <div style="margin-bottom:12px;">
                <label style="font-size:12px;color:#aaa;display:block;margin-bottom:4px;font-family:Inter,sans-serif;">Выберите ветку:</label>
                <select id="copyBranchSelect" style="width:100%;padding:8px 10px;background:#0d0d1a;color:#e0e0e0;border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-size:13px;font-family:Inter,sans-serif;outline:none;"></select>

                <button id="copyHistoryConfirmBtn" onclick="confirmCopyHistory()" style="padding:8px 16px;background:linear-gradient(90deg,#FFA500,#FF8C00);border:none;color:#201F28;border-radius:8px;cursor:pointer;font-family:Inter,sans-serif;font-weight:600;">Перенести</button>
            </div>

    <script>
        var autoScroll = true;

        const SERVER_URL = CONFIG.SERVER_URL;
        let currentMode = 'chat';
        let currentPersonality = localStorage.getItem('photobot_personality') || 'default';
        let personalities = {};
        let chats = [];
        let currentChatId = null;
        let currentBranchId = 'main';
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let typingInterval = null;
        let pendingFile = null;
        let activeStreamId = null;
        let allBranchesCache = {};

        window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
        window.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); });
        
        async function loadPersonalities() {
            try {
                var resp = await fetch(SERVER_URL + '/get_personalities?session_token=' + sessionToken);
                if (resp.ok) {
                    var data = await resp.json();
                    personalities = data.personalities;
                    var select = document.getElementById('personalitySelect');
                    select.innerHTML = '';
                    for (var key in personalities) {
                        var opt = document.createElement('option');
                        opt.value = key;
                        opt.textContent = personalities[key].name;
                        if (key === currentPersonality) opt.selected = true;
                        select.appendChild(opt);
                    }
                    var customOpt = document.createElement('option');
                    customOpt.value = 'custom';
                    customOpt.textContent = '🎭 Кастомная...';
                    if (currentPersonality === 'custom') customOpt.selected = true;
                    select.appendChild(customOpt);
                    if (currentPersonality === 'custom') {
                        var customResp = await fetch(SERVER_URL + '/get_custom_personality?user_id=' + currentUserId + '&session_token=' + sessionToken);
                        if (customResp.ok) {
                            var customData = await customResp.json();
                            document.getElementById('customPersonalityInput').value = customData.custom_prompt || '';
                        }
                    }
                }
            } catch(e) { console.error('loadPersonalities:', e); }
        }
        
        function changePersonality() {
            var val = document.getElementById('personalitySelect').value;
            if (val === 'custom') {
                document.getElementById('customPersonalityModal').style.display = 'flex';
                return;
            }
            var oldPersonality = currentPersonality;
            currentPersonality = val;
            localStorage.setItem('photobot_personality', val);
            document.getElementById('personalitySelect').value = val;
            var currentChat = chats.find(function(c) { return c.id === currentChatId; });
            if (currentChat && currentChat.messages.length > 0 && oldPersonality !== val) {
                newChat();
                var newChatObj = chats[chats.length - 1];
                if (newChatObj) {
                    newChatObj._personality = val;
                }
                renderChatList();
                renderMessages();
                var select = document.getElementById('personalitySelect');
                if (select) select.value = val;
                var tempMsg = document.createElement('div');
                tempMsg.style.cssText = 'text-align:center;padding:12px;color:#00CBF5;font-size:13px;font-family:Inter,sans-serif;';
                tempMsg.textContent = '🔄 Новый чат с личностью «' + (personalities[val] ? personalities[val].name : val) + '»';
                document.getElementById('chatArea').appendChild(tempMsg);
                setTimeout(function() { if (tempMsg.parentNode) tempMsg.remove(); }, 3000);
            }
        }
        
        function closeCustomPersonality() {
            document.getElementById('customPersonalityModal').style.display = 'none';
            document.getElementById('personalitySelect').value = currentPersonality;
        }
        
        async function saveCustomPersonality() {
            var prompt = document.getElementById('customPersonalityInput').value.trim();
            if (!prompt) {
                closeCustomPersonality();
                return;
            }
            try {
                await fetch(SERVER_URL + '/save_custom_personality', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, prompt: prompt })
                });
                currentPersonality = 'custom';
                localStorage.setItem('photobot_personality', 'custom');
                document.getElementById('personalitySelect').value = 'custom';
                document.getElementById('customPersonalityModal').style.display = 'none';
            } catch(e) { console.error(e); }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('light');
            var isLight = document.body.classList.contains('light');
            localStorage.setItem('photobot_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
            var hlTheme = document.getElementById('highlightTheme');
            if (hlTheme) {
                hlTheme.href = isLight 
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
            }
            document.querySelectorAll('.floating-code-header').forEach(function(h) {
                h.style.background = isLight ? '#f8f8f8' : '#1a1a2e';
                h.style.color = isLight ? '#555' : '#aaa';
                h.querySelectorAll('button').forEach(function(b) {
                    b.style.color = isLight ? '#555' : '#aaa';
                });
            });
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                if (pre._textarea) {
                    pre._textarea.style.background = isLight ? '#ffffff' : '#0d0d1a';
                    pre._textarea.style.color = isLight ? '#111' : '#e0e0e0';
                    pre._textarea.style.border = isLight ? '1px solid rgba(0,0,0,0.15)' : '1px solid rgba(255,255,255,0.1)';
                }
            });
        }
        
        (function() {
            var saved = localStorage.getItem('photobot_theme');
            var isLight = saved === 'light';
            if (isLight) {
                document.body.classList.add('light');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            var hlTheme = document.getElementById('highlightTheme');
            if (hlTheme) {
                hlTheme.href = isLight 
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
            }
            var savedMode = localStorage.getItem('photobot_mode');
            if (savedMode === 'reasoner') {
                currentMode = 'reasoner';
                var btn = document.getElementById('reasonerToggle');
                if (btn) btn.classList.add('active');
            }
            var savedSidebar = localStorage.getItem('photobot_sidebar');
            if (savedSidebar === 'collapsed') {
                var main = document.querySelector('.main');
                var sidebar = document.querySelector('.sidebar');
                var toggle = document.getElementById('sidebarToggle');
                if (main) {
                    main.style.transition = 'none';
                }
                if (sidebar) sidebar.classList.add('collapsed');
                if (toggle) {
                    toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
                    toggle.title = 'Развернуть панель';
                }
                document.body.classList.add('collapsed-sidebar');
                if (main) {
                    main.offsetHeight;
                    main.style.transition = '';
                }
            }
        })();

        function scrollToBottom() {
            var main = document.querySelector('.main');
            if (!main) return;
            main.style.scrollBehavior = 'auto';
            main.scrollTop = main.scrollHeight;
            main.style.scrollBehavior = 'smooth';
            autoScroll = true;
        }

        var mainEl = document.querySelector('.main');
        if (mainEl) {
            mainEl.addEventListener('scroll', function(e) {
                if (e.target !== mainEl) return;
                var btn = document.getElementById('scrollBottomBtn');
                if (!mainEl) return;
                var atBottom = mainEl.scrollHeight - mainEl.scrollTop - mainEl.clientHeight < 5;
                if (atBottom) {
                    btn.style.display = 'none';
                    autoScroll = true;
                } else {
                    btn.style.display = 'flex';
                    autoScroll = false;
                }
            }, true);
            mainEl.addEventListener('wheel', function(e) {
                autoScroll = false;
                var btn = document.getElementById('scrollBottomBtn');
                if (btn) btn.style.display = 'flex';
            }, true);

        }
        
        (async function checkShareToken() {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');
            if (!token) return;
            
            var savedAuth = localStorage.getItem('photobot_auth');
            if (!savedAuth) {
                alert('Авторизуйтесь сначала, затем откройте ссылку снова.');
                window.location.href = 'index.html';
                return;
            }
            
            var auth = JSON.parse(savedAuth);
            if (!auth.session_token) {
                alert('Сессия устарела. Авторизуйтесь заново.');
                window.location.href = 'index.html';
                return;
            }
            
            try {
                var resp = await fetch(SERVER_URL + '/import_shared_chat?token=' + token + '&session_token=' + auth.session_token);
                if (resp.ok) {
                    var data = await resp.json();
                    window.location.href = 'v4flash.html?chat_id=' + data.chat_id;
                } else {
                    var err = await resp.json();
                    alert('Ошибка импорта: ' + (err.error || 'Неизвестная ошибка'));
                }
            } catch(e) {
                console.error('import error:', e);
                alert('Ошибка соединения при импорте.');
            }
        })();
        
        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            if (!sessionToken || !currentUserId) {
                alert('Сессия устарела. Авторизуйтесь заново на главной странице.');
                window.location.href = 'index.html';
            } else {
                loadChatsFromServer();
                updateBalance();
                loadPersonalities();
            }
        } else {
            alert('Авторизуйтесь на главной странице');
            window.location.href = 'index.html';
        }

        async function loadChatsFromServer() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_chat_history?user_id=${currentUserId}&model=flash&session_token=${sessionToken}`);
                if (resp.status === 403) {
                    alert('Сессия устарела. Авторизуйтесь заново.');
                    window.location.href = 'index.html';
                    return;
                }
                const data = await resp.json();
                if (data.history) {
                    chats = [];
                    for (const [chatId, messages] of Object.entries(data.history)) {
                        const title = data.titles && data.titles[chatId] ? data.titles[chatId] : ('Чат ' + chatId);
                        const activeBranch = data.active_branches && data.active_branches[chatId] ? data.active_branches[chatId] : 'main';
                        const allBranches = data.all_branches && data.all_branches[chatId] ? data.all_branches[chatId] : {};
                        const personality = data.personalities && data.personalities[chatId] ? data.personalities[chatId] : 'default';
                        
                        var lastTime = 0;
                        if (messages && messages.length > 0) {
                            var lastMsg = messages[messages.length - 1];
                            if (lastMsg && lastMsg.timestamp) {
                                lastTime = new Date(lastMsg.timestamp).getTime();
                            }
                        }
                        if (!lastTime) lastTime = parseInt(chatId) || 0;
                        chats.push({
                            id: chatId,
                            title: title,
                            messages: messages,
                            activeBranch: activeBranch,
                            allBranches: allBranches,
                            _personality: personality,
                            lastMessageTime: lastTime
                        });
                    }
                    chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
                }
            } catch (e) {
                console.error('loadChatsFromServer error:', e);
            }
            if (chats.length === 0) {
                const chat = { id: String(Date.now()), title: 'Новый чат', messages: [], activeBranch: 'main', allBranches: { 'main': { name: 'Основная', messages: [], msg_ids: [] } } };
                chats.push(chat);
            }
            renderChatList();
            var savedId = localStorage.getItem('photobot_active_chat');
            var found = savedId ? chats.find(function(c) { return c.id === savedId; }) : null;
            currentChatId = found ? found.id : (chats.length > 0 ? chats[chats.length - 1].id : null);
            if (currentChatId) {
                var chat = chats.find(function(c) { return c.id === currentChatId; });
                if (chat) {
                    currentBranchId = chat.activeBranch || 'main';
                }
                openChat(currentChatId);
            } else {
                renderMessages();
            }
        }
        
        async function updateBalance() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_balance?user_id=${currentUserId}&session_token=${sessionToken}`);
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('balanceDisplay').textContent = `${data.flash.toFixed(1)} Stars`;
                }
            } catch(e) {
                console.error(e);
            }

        function renderBranchesPanel() {
            var panel = document.getElementById('branchesPanel');
            var list = document.getElementById('branchesList');
            var chat = chats.find(function(c) { return c.id === currentChatId; });
            
            if (!chat || !chat.allBranches || Object.keys(chat.allBranches).length <= 1) {
                panel.style.display = 'none';
                return;
            }
            
            panel.style.display = 'block';
            var branches = chat.allBranches;
            
            var sortedIds = Object.keys(branches).sort(function(a, b) {
                if (a === 'main') return -1;
                if (b === 'main') return 1;
                var aCount = (branches[a].msg_ids && branches[a].msg_ids.length) || 0;
                var bCount = (branches[b].msg_ids && branches[b].msg_ids.length) || 0;
                if (aCount !== bCount) return bCount - aCount;
                var aMsgs = branches[a].messages || [];
                var bMsgs = branches[b].messages || [];
                var aTime = aMsgs.length > 0 ? (aMsgs[aMsgs.length - 1].timestamp ? new Date(aMsgs[aMsgs.length - 1].timestamp).getTime() : 0) : 0;
                var bTime = bMsgs.length > 0 ? (bMsgs[bMsgs.length - 1].timestamp ? new Date(bMsgs[bMsgs.length - 1].timestamp).getTime() : 0) : 0;
                return aTime - bTime;
            });
            
            list.innerHTML = sortedIds.map(function(bid) {
                var b = branches[bid];
                var isFromAssistant = (b.source_role === 'assistant');
                var iconColor = isFromAssistant ? '#4caf50' : '#00CBF5';
                var rowClass = 'branch-item' + (bid === currentBranchId ? ' active' : '') + (isFromAssistant ? ' branch-from-assistant' : '');
                return '<div class="' + rowClass + '" onclick="switchBranch(\'' + bid + '\')" style="' + (isFromAssistant && bid !== currentBranchId ? '--branch-hover-bg: rgba(76,175,80,0.12);' : '') + '">' +
                    '<svg class="branch-icon" viewBox="0 0 48 48" style="transform: scaleY(-1);"><path d="M44,9a7,7,0,1,0-9,6.7V16a6,6,0,0,1-6,6H21a10.3,10.3,0,0,0-6,2V15.7a7,7,0,1,0-4,0V32.3a7,7,0,1,0,4,0V32a6,6,0,0,1,6-6h8A10,10,0,0,0,39,16v-.3A7,7,0,0,0,44,9ZM10,9a3,3,0,0,1,6,0,3,3,0,0,1-6,0Zm6,30a3,3,0,1,1-3-3A2.9,2.9,0,0,1,16,39ZM37,12a2.9,2.9,0,0,1-3-3,3,3,0,0,1,6,0A2.9,2.9,0,0,1,37,12Z" fill="' + iconColor + '"/></svg>' +
                    '<span class="branch-name">' + escapeHtml(b.name || bid) + '</span>' +
                    '<span style="font-size:10px;color:#666;">' + ((b.msg_ids && b.msg_ids.length) || 0) + '</span>' +
                    (bid !== 'main' ? '<button class="branch-delete-btn" onclick="event.stopPropagation();deleteBranch(\'' + bid + '\')" title="Удалить ветку" style="background:transparent;border:none;color:#e74c3c;cursor:pointer;font-size:12px;padding:0 4px;">✕</button>' : '') +
                    '<button class="branch-rename-btn" onclick="event.stopPropagation();renameBranch(\'' + bid + '\')" title="Переименовать" style="background:transparent;border:none;color:#888;cursor:pointer;font-size:12px;padding:0 4px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>' +
                    '</div>';
            }).join('');
        }

            var chat = chats.find(function(c) { return c.id === currentChatId; });

        async function createBranchFromMessage(msgIndex) {
            if (isSending) return;
            var chat = chats.find(function(c) { return c.id === currentChatId; });
            if (!chat) return;
            var msg = chat.messages[msgIndex];
            if (!msg) return;
            
            isSending = true;
            sendBtnStop();
            
            // Затираем только сообщения ПОСЛЕ msgIndex
            chat.messages = chat.messages.slice(0, msgIndex + 1);
            renderMessages();
            
            var placeholderId = null;
            var isAssistant = (msg.role === 'assistant');
            if (!isAssistant) {
                placeholderId = 'branch_create_' + Date.now();
                var area = document.getElementById('chatArea');
                var loadingRow = document.createElement('div');
                loadingRow.className = 'message-row assistant';
                loadingRow.id = placeholderId;
                loadingRow.innerHTML = '<div><div class="message-content"><svg width="40" height="8" viewBox="0 0 40 8"><circle cx="4" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle><circle cx="16" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="28" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle></svg></div></div>';
                area.appendChild(loadingRow);
                var main = document.querySelector('.main');
                if (main) { main.scrollTop = main.scrollHeight; }
            }
            
            try {
                var resp = await fetch(SERVER_URL + '/create_branch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        model: 'flash',
                        mode: currentMode,
                        chat_id: currentChatId,
                        source_msg_id: msg.msg_id,
                        branch_name: '',
                        prompt: msg.role === 'user' ? (msg.content || '') : ''
                    })
                });
                
                if (placeholderId) {
                    var el = document.getElementById(placeholderId);
                    if (el) el.remove();
                }
                
                if (resp.ok) {
                    var data = await resp.json();
                    
                    // Переключаемся в новую ветку
                    currentBranchId = data.branch_id;
                    chat.activeBranch = data.branch_id;
                    
                    // Загружаем полное дерево с сервера (НЕ перезаписываем chat.messages)
                    await updateBranchesFromServer();
                    
                    // Восстанавливаем историю ДО из загруженной ветки, но без assistant-ответа
                    if (chat.allBranches && chat.allBranches[data.branch_id]) {
                        chat.messages = chat.allBranches[data.branch_id].messages || [];
                    } else {
                        chat.messages = [];
                    }
                    
                    renderChatList();
                    renderBranchesPanel();
                    
                    // Если есть reply — стримим ответ ассистента
                    if (data.reply) {
                        // Убираем последний assistant из messages (сервер уже сохранил его в ветку)
                        while (chat.messages.length > 0 && chat.messages[chat.messages.length - 1].role === 'assistant') {
                            chat.messages.pop();
                        }
                        var fullContent = data.reasoning ? 'Размышление:\n' + data.reasoning + '\n\nОтвет:\n' + data.reply : data.reply;
                        var assistantMsg = { role: 'assistant', content: '', finished: false, _streamWords: null, _streamPos: 0, _reasoningInProgress: false, msg_id: data.assistant_msg_id || null };
                        chat.messages.push(assistantMsg);
                        var newMsgIndex = chat.messages.length - 1;
                        var streamId = 'branch_stream_' + newMsgIndex;
                        activeStreamId = streamId;
                        
                        renderMessages();
                        streamReplyIntoChat(chat, newMsgIndex, fullContent, streamId, function() {
                            chat.lastMessageTime = Date.now();
                            chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
                            autoNameChat(chat);
                            updateBranchesFromServer().then(function() {
                                renderChatList();
                                renderBranchesPanel();
                            });
                            updateBalance();
                            isSending = false;
                            activeStreamId = null;
                            sendBtnArrow();
                        });
                    } else {
                        renderMessages();
                        updateBalance();
                        isSending = false;
                        sendBtnArrow();
                    }
                } else {
                    var errData = await resp.json();
                    alert('Ошибка: ' + (errData.error || 'Неизвестная ошибка'));
                    isSending = false;
                    sendBtnArrow();
                }
            } catch(e) {
                if (placeholderId) {
                    var el2 = document.getElementById(placeholderId);
                    if (el2) el2.remove();
                }
                console.error('createBranchFromMessage error:', e);
                alert('Ошибка соединения.');
                isSending = false;
                sendBtnArrow();
            }
        }

            loadingRow.innerHTML = '<div><div class="message-content"><svg width="40" height="8" viewBox="0 0 40 8"><circle cx="4" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle><circle cx="16" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="28" cy="4" r="3" fill="#00CBF5"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle></svg></div></div>';
            area.appendChild(loadingRow);

            try {
                var resp = await fetch(SERVER_URL + '/regenerate_assistant', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        model: 'flash',
                        mode: currentMode,
                        chat_id: currentChatId,
                        branch_id: currentBranchId,
                        edit_msg_id: msg.msg_id
                    })
                });
                
                var el = document.getElementById(placeholderId);
                if (el) el.remove();
                
                if (resp.ok) {
                    var data = await resp.json();
                    
                    var fullContent = data.reasoning ? 'Размышление:\n' + data.reasoning + '\n\nОтвет:\n' + data.reply : data.reply;
                    var assistantMsg = { role: 'assistant', content: '', finished: false, _streamWords: null, _streamPos: 0, _reasoningInProgress: false, msg_id: data.assistant_msg_id || null };
                    chat.messages.push(assistantMsg);
                    var newMsgIndex = chat.messages.length - 1;
                    var streamId = 'regen_assistant_stream_' + newMsgIndex;
                    activeStreamId = streamId;
                    
                    renderMessages();
                    streamReplyIntoChat(chat, newMsgIndex, fullContent, streamId, function() {
                        chat.lastMessageTime = Date.now();
                        chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));

                        updateBranchesFromServer();

                var el2 = document.getElementById(placeholderId);

        }
        
        function streamReplyIntoChat(chat, msgIndex, fullContent, streamId, onComplete) {
            var words = fullContent.split(/(\s+)/);
            chat.messages[msgIndex]._streamWords = words;
            var pos = 0;
            var reasoningStarted = false;
            var reasoningEnded = false;
            
            var isLong = fullContent.length > 1000;
            var wordsPerChunk = isLong ? 8 : 2;
            var delayMs = isLong ? 15 : 20;
            
            function streamNext() {
                if (activeStreamId !== streamId) return;
                var chunk = '';
                var wc = 0;
                while (pos < words.length && wc < wordsPerChunk) { chunk += words[pos]; wc++; pos++; }
                chat.messages[msgIndex]._streamPos = pos;
                if (chunk) {
                    var ft = words.slice(0, pos).join('');
                    chat.messages[msgIndex].content = ft;
                    if (!reasoningStarted && ft.indexOf('Размышление:\n') !== -1) { reasoningStarted = true; chat.messages[msgIndex]._reasoningInProgress = true; }
                    if (reasoningStarted && !reasoningEnded) {
                        var ei = ft.indexOf('\n\nОтвет:\n');
                        if (ei !== -1) {
                            reasoningEnded = true; chat.messages[msgIndex]._reasoningInProgress = false;
                            chat.messages[msgIndex].reasoning = ft.substring('Размышление:\n'.length, ei);
                        }
                    }
                    if (activeStreamId !== streamId) return;
                    var reasonHtml = '';
                    if (chat.messages[msgIndex].reasoning) {
                        reasonHtml = '<div class="reasoning-block">' + formatMessage(chat.messages[msgIndex].reasoning) + '</div>';
                    } else if (chat.messages[msgIndex]._reasoningInProgress) {
                        var startIdx = ft.indexOf('Размышление:\n');
                        if (startIdx !== -1) {
                            reasonHtml = '<div class="reasoning-block">' + escapeHtml(ft.substring(startIdx + 'Размышление:\n'.length)).replace(/\n/g, '<br>') + '</div>';
                        }
                    }
                    var displayText = ft;
                    if (chat.messages[msgIndex].reasoning) {
                        var endIdx = ft.indexOf('\n\nОтвет:\n');
                        if (endIdx !== -1) {
                            displayText = ft.substring(endIdx + '\n\nОтвет:\n'.length);
                        }
                    } else if (chat.messages[msgIndex]._reasoningInProgress) {
                        var startIdx2 = ft.indexOf('Размышление:\n');
                        if (startIdx2 !== -1) {
                            displayText = '';
                        }
                    }
                    var el = document.getElementById('stream-' + msgIndex);
                    if (el) {
                        el.innerHTML = reasonHtml + formatMessage(displayText);
                        void el.offsetHeight;
                        if (autoScroll) {
                            var main = document.querySelector('.main');
                            if (main) {
                                void main.offsetHeight;
                                main.scrollTop = main.scrollHeight;
                            }
                        }


                    }


                    if (autoScroll) { var m3 = document.querySelector('.main'); if (m3) { m3.scrollTop = m3.scrollHeight; } }
                    typingInterval = setTimeout(streamNext, delayMs);
                } else {
                    chat.messages[msgIndex].finished = true;
                    chat.messages[msgIndex].interrupted = false;
                    typingInterval = null;
                    renderMessages();
                    if (onComplete) onComplete();
                }
            }
            streamNext();
        }

        async function updateBranchesFromServer() {
            try {
                var resp = await fetch(SERVER_URL + '/get_chat_tree?user_id=' + currentUserId + '&model=flash&chat_id=' + currentChatId + '&session_token=' + sessionToken);
                if (resp.ok) {
                    var data = await resp.json();
                    var chat = chats.find(function(c) { return c.id === currentChatId; });
                    if (chat) {
                        var branches = {};
                        if (data.branches) {
                            for (var bid in data.branches) {
                                var branchData = data.branches[bid];
                                var msgIds = branchData.msg_ids || branchData;
                                // Поддержка старого формата (массив) и нового (объект)
                                if (Array.isArray(branchData)) {
                                    msgIds = branchData;
                                }
                                var msgs = [];
                                for (var i = 0; i < msgIds.length; i++) {
                                    if (data.messages[msgIds[i]]) {
                                        msgs.push(data.messages[msgIds[i]]);
                                    }
                                }
                                branches[bid] = {
                                    name: (branchData.name) || (chat.allBranches && chat.allBranches[bid] ? chat.allBranches[bid].name : 'Ветка'),
                                    messages: msgs,
                                    msg_ids: msgIds,
                                    source_role: branchData.source_role || 'user'

                        renderBranchesPanel();
                    }
                }

        }
        
        function formatMessage(text) {
            var B = String.fromCharCode(96);
            if (/^\s*<(!DOCTYPE|html)/i.test(text)) {
                text = B + B + B + 'html\n' + text + '\n' + B + B + B;
            }
            let parts = [];
            let lastIndex = 0;
            const regex = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({type: 'text', content: text.substring(lastIndex, match.index)});
                }
                parts.push({type: 'code', lang: match[1], content: match[2]});
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
                var remaining = text.substring(lastIndex);
                var openCode = remaining.match(new RegExp('^([\\s\\S]*?)' + B + B + B + '(\\w*)\\r?\\n([\\s\\S]*)'));
                if (openCode) {
                    if (openCode[1]) {
                        parts.push({type: 'text', content: openCode[1]});
                    }
                    parts.push({type: 'code', lang: openCode[2], content: openCode[3]});
                } else {
                    parts.push({type: 'text', content: remaining});
                }
            }
            let result = '';
            for (const part of parts) {
                if (part.type === 'code') {
                    var lang = part.lang || '';
                    result += '<pre><code class="' + (lang ? 'language-' + escapeHtml(lang) : '') + '">' + escapeHtml(part.content) + '</code></pre>';
                } else {
                    var text2 = escapeHtml(part.content);
                    text2 = text2.replace(/`([^`]+)`/g, '<code>$1</code>');
                    text2 = text2.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    text2 = text2.replace(/\*(.+?)\*/g, '<em>$1</em>');
                    text2 = text2.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
                    text2 = text2.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                    text2 = text2.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
                    text2 = text2.replace(/^## (.+)$/gm, '<h2>$1</h2>');
                    text2 = text2.replace(/^# (.+)$/gm, '<h1>$1</h1>');
                    text2 = text2.replace(/^---$/gm, '<hr>');
                    text2 = text2.replace(/^[-*]\s(.+)$/gm, '<li>$1</li>');
                    text2 = text2.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');
                    text2 = text2.replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>');
                    text2 = text2.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ol>$1</ol>');
                    text2 = text2.replace(/~~(.+?)~~/g, '<del>$1</del>');
                    text2 = text2.replace(/!\[(.+?)\]\((.+?)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:8px 0;" loading="lazy">');
                    text2 = text2.replace(/^&gt;\s(.+)$/gm, '<blockquote>$1</blockquote>');
                    text2 = text2.replace(/\n/g, '<br>');
                    result += text2;
                }
            }
            return result;
        }

                    previewBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Предпросмотр';
                    previewBtn.style.cssText = 'background:transparent; border:none; color:#aaa; cursor:pointer; padding:4px 6px; border-radius:4px; font-family:Inter,sans-serif; font-size:11px; pointer-events:auto;';
                    previewBtn.onmouseenter = function() { previewBtn.style.background = document.body.classList.contains('light') ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.08)'; };
                    previewBtn.onmouseleave = function() { previewBtn.style.background = 'transparent'; };
                    previewBtn.onclick = function() {
                        var code = pre._editorActive && pre._textarea ? pre._textarea.value : (pre.querySelector('code') ? pre.querySelector('code').textContent : '');
                        var panel = document.getElementById('previewPanel');
                        var iframe = document.getElementById('previewIframe');
                        var handle = document.getElementById('resizeHandle');
                        if (!panel) {
                            panel = document.createElement('div');
                            panel.id = 'previewPanel';
                            panel.className = 'preview-panel';
                            panel.innerHTML = '<div class="preview-header"><span class="preview-title">Предпросмотр</span><button class="preview-close" onclick="closePreview()">✕</button></div><iframe id="previewIframe" class="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>';
                            document.body.appendChild(panel);
                            iframe = document.getElementById('previewIframe');
                        }
                        if (!handle) {
                            handle = document.createElement('div');
                            handle.id = 'resizeHandle';
                            handle.className = 'resize-handle';
                            document.body.appendChild(handle);
                            handle._startX = 0;
                            handle._startWidth = 50;
                            handle.addEventListener('pointerdown', function(e) {
                                e.preventDefault();
                                handle.setPointerCapture(e.pointerId);
                                handle._startX = e.clientX;
                                handle._startWidth = parseInt(getComputedStyle(document.body).getPropertyValue('--preview-width')) || 50;
                                handle.classList.add('dragging');
                                document.body.style.userSelect = 'none';
                            });
                            handle.addEventListener('pointermove', function(e) {
                                if (!handle.classList.contains('dragging')) return;
                                var dx = handle._startX - e.clientX;
                                var mainWidth = document.querySelector('.main').clientWidth;
                                var minChat = 400;
                                var maxPw = ((mainWidth - minChat) / window.innerWidth) * 100;
                                if (maxPw < 20) maxPw = 20;
                                if (maxPw > 80) maxPw = 80;
                                var newWidth = Math.max(20, Math.min(maxPw, handle._startWidth + (dx / window.innerWidth) * 100));
                                document.body.style.setProperty('--preview-width', newWidth + '%');
                                handle.style.right = newWidth + '%';
                                updateFloatingButtons();
                            });
                            handle.addEventListener('pointerup', function(e) {
                                handle.classList.remove('dragging');
                                document.body.style.userSelect = '';
                                handle.releasePointerCapture(e.pointerId);
                            });
                            handle.addEventListener('pointercancel', function(e) {
                                handle.classList.remove('dragging');
                                document.body.style.userSelect = '';
                                handle.releasePointerCapture(e.pointerId);
                            });
                        }
                        document.body.style.setProperty('--preview-width', '50%');
                        panel.classList.add('active');
                        handle.classList.add('active');
                        handle.style.right = '50%';
                        document.querySelector('.main').classList.add('preview-open');
                        updateFloatingButtons();
                        var main = document.querySelector('.main');
                        if (main) {
                            var rafId;
                            var tick = function() {
                                updateFloatingButtons();
                                rafId = requestAnimationFrame(tick);
                            };
                            rafId = requestAnimationFrame(tick);
                            main.addEventListener('transitionend', function() {
                                cancelAnimationFrame(rafId);
                                updateFloatingButtons();
                            }, { once: true });
                        }
                        iframe.srcdoc = code;
                    };
                    actions.appendChild(previewBtn);
                }
                if (document.body.classList.contains('light')) {
                    editBtn.style.color = '#555';
                    copyBtn.style.color = '#555';
                    downloadBtn.style.color = '#555';
                    if (typeof previewBtn !== 'undefined') previewBtn.style.color = '#555';
                }
                updateFloatingButtons();
            });
        }

        function toggleCodeEditor(pre) {
            var codeEl = pre.querySelector('code');
            if (!codeEl) return;

            if (pre._editorActive) {
                var textarea = pre._textarea;
                var newCode = textarea ? textarea.value : '';
                codeEl.textContent = newCode;
                if (textarea) textarea.remove();
                if (pre._editorToolbar) pre._editorToolbar.remove();
                codeEl.style.display = '';
                pre._editorActive = false;
                pre._textarea = null;
                pre._editorToolbar = null;
                if (typeof hljs !== 'undefined' && hljs.highlightElement) {
                    hljs.highlightElement(codeEl);
                }
            } else {
                var originalCode = codeEl.textContent;
                pre._originalCode = originalCode;
                codeEl.style.display = 'none';

                var toolbar = document.createElement('div');
                toolbar.style.cssText = 'display:flex;gap:6px;padding:6px 0;align-items:center;';
                toolbar.innerHTML = '<span style="font-size:11px;color:#aaa;font-family:Inter,sans-serif;">Редактор</span>' +
                    '<button class="editor-apply-btn" style="background:#00CBF5;border:none;color:#201F28;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Inter,sans-serif;font-weight:600;">✅ Применить</button>' +
                    '<button class="editor-cancel-btn" style="background:transparent;border:1px solid #666;color:#aaa;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Inter,sans-serif;">↩ Отмена</button>';
                pre.appendChild(toolbar);
                pre._editorToolbar = toolbar;

                var textarea = document.createElement('textarea');
                textarea.value = originalCode;
                textarea.style.cssText = 'width:100%;min-height:200px;background:#0d0d1a;color:#e0e0e0;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:10px;font-family:\'Courier New\',monospace;font-size:13px;resize:vertical;outline:none;';
                if (document.body.classList.contains('light')) {
                    textarea.style.background = '#ffffff';
                    textarea.style.color = '#111';
                    textarea.style.border = '1px solid rgba(0,0,0,0.15)';
                }
                pre.appendChild(textarea);
                pre._textarea = textarea;
                pre._editorActive = true;

                toolbar.querySelector('.editor-apply-btn').onclick = function() {
                    toggleCodeEditor(pre);
                };
                toolbar.querySelector('.editor-cancel-btn').onclick = function() {
                    var orig = pre._originalCode || '';
                    codeEl.textContent = orig;
                    toggleCodeEditor(pre);
                };
            }
        }
        
        function updateFloatingButtons() {
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                var header = pre._floatHeader;
                if (!header) return;
                var rect = pre.getBoundingClientRect();
                var topBar = document.querySelector('.top-bar');
                var topBarBottom = topBar ? topBar.getBoundingClientRect().bottom : 0;
                var visibleTop = Math.max(rect.top, topBarBottom);
                var visibleBottom = Math.min(rect.bottom, window.innerHeight);
                var visibleHeight = visibleBottom - visibleTop;
                var visible = visibleHeight >= 28;
                if (visible) {
                    header.style.display = 'flex';
                    var headerHeight = header.offsetHeight || 28;
                    var top = visibleTop;
                    var bottomLimit = rect.bottom - headerHeight;
                    if (top > bottomLimit) {
                        top = bottomLimit;
                    }
                    if (top < topBarBottom) {
                        top = topBarBottom;
                    }
                    header.style.top = top + 'px';
                    header.style.left = rect.left + 'px';
                    header.style.right = 'auto';
                    header.style.width = rect.width + 'px';
                } else {
                    header.style.display = 'none';
                }
            });
        }

        function buildNavContainer() {
            var container = document.getElementById('navContainer');
            if (!container) return;
            var chat = chats.find(c => c.id === currentChatId);
            if (!chat || chat.messages.length === 0) { container.innerHTML = ''; return; }
            var html = '';
            for (var i = 0; i < chat.messages.length; i++) {
                if (chat.messages[i].role === 'user' && chat.messages[i].content) {
                    var preview = chat.messages[i].content.substring(0, 80);
                    html += '<div class="nav-strip" data-msg-index="' + i + '" onclick="scrollToMsg(' + i + ')"><div class="nav-bar"></div><span class="nav-text">' + escapeHtml(preview) + '</span></div>';
                }
            }
            container.innerHTML = html;
        }
        
        function updateActiveNavFromScroll() {
            var main = document.querySelector('.main');
            if (!main) return;
            var rows = main.querySelectorAll('.message-row[data-msg-index]');
            var areaRect = main.getBoundingClientRect();
            var closestIndex = null;
            var closestDist = Infinity;
            for (var r = 0; r < rows.length; r++) {
                var rect = rows[r].getBoundingClientRect();
                var mid = rect.top + rect.height / 2;
                var dist = Math.abs(mid - (areaRect.top + areaRect.height / 2));
                if (dist < closestDist) {
                    closestDist = dist;
                    closestIndex = rows[r].getAttribute('data-msg-index');
                }
            }
            document.querySelectorAll('.nav-strip').forEach(function(s) { s.classList.remove('active'); });
            if (closestIndex !== null) {
                var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + closestIndex + '"]');
                if (activeStrip) {
                    activeStrip.classList.add('active');
                    var container = document.getElementById('navContainer');
                    if (container) {
                        var stripTop = activeStrip.offsetTop;
                        var containerH = container.clientHeight;
                        container.scrollTo({ top: stripTop - containerH / 2 + activeStrip.offsetHeight / 2, behavior: 'smooth' });
                    }
                }
            }
        }
        
        var mainEl2 = document.querySelector('.main');
        if (mainEl2) {
            mainEl2.addEventListener('scroll', updateActiveNavFromScroll);
        }
        document.getElementById('navContainer').addEventListener('wheel', function(e) {
            e.stopPropagation();
        });
        
        function scrollToMsg(index) {
            var main = document.querySelector('.main');
            if (!main) return;
            main.style.scrollBehavior = 'auto';
            var target = main.querySelector('.message-row[data-msg-index="' + index + '"]');
            if (target) {
                target.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
            main.style.scrollBehavior = 'smooth';
            document.querySelectorAll('.nav-strip').forEach(function(s) { s.classList.remove('active'); });
            var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + index + '"]');
            if (activeStrip) { activeStrip.classList.add('active'); }
        }

        function closePreview() {
            var panel = document.getElementById('previewPanel');
            var handle = document.getElementById('resizeHandle');
            if (panel) panel.classList.remove('active');
            if (handle) handle.classList.remove('active');
            document.querySelector('.main').classList.remove('preview-open');
            var main = document.querySelector('.main');
            if (main) {
                var rafId;
                var tick = function() {
                    updateFloatingButtons();
                    rafId = requestAnimationFrame(tick);
                };
                rafId = requestAnimationFrame(tick);
                main.addEventListener('transitionend', function() {
                    cancelAnimationFrame(rafId);
                    updateFloatingButtons();
                }, { once: true });
            }
        }

        window.addEventListener('load', function() {
            setupFloatingCopyButtons();
        });
        window.addEventListener('scroll', updateFloatingButtons, true);
        window.addEventListener('resize', updateFloatingButtons);
    </script>
</body>

                <div class="input-area" id="inputArea">

                            <textarea id="userInput" placeholder="Введите сообщение..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();if(isSending){stopTyping();}else{sendMessage();}}" oninput="this.style.height='auto';var h=this.scrollHeight;this.style.height=Math.min(h,300)+'px';" onfocus="if(!this._init){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,300)+'px';this._init=true;}"></textarea>

                            <button id="sendBtn" onclick="sendMessage()" title="Отправить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>

    <div id="loadingSpinner" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(32,31,40,0.8);z-index:99998;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
        <div style="width:32px;height:32px;border:3px solid rgba(0,203,245,0.2);border-top-color:#00CBF5;border-radius:50%;animation:spin 0.8s linear infinite;"></div>

    <!-- Модалка переименования -->
    <div id="renameModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon" style="background:rgba(0,203,245,0.15);color:#00CBF5;">✏️</div>
            <div class="modal-title" id="renameModalTitle" style="margin-bottom:16px;">Переименовать</div>
            <div style="margin-bottom:20px;">
                <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;font-family:Inter,sans-serif;font-weight:500;">НОВОЕ НАЗВАНИЕ</label>
                <input type="text" id="renameInput" style="width:100%;padding:12px 14px;background:#0d0d1a;color:#e0e0e0;border:2px solid rgba(255,255,255,0.1);border-radius:12px;font-size:14px;font-family:Inter,sans-serif;outline:none;transition:all 0.2s ease;font-weight:500;" placeholder="Введите название...">
            </div>
            <div class="modal-actions" style="gap:12px;">
                <button class="modal-btn-secondary" onclick="closeRenameModal()" style="flex:1;padding:12px;">Отмена</button>
                <button id="renameConfirmBtn" class="modal-btn-primary" onclick="confirmRename()" style="flex:1;padding:12px;">Сохранить</button>
            </div>

    <script>
        var autoScroll = true;
        const SERVER_URL = CONFIG.SERVER_URL;
        let currentPersonality = localStorage.getItem('photobot_personality') || 'default';
        let personalities = {};
        let chats = [];
        let currentChatId = null;
        let currentBranchId = 'main';
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let currentMode = localStorage.getItem('photobot_mode') || 'chat';
        let typingInterval = null;
        let pendingFile = null;
        let activeStreamId = null;

        window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
        window.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); });

        async function loadPersonalities() {
            try {
                var resp = await fetch(SERVER_URL + '/get_personalities?session_token=' + sessionToken);
                if (resp.ok) {
                    var data = await resp.json();
                    personalities = data.personalities;
                    var select = document.getElementById('personalitySelect');
                    select.innerHTML = '';
                    var keys = Object.keys(personalities);
                    for (var i = 0; i < keys.length; i++) {
                        var key = keys[i];
                        var opt = document.createElement('option');
                        opt.value = key;
                        opt.textContent = personalities[key].name;
                        if (key === currentPersonality) opt.selected = true;
                        select.appendChild(opt);
                    }
                    var customOpt = document.createElement('option');
                    customOpt.value = 'custom';
                    customOpt.textContent = '\uD83C\uDFAD Кастомная...';
                    if (currentPersonality === 'custom') customOpt.selected = true;
                    select.appendChild(customOpt);
                    updatePersonalityPrompt(currentPersonality);
                    document.getElementById('editCustomBtn').style.display = currentPersonality === 'custom' ? 'inline-flex' : 'none';
                    if (currentPersonality === 'custom') {
                        var customResp = await fetch(SERVER_URL + '/get_custom_personality?user_id=' + currentUserId + '&session_token=' + sessionToken);
                        if (customResp.ok) {
                            var customData = await customResp.json();
                            document.getElementById('customPersonalityInput').value = customData.custom_prompt || '';
                        }
                    }
                }
            } catch(e) { console.error('loadPersonalities:', e); }
        }
        function updatePersonalityPrompt(key) {
            var promptEl = document.getElementById('personalityPrompt');
            if (!promptEl) return;
            if (key === 'custom') {
                var customPrompt = localStorage.getItem('photobot_custom_prompt') || '';
                promptEl.textContent = customPrompt || '🎭 Своя роль';
                promptEl.title = customPrompt || 'Своя роль';
                return;
            }
            var p = personalities[key];
            if (p && p.prompt) {
                promptEl.textContent = p.prompt;
                promptEl.title = p.prompt;
            } else {
                promptEl.textContent = '';
                promptEl.title = '';
            }
        }
        function showCustomPersonalityModal() {
            document.getElementById('personalitySelect').blur();
            document.getElementById('customPersonalityInput').value = '';
            document.getElementById('customPersonalityModal').classList.add('active');
            setTimeout(function() { document.getElementById('customPersonalityInput').focus(); }, 100);
        }

        function closeCustomPersonalityModal() {
            document.getElementById('customPersonalityModal').classList.remove('active');
            document.getElementById('personalitySelect').value = currentPersonality;
            document.getElementById('editCustomBtn').style.display = currentPersonality === 'custom' ? 'inline-flex' : 'none';
        }

        function confirmCustomPersonality() {
            var newPrompt = document.getElementById('customPersonalityInput').value.trim();
            if (newPrompt) {
                saveCustomPersonality();
                updatePersonalityPrompt('custom');
                document.getElementById('customPersonalityModal').classList.remove('active');
                document.getElementById('editCustomBtn').style.display = 'inline-flex';
            }
        }
        function changePersonality() {
            var val = document.getElementById('personalitySelect').value;
            if (val === 'custom') {
                showCustomPersonalityModal();
                return;
            }
            currentPersonality = val;
            localStorage.setItem('photobot_personality', val);
            document.getElementById('personalitySelect').value = val;
            document.getElementById('editCustomBtn').style.display = val === 'custom' ? 'inline-flex' : 'none';
            updatePersonalityPrompt(val);
            var currentChat = chats.find(function(c) { return c.id === currentChatId; });
            if (currentChat) {
                currentChat._personality = val;
            }
        }

        async function saveCustomPersonality() {
            var prompt = document.getElementById('customPersonalityInput') ? document.getElementById('customPersonalityInput').value.trim() : '';
            if (!prompt) return;
            localStorage.setItem('photobot_custom_prompt', prompt);
            try {
                await fetch(SERVER_URL + '/save_custom_personality', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, prompt: prompt })
                });
                currentPersonality = 'custom';
                localStorage.setItem('photobot_personality', 'custom');
                document.getElementById('personalitySelect').value = 'custom';
            } catch(e) { console.error(e); }
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            var isLight = document.body.classList.contains('light');
            localStorage.setItem('photobot_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isLight ? '\uD83C\uDF19' : '\u2600\uFE0F';
            var hlTheme = document.getElementById('highlightTheme');
            if (hlTheme) {
                hlTheme.href = isLight
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
            }
            _floatingHeaders = [];
            updateFloatingButtons();
        }

        (function() {
            var saved = localStorage.getItem('photobot_theme');
            var isLight = saved === 'light';
            if (isLight) {
                document.body.classList.add('light');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            var hlTheme = document.getElementById('highlightTheme');
            if (hlTheme) {
                hlTheme.href = isLight 
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
            }
            var savedMode = localStorage.getItem('photobot_mode');
            if (savedMode === 'reasoner') {
                currentMode = 'reasoner';
                var btn = document.getElementById('reasonerToggle');
                if (btn) btn.classList.add('active');
            }
            var savedSidebar = localStorage.getItem('photobot_sidebar');
            if (savedSidebar === 'collapsed') {
                var main = document.querySelector('.main');
                var sidebar = document.querySelector('.sidebar');
                var toggle = document.getElementById('sidebarToggle');
                if (main) main.style.transition = 'none';
                if (sidebar) sidebar.classList.add('collapsed');
                if (toggle) {

        async function loadChatsFromServer() {
            showLoading();
            try {
                var resp = await fetch(SERVER_URL + '/get_chat_history?user_id=' + currentUserId + '&model=flash&session_token=' + sessionToken + '&meta_only=true');
                if (resp.status === 403) {
                    showAlertModal('Сессия истекла', 'Сессия устарела. Авторизуйтесь заново.', '❌');
                    window.location.href = 'index.html';
                    return;
                }
                var data = await resp.json();
                if (data.history) {
                    chats = [];
                    var historyKeys = Object.keys(data.history);
                    for (var i = 0; i < historyKeys.length; i++) {
                        var chatId = historyKeys[i];
                        var messages = data.history[chatId];
                        var title = (data.titles && data.titles[chatId]) ? data.titles[chatId] : ('Чат ' + chatId);
                        var activeBranch = (data.active_branches && data.active_branches[chatId]) ? data.active_branches[chatId] : 'main';
                        var allBranches = (data.all_branches && data.all_branches[chatId]) ? data.all_branches[chatId] : {};
                        var personality = (data.personalities && data.personalities[chatId]) ? data.personalities[chatId] : 'default';
                        var lastTime = 0;
                        if (messages && messages.length > 0) {
                            var lastMsg = messages[messages.length - 1];
                            if (lastMsg && lastMsg.timestamp) lastTime = new Date(lastMsg.timestamp).getTime();
                        }
                        if (!lastTime) lastTime = parseInt(chatId) || 0;
                        chats.push({ id: chatId, title: title, messages: messages, activeBranch: activeBranch, allBranches: allBranches, _personality: personality, lastMessageTime: lastTime });
                    }
                    chats.sort(function(a, b) { return (b.lastMessageTime || 0) - (a.lastMessageTime || 0); });
                }
            } catch (e) { console.error('loadChatsFromServer error:', e); }
            var savedId = localStorage.getItem('photobot_active_chat');
            var found = savedId ? chats.find(function(c) { return c.id === savedId; }) : null;
            currentChatId = found ? found.id : (chats.length > 0 ? chats[chats.length - 1].id : null);
            if (currentChatId) {
                localStorage.setItem('photobot_active_chat', currentChatId);
                var chat = chats.find(function(c) { return c.id === currentChatId; });
                if (chat) {
                    currentBranchId = chat.activeBranch || 'main';
                }
                await loadChatMessages(currentChatId);
            }
            if (chats.length === 0 || !currentChatId) {
                currentChatId = null;
                currentBranchId = 'main';
                localStorage.removeItem('photobot_active_chat');
                renderMessages();
            }
            renderChatList();
            hideLoading();
        }

        async function loadChatMessages(chatId) {
            if (!chatId) return;
            try {
                var resp = await fetch(SERVER_URL + '/get_chat_tree?user_id=' + currentUserId + '&model=flash&chat_id=' + chatId + '&session_token=' + sessionToken);
                if (!resp.ok) return;
                var data = await resp.json();
                var chat = chats.find(function(c) { return c.id === chatId; });
                if (!chat) return;
                var branches = {};
                if (data.branches) {
                    var branchKeys = Object.keys(data.branches);
                    for (var i = 0; i < branchKeys.length; i++) {
                        var bid = branchKeys[i];
                        var branchData = data.branches[bid];
                        var msgIds = branchData.msg_ids || branchData;
                        if (Array.isArray(branchData)) msgIds = branchData;
                        var msgs = [];
                        for (var j = 0; j < msgIds.length; j++) {
                            if (data.messages[msgIds[j]]) msgs.push(data.messages[msgIds[j]]);
                        }
                        var bidName = branchData.name || (chat.allBranches && chat.allBranches[bid] ? chat.allBranches[bid].name : 'Ветка');
                        branches[bid] = { name: bidName, messages: msgs, msg_ids: msgIds, source_role: branchData.source_role || 'user' };
                    }
                }
                chat.allBranches = branches;
                var activeBid = chat.activeBranch || 'main';
                if (branches[activeBid]) chat.messages = branches[activeBid].messages || [];
                renderBranchesPanel();
                renderMessages();
            } catch(e) { console.error('loadChatMessages error:', e); }
        }

        async function createBranchFromMessage(msgIndex) {
            if (isSending) return;
            var chat = chats.find(function(c) { return c.id === currentChatId; });
            if (!chat) return;
            var msg = chat.messages[msgIndex];
            if (!msg) return;
            isSending = true;
            if (typingInterval) { clearTimeout(typingInterval); typingInterval = null; }
            sendBtnStop();
            chat.messages = chat.messages.slice(0, msgIndex + 1);
            renderMessages();
            var placeholderId = null;
            var isAssistantBranch = (msg.role === 'assistant');
            if (!isAssistantBranch) {
                placeholderId = 'branch_' + Date.now();
                var area = document.getElementById('chatArea');
                var loadingRow = document.createElement('div');
                loadingRow.className = 'message-row assistant';
                loadingRow.id = placeholderId;
                loadingRow.innerHTML = '<div><div class="message-content"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
                area.appendChild(loadingRow);
                var main = document.querySelector('.main');
                if (main) { main.scrollTop = main.scrollHeight; }
            }
            try {
                var resp = await fetch(SERVER_URL + '/create_branch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, model: 'flash', mode: currentMode, chat_id: currentChatId, source_msg_id: msg.msg_id, branch_name: '', prompt: msg.role === 'user' ? (msg.content || '') : '' })
                });
                if (placeholderId) { var el = document.getElementById(placeholderId); if (el) el.remove(); }
                if (!resp.ok) {
                    var errData = await resp.json().catch(() => ({}));
                    showAlertModal('Ошибка', errData.error || 'Неизвестная ошибка', '❌');
                    isSending = false;
                    sendBtnArrow();
                    return;
                }
                var contentType = resp.headers.get('content-type') || '';
                if (contentType.includes('text/event-stream')) {
                    var reader = resp.body.getReader();

            var dragEvents = ['dragenter', 'dragover', 'dragleave', 'drop'];

                inputArea.addEventListener(dragEvents[i], preventDefaults);
            }

            for (var j = 0; j < showEvents.length; j++) {
                inputArea.addEventListener(showEvents[j], showDrop);

            var hideEvents = ['dragleave', 'drop'];
            for (var k = 0; k < hideEvents.length; k++) {

                    isSending = false; sendBtnArrow(); activeStreamId = null;

                const contentType = resp.headers.get('content-type') || '';

        var _formatRegex = null;
        var _formatBacktick = String.fromCharCode(96);

        function formatMessage(text) {
            var B = _formatBacktick;
            if (/^\s*<(!DOCTYPE|html)/i.test(text)) { text = B + B + B + 'html\n' + text + '\n' + B + B + B; }
            var parts = [];
            var lastIndex = 0;
            if (!_formatRegex) _formatRegex = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
            var regex = _formatRegex;
            regex.lastIndex = 0;
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) parts.push({type: 'text', content: text.substring(lastIndex, match.index)});
                parts.push({type: 'code', lang: match[1], content: match[2]});
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
                var remaining = text.substring(lastIndex);
                var openCode = remaining.match(new RegExp('^([\\s\\S]*?)' + B + B + B + '(\\w*)\\r?\\n([\\s\\S]*)'));
                if (openCode) {
                    if (openCode[1]) parts.push({type: 'text', content: openCode[1]});
                    parts.push({type: 'code', lang: openCode[2], content: openCode[3]});
                } else { parts.push({type: 'text', content: remaining}); }
            }
            var _inlineRules = [
                [/`([^`]+)`/g, '<code>$1</code>'],
                [/\*\*(.+?)\*\*/g, '<strong>$1</strong>'],
                [/\*(.+?)\*/g, '<em>$1</em>'],
                [/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>'],
                [/^### (.+)$/gm, '<h3>$1</h3>'],
                [/^#### (.+)$/gm, '<h4>$1</h4>'],
                [/^## (.+)$/gm, '<h2>$1</h2>'],
                [/^# (.+)$/gm, '<h1>$1</h1>'],
                [/^---$/gm, '<hr>'],
                [/^[-*]\s(.+)$/gm, '<li>$1</li>'],
                [/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>'],
                [/^\d+\.\s(.+)$/gm, '<li>$1</li>'],
                [/((?:<li>.*<\/li>\s*)+)/g, '<ol>$1</ol>'],
                [/~~(.+?)~~/g, '<del>$1</del>'],
                [/!\[(.+?)\]\((.+?)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:8px 0;" loading="lazy">'],
                [/^&gt;\s(.+)$/gm, '<blockquote>$1</blockquote>'],
                [/\n/g, '<br>']
            ];
            var result = '';
            for (var p = 0; p < parts.length; p++) {
                var part = parts[p];
                if (part.type === 'code') {
                    var lang = part.lang || '';
                    result += '<div class="msg-code-block"><pre><code class="' + (lang ? 'language-' + escapeHtml(lang) : '') + '">' + escapeHtml(part.content) + '</code></pre></div>';
                } else {
                    var text2 = escapeHtml(part.content);
                    for (var r = 0; r < _inlineRules.length; r++) {
                        text2 = text2.replace(_inlineRules[r][0], _inlineRules[r][1]);
                    }
                    result += text2;
                }
            }
            return result;
        }

                a.href = url;
                a.download = 'code.txt';
                a.click();
                URL.revokeObjectURL(url);
            });
            actions.appendChild(downloadBtn);

            var isHtml = lang === 'html' || lang === 'htm' || /^\s*<(!DOCTYPE|html)/i.test((pre.querySelector('code') ? pre.querySelector('code').textContent : ''));
            if (isHtml) {
                var previewBtn = _makeActionBtn('Предпросмотр', '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Предпросмотр', function() {
                    var code = pre._editorActive && pre._textarea ? pre._textarea.value : (pre.querySelector('code') ? pre.querySelector('code').textContent : '');
                    openHtmlPreview(code);
                });
                actions.appendChild(previewBtn);
            }

            var editBtn = _makeActionBtn('', '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>', function() {
                toggleCodeEditor(pre);
            });
            actions.insertBefore(editBtn, actions.firstChild);
        }

        function _makeActionBtn(title, innerHTML, clickHandler) {
            var btn = document.createElement('button');
            btn.title = title;
            btn.innerHTML = innerHTML;
            btn.style.cssText = 'background:transparent;border:none;color:#aaa;cursor:pointer;padding:4px 6px;border-radius:4px;font-family:Inter,sans-serif;font-size:11px;pointer-events:auto;';
            btn.onmouseenter = function() { btn.style.background = document.body.classList.contains('light') ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.08)'; };
            btn.onmouseleave = function() { btn.style.background = 'transparent'; };
            btn.onclick = clickHandler;
            return btn;
        }

        function setupFloatingCopyButtons() {
            var blocks = document.querySelectorAll('.msg-code-block');
            for (var i = 0; i < blocks.length; i++) {
                _setupSingleCodeBlock(blocks[i]);
            }
            _floatingHeaders = [];
            updateFloatingButtons();
        }

        function setupFloatingCopyButtonsForMsg(msgEl) {
            if (!msgEl) return;
            var blocks = msgEl.querySelectorAll('.msg-code-block');
            for (var i = 0; i < blocks.length; i++) {
                if (blocks[i].querySelector('.floating-code-header')) continue;
                _setupSingleCodeBlock(blocks[i]);
            }
            _floatingHeaders = [];
            updateFloatingButtons();
        }

        function toggleCodeEditor(pre) {
            var codeEl = pre.querySelector('code');
            if (!codeEl) return;
            if (pre._editorActive) {
                var textarea = pre._textarea;
                var newCode = textarea ? textarea.value : '';
                codeEl.textContent = newCode;
                if (textarea) textarea.remove();
                if (pre._editorToolbar) pre._editorToolbar.remove();
                codeEl.style.display = '';
                pre._editorActive = false; pre._textarea = null; pre._editorToolbar = null;
                if (typeof hljs !== 'undefined' && hljs.highlightElement) hljs.highlightElement(codeEl);
            } else {
                var originalCode = codeEl.textContent;
                pre._originalCode = originalCode;
                codeEl.style.display = 'none';
                var toolbar = document.createElement('div');
                toolbar.style.cssText = 'display:flex;gap:6px;padding:6px 0;align-items:center;';
                toolbar.innerHTML = '<span style="font-size:11px;color:#aaa;font-family:Inter,sans-serif;">Редактор</span>' +
                    '<button class="editor-apply-btn" style="background:#00CBF5;border:none;color:#201F28;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Inter,sans-serif;font-weight:600;">✅ Применить</button>' +
                    '<button class="editor-cancel-btn" style="background:transparent;border:1px solid #666;color:#aaa;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Inter,sans-serif;">↩ Отмена</button>';
                pre.appendChild(toolbar);
                pre._editorToolbar = toolbar;
                var textarea = document.createElement('textarea');
                textarea.value = originalCode;
                textarea.style.cssText = 'width:100%;min-height:200px;background:#0d0d1a;color:#e0e0e0;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:10px;font-family:\'Courier New\',monospace;font-size:13px;resize:vertical;outline:none;';
                if (document.body.classList.contains('light')) { textarea.style.background = '#ffffff'; textarea.style.color = '#111'; textarea.style.border = '1px solid rgba(0,0,0,0.15)'; }
                pre.appendChild(textarea);
                pre._textarea = textarea;
                pre._editorActive = true;
                toolbar.querySelector('.editor-apply-btn').onclick = function() { toggleCodeEditor(pre); };
                toolbar.querySelector('.editor-cancel-btn').onclick = function() { var orig = pre._originalCode || ''; codeEl.textContent = orig; toggleCodeEditor(pre); };
            }
        }

        var _floatingHeaders = [];

        function _collectFloatingHeaders() {
            _floatingHeaders = [];
            var blocks = document.querySelectorAll('.msg-code-block');
            for (var i = 0; i < blocks.length; i++) {
                if (blocks[i]._floatHeader) _floatingHeaders.push(blocks[i]);
            }
        }

        function updateFloatingButtons() {
            if (_floatingHeaders.length === 0) _collectFloatingHeaders();
            var topBar = document.querySelector('.top-bar');
            var tbBottom = topBar ? topBar.getBoundingClientRect().bottom : 0;
            var isLight = document.body.classList.contains('light');
            var bg = isLight ? '#f8f8f8' : '#1a1a2e';
            var clr = isLight ? '#555' : '#aaa';
            for (var i = 0; i < _floatingHeaders.length; i++) {
                var block = _floatingHeaders[i];
                var header = block._floatHeader;
                if (!header || !header.isConnected) { _floatingHeaders.splice(i, 1); i--; continue; }
                header.style.background = bg;
                header.style.color = clr;
                var btns = header.querySelectorAll('button');
                for (var b = 0; b < btns.length; b++) {
                    btns[b].style.color = clr;
                }
                var blockRect = block.getBoundingClientRect();
                var headerHeight = header.offsetHeight || 34;
                var stickyTop = 0;
                if (blockRect.top < tbBottom) {
                    stickyTop = tbBottom - blockRect.top;
                }
                var maxSticky = blockRect.height - headerHeight;
                if (stickyTop > maxSticky) stickyTop = maxSticky;
                if (stickyTop < 0) stickyTop = 0;
                header.style.top = stickyTop + 'px';
                header.style.display = (blockRect.bottom > tbBottom && blockRect.top < window.innerHeight) ? 'flex' : 'none';
            }
        }

        function buildNavContainer() {
            var container = document.getElementById('navContainer');
            if (!container) return;
            var chat = chats.find(function(c) { return c.id === currentChatId; });
            if (!chat || chat.messages.length === 0) {
                container.innerHTML = '';
                return;
            }
            var html = '';
            for (var i = 0; i < chat.messages.length; i++) {
                var msg = chat.messages[i];
                if (msg.role === 'user' && msg.content) {
                    var preview = msg.content.substring(0, 80);
                    html += '<div class="nav-strip" data-msg-index="' + i + '" onclick="scrollToMsg(' + i + ')"><div class="nav-bar"></div><span class="nav-text">' + escapeHtml(preview) + '</span></div>';
                }
            }
            container.innerHTML = html;
        }

        function updateActiveNavFromScroll() {
            var main = document.querySelector('.main');
            if (!main) return;
            var rows = main.querySelectorAll('.message-row[data-msg-index]');
            var areaRect = main.getBoundingClientRect();
            var closestIndex = null;
            var closestDist = Infinity;
            for (var r = 0; r < rows.length; r++) {
                var rect = rows[r].getBoundingClientRect();
                var mid = rect.top + rect.height / 2;
                var dist = Math.abs(mid - (areaRect.top + areaRect.height / 2));
                if (dist < closestDist) { closestDist = dist; closestIndex = rows[r].getAttribute('data-msg-index'); }
            }
            var strips = document.querySelectorAll('.nav-strip');
            for (var i = 0; i < strips.length; i++) { strips[i].classList.remove('active'); }
            if (closestIndex !== null) {
                var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + closestIndex + '"]');
                if (activeStrip) {
                    activeStrip.classList.add('active');
                    var container = document.getElementById('navContainer');
                    if (container) {
                        var stripTop = activeStrip.offsetTop;
                        var containerH = container.clientHeight;
                        container.scrollTo({ top: stripTop - containerH / 2 + activeStrip.offsetHeight / 2, behavior: 'smooth' });
                    }
                }
            }
        }

        (function() {
            var main = document.querySelector('.main');
            if (main) main.addEventListener('scroll', updateActiveNavFromScroll);
            var nav = document.getElementById('navContainer');
            if (nav) nav.addEventListener('wheel', function(e) { e.stopPropagation(); });
        })();

        function scrollToMsg(index) {
            var main = document.querySelector('.main');
            if (!main) return;
            main.style.scrollBehavior = 'auto';
            var target = main.querySelector('.message-row[data-msg-index="' + index + '"]');
            if (target) target.scrollIntoView({ behavior: 'auto', block: 'center' });
            main.style.scrollBehavior = 'smooth';
            var strips = document.querySelectorAll('.nav-strip');
            for (var i = 0; i < strips.length; i++) { strips[i].classList.remove('active'); }
            var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + index + '"]');
            if (activeStrip) activeStrip.classList.add('active');
        }
        function openHtmlPreview(code) {
            var panel = document.getElementById('previewPanel');
            var iframe = document.getElementById('previewIframe');
            var handle = document.getElementById('resizeHandle');
            if (!panel) {
                panel = document.createElement('div');
                panel.id = 'previewPanel';
                panel.className = 'preview-panel';
                panel.innerHTML = '<div class="preview-header"><span class="preview-title">Предпросмотр</span><button class="preview-close" onclick="closePreview()">✕</button></div><iframe id="previewIframe" class="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>';
                document.body.appendChild(panel);
                iframe = document.getElementById('previewIframe');
            }
            if (!handle) {
                handle = document.createElement('div');
                handle.id = 'resizeHandle';
                handle.className = 'resize-handle';
                document.body.appendChild(handle);
                handle._startX = 0;
                handle._startWidth = 50;
                handle.addEventListener('pointerdown', function(e) {
                    e.preventDefault();
                    handle.setPointerCapture(e.pointerId);
                    handle._startX = e.clientX;
                    handle._startWidth = parseInt(getComputedStyle(document.body).getPropertyValue('--preview-width')) || 50;
                    handle.classList.add('dragging');
                    document.body.style.userSelect = 'none';
                });
                handle.addEventListener('pointermove', function(e) {
                    if (!handle.classList.contains('dragging')) return;
                    var dx = handle._startX - e.clientX;
                    var mainWidth = document.querySelector('.main').clientWidth;
                    var minChat = 400;
                    var maxPw = ((mainWidth - minChat) / window.innerWidth) * 100;
                    if (maxPw < 20) maxPw = 20;
                    if (maxPw > 80) maxPw = 80;
                    var newWidth = Math.max(20, Math.min(maxPw, handle._startWidth + (dx / window.innerWidth) * 100));
                    document.body.style.setProperty('--preview-width', newWidth + '%');
                    handle.style.right = newWidth + '%';
                    updateFloatingButtons();
                });
                handle.addEventListener('pointerup', function(e) {
                    handle.classList.remove('dragging');
                    document.body.style.userSelect = '';
                    handle.releasePointerCapture(e.pointerId);
                });
                handle.addEventListener('pointercancel', function(e) {
                    handle.classList.remove('dragging');
                    document.body.style.userSelect = '';
                    handle.releasePointerCapture(e.pointerId);
                });
            }
            document.body.style.setProperty('--preview-width', '50%');
            panel.classList.add('active');
            handle.classList.add('active');
            handle.style.right = '50%';
            document.querySelector('.main').classList.add('preview-open');
            updateFloatingButtons();
            var main = document.querySelector('.main');
            if (main) {
                var rafId;
                var tick = function() { updateFloatingButtons(); rafId = requestAnimationFrame(tick); };
                rafId = requestAnimationFrame(tick);
                main.addEventListener('transitionend', function() { cancelAnimationFrame(rafId); updateFloatingButtons(); }, { once: true });
            }
            iframe.srcdoc = code;
        }

        function closePreview() {
            var panel = document.getElementById('previewPanel');
            var handle = document.getElementById('resizeHandle');
            if (panel) panel.classList.remove('active');
            if (handle) handle.classList.remove('active');
            document.querySelector('.main').classList.remove('preview-open');
            var main = document.querySelector('.main');
            if (main) {
                var rafId;
                var tick = function() { updateFloatingButtons(); rafId = requestAnimationFrame(tick); };
                rafId = requestAnimationFrame(tick);
                main.addEventListener('transitionend', function() { cancelAnimationFrame(rafId); updateFloatingButtons(); }, { once: true });
            }
        }

        window.addEventListener('load', function() { 
            setupFloatingCopyButtons(); 
            var mainEl3 = document.querySelector('.main');
            if (mainEl3) mainEl3.addEventListener('scroll', updateFloatingButtons);
        });
        window.addEventListener('scroll', updateFloatingButtons, true);
        window.addEventListener('resize', updateFloatingButtons);

        function showConfirmModal(title, message, icon, confirmText, cancelText, confirmClass, onConfirm) {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalIcon').textContent = icon || '\u26A0\uFE0F';
            var iconClass = 'warning';
            if (icon === '\u274C') iconClass = 'error';
            else if (icon === '\u2705') iconClass = 'success';
            else if (icon === '\u2139\uFE0F') iconClass = 'info';
            document.getElementById('modalIcon').className = 'modal-icon ' + iconClass;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            var actions = document.getElementById('modalActions');
            actions.innerHTML = '';
            var cancelBtn = document.createElement('button');
            cancelBtn.className = 'modal-btn-secondary';
            cancelBtn.textContent = cancelText || 'Отмена';
            cancelBtn.onclick = function() { document.getElementById('modalOverlay').classList.remove('active'); };
            actions.appendChild(cancelBtn);
            var confirmBtn = document.createElement('button');
            confirmBtn.className = confirmClass || 'modal-btn-primary';
            confirmBtn.textContent = confirmText || 'Да';
            confirmBtn.onclick = function() { document.getElementById('modalOverlay').classList.remove('active'); if (onConfirm) onConfirm(); };
            actions.appendChild(confirmBtn);
        }

        function showAlertModal(title, message, icon) {
            document.getElementById('alertModalIcon').textContent = icon || '\u2139\uFE0F';
            var iconClass = 'info';
            if (icon === '\u274C') iconClass = 'error';
            else if (icon === '\u2705') iconClass = 'success';
            else if (icon === '\u26A0\uFE0F') iconClass = 'warning';
            document.getElementById('alertModalIcon').className = 'modal-icon ' + iconClass;
            document.getElementById('alertModalTitle').textContent = title;
            document.getElementById('alertModalMessage').textContent = message;
            document.getElementById('alertModalOverlay').classList.add('active');
        }

        function closeAlertModal() {
            document.getElementById('alertModalOverlay').classList.remove('active');

        var renameCallback = null;

        function showRenameModal(title, currentName, callback) {
            document.getElementById('renameModalTitle').textContent = title;

            document.getElementById('renameModal').classList.add('active');
            setTimeout(function() {
                var input = document.getElementById('renameInput');
                input.focus();
                input.select();
            }, 100);
        }

        function closeRenameModal() {
            document.getElementById('renameModal').classList.remove('active');
            renameCallback = null;
        }

        function confirmRename() {
            var value = document.getElementById('renameInput').value.trim();
            if (value && renameCallback) {
                renameCallback(value);

            closeRenameModal();

        document.getElementById('renameModal').addEventListener('click', function(e) { if (e.target === this) closeRenameModal(); });

        function updateBranchIndicator() {
            var el = document.getElementById('branchIndicatorTop');
            var chat = chats.find(function(c) { return c.id === currentChatId; });
            var branchName = '';
            if (chat && chat.allBranches && chat.allBranches[currentBranchId]) { branchName = chat.allBranches[currentBranchId].name || ''; }
            if (currentBranchId && currentBranchId !== 'main' && branchName && branchName !== 'Основная') { el.textContent = '🌿 ' + branchName; el.style.display = 'inline'; }
            else { el.style.display = 'none'; }

        function showLoading() { document.getElementById('loadingSpinner').style.display = 'flex'; }

        // Edit message modal
        var editMessageCallback = null;

        function showEditMessageModal(currentText, callback) {
            var input = document.getElementById('editMessageInput');
            input.value = currentText;
            editMessageCallback = callback;
            document.getElementById('editMessageModal').classList.add('active');
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 300) + 'px';
            setTimeout(function() {
                input.focus();
                input.setSelectionRange(input.value.length, input.value.length);
            }, 100);
        }

        function closeEditMessageModal() {
            document.getElementById('editMessageModal').classList.remove('active');
            editMessageCallback = null;
        }

        function confirmEditMessage() {
            var value = document.getElementById('editMessageInput').value.trim();
            if (value && editMessageCallback) {
                editMessageCallback(value);
            }
            closeEditMessageModal();
        }
        (function() {
            var modalClosePairs = [
                ['copyHistoryModal', closeCopyHistoryModal],
                ['editMessageModal', closeEditMessageModal],
                ['selfPlayModal', closeSelfPlayModal],
                ['renameModal', closeRenameModal],
                ['customPersonalityModal', closeCustomPersonalityModal]
            ];
            for (var i = 0; i < modalClosePairs.length; i++) {
                var pair = modalClosePairs[i];
                var el = document.getElementById(pair[0]);
                if (el) {
                    el.addEventListener('click', (function(closeFn) {
                        return function(e) { if (e.target === this) closeFn(); };
                    })(pair[1]));
                }
            }
        })();
        document.getElementById('editMessageInput').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 300) + 'px'; });
        document.getElementById('editMessageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.shiftKey) {
                return;
            }
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                confirmEditMessage();
            }
            if (e.key === 'Escape') {
                closeEditMessageModal();
            }
        });
        document.getElementById('editMessageModal').addEventListener('click', function(e) { if (e.target === this) closeEditMessageModal(); });
        document.getElementById('customPersonalityInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); confirmCustomPersonality(); }
            if (e.key === 'Escape') { closeCustomPersonalityModal(); }
        });
        document.getElementById('customPersonalityModal').addEventListener('click', function(e) { if (e.target === this) closeCustomPersonalityModal(); });

        window.addEventListener('load', function() {
            setupFloatingCopyButtons();
            updateFloatingButtons();
        });

        document.body.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var modals = ['modalOverlay', 'alertModalOverlay', 'renameModal', 'customPersonalityModal', 'copyHistoryModal', 'editMessageModal', 'selfPlayModal'];
                for (var m = 0; m < modals.length; m++) {
                    var modal = document.getElementById(modals[m]);
                    if (modal && modal.classList.contains('active')) {
                        modal.classList.remove('active');
                        break;
                    }
                    if (modal && modal.style.display === 'flex') {
                        modal.style.display = 'none';
                        break;
                    }
                }
            }
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                if (document.getElementById('renameModal').classList.contains('active')) {
                    e.preventDefault();
                    confirmRename();
                }
                if (document.getElementById('selfPlayModal').classList.contains('active')) {
                    e.preventDefault();
                    confirmSelfPlay();
                }
            }
        });

        (function() {
            var ids = ['modalOverlay', 'alertModalOverlay', 'renameModal', 'customPersonalityModal', 'copyHistoryModal', 'editMessageModal', 'selfPlayModal'];
            for (var i = 0; i < ids.length; i++) {
                var m = document.getElementById(ids[i]);
                if (m) {
                    m.addEventListener('pointerup', function(e) {
                        if (e.target === this) { this.classList.remove('active'); this.style.display = ''; }
                    });
                }
            }
        })();

        document.addEventListener('click', function(e) {
            var d = document.querySelector('.chat-menu-dropdown.show');
            if (d && !d.contains(e.target) && !e.target.classList.contains('chat-menu-btn')) {
                d.classList.remove('show');
            }
        });
    </script>
    <div id="selfPlayModal" class="modal-overlay">
        <div class="modal-box" style="max-width:600px;">
            <div class="modal-icon" style="background:rgba(0,203,245,0.15);color:#00CBF5;">🧠</div>
            <div class="modal-title" style="margin-bottom:12px;">Self-Play Диалог</div>
            <div style="margin-bottom:12px;">
                <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;font-family:Inter,sans-serif;font-weight:500;">ЛИЧНОСТИ (выберите ≥2)</label>
                <div id="selfPlayPersonalities" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
            </div>
            <div style="margin-bottom:12px;">
                <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;font-family:Inter,sans-serif;font-weight:500;">КОНСЕНСУС ВЫНОСИТ</label>
                <select id="selfPlayConsensus" style="width:100%;padding:10px 14px;background:#0d0d1a;color:#e0e0e0;border:2px solid rgba(255,255,255,0.1);border-radius:12px;font-size:14px;font-family:Inter,sans-serif;outline:none;">
                    <option value="">Сначала выберите личности</option>
                </select>
            </div>
            <div style="margin-bottom:12px;">
                <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;font-family:Inter,sans-serif;font-weight:500;">ТЕМПЕРАТУРА: <span id="selfPlayTempValue">1.0</span></label>
                <input type="range" id="selfPlayTemperature" min="0.5" max="2.0" step="0.1" value="1.0" style="width:100%;height:8px;border-radius:4px;background:linear-gradient(to right, #00CBF5, #FF4500);-webkit-appearance:none;appearance:none;outline:none;cursor:pointer;" oninput="document.getElementById('selfPlayTempValue').textContent=this.value">
            </div>
            <div style="margin-bottom:16px;">
                <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;font-family:Inter,sans-serif;font-weight:500;">СУТЬ ДИАЛОГА</label>
                <textarea id="selfPlayPrompt" style="width:100%;padding:12px 14px;background:#0d0d1a;color:#e0e0e0;border:2px solid rgba(255,255,255,0.1);border-radius:12px;font-size:14px;font-family:Inter,sans-serif;outline:none;resize:none;min-height:80px;transition:all 0.2s ease;" placeholder="Что нужно решить? Например: выбрать БД для highload, сравнить Python vs Go..."></textarea>
            </div>
            <div class="modal-actions" style="gap:12px;">
                <button class="modal-btn-secondary" onclick="closeSelfPlayModal()" style="flex:1;padding:12px;">Отмена</button>
                <button id="selfPlayConfirmBtn" class="modal-btn-primary" onclick="confirmSelfPlay()" style="flex:1;padding:12px;" disabled>Запустить</button>
            </div>
        </div>
    </div>
</body>
</html>

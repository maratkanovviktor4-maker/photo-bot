<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — DeepSeek V4 Flash</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 280px; background: #16213e; display: flex; flex-direction: column; padding: 16px; border-right: 1px solid #0f3460; flex-shrink: 0; }
        .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .logo-row img { height: 32px; }
        .logo-text { font-size: 15px; font-weight: 600; color: #00CBF5; margin-top: 4px; }
        .new-chat { width: 100%; padding: 10px; background: #0f3460; color: #fff; border: 1px solid #1a5276; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: 500; margin-bottom: 12px; transition: 0.2s; }
        .new-chat:hover { background: #1a5276; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #a0a0b0; margin-bottom: 2px; transition: 0.15s; position: relative; }
        .chat-item:hover { background: #1a2a4a; color: #e0e0e0; }
        .chat-item.active { background: #1a2a4a; color: #fff; font-weight: 500; }
        .chat-item .chat-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .chat-menu-btn { width: 24px; height: 24px; border-radius: 4px; border: none; background: transparent; color: #666; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 6px; }
        .chat-item .chat-menu-btn:hover { background: #2a2a4a; color: #e0e0e0; }
        .chat-menu-dropdown { position: absolute; right: 0; top: 100%; background: #1a2a4a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 4px; z-index: 10; display: none; min-width: 140px; }
        .chat-menu-dropdown.show { display: block; }
        .chat-menu-dropdown button { display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; color: #e0e0e0; font-size: 12px; cursor: pointer; text-align: left; border-radius: 4px; font-family: 'Montserrat', sans-serif; }
        .chat-menu-dropdown button:hover { background: #0f3460; }
        .chat-menu-dropdown button.delete { color: #e74c3c; }
        .chat-menu-dropdown button.delete:hover { background: #3a1a1a; }
        .sidebar-footer { border-top: 1px solid #1a2a4a; padding-top: 12px; margin-top: 8px; }
        .sidebar-footer a { color: #666; text-decoration: none; font-size: 12px; display: block; text-align: center; transition: 0.2s; }
        .sidebar-footer a:hover { color: #00CBF5; }
        .main { flex: 1; display: flex; flex-direction: column; background: #1a1a2e; }
        .top-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-bottom: 1px solid #16213e; background: #1a1a2e; }
        .mode-btn { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #2a2a4a; background: #16213e; color: #a0a0b0; font-family: 'Montserrat', sans-serif; transition: 0.2s; }
        .mode-btn.active { background: #00CBF5; border-color: #00CBF5; color: #1a1a2e; font-weight: 600; }
        .mode-btn:hover:not(.active) { border-color: #00CBF5; color: #e0e0e0; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .chat-area .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #555; }
        .chat-area .empty-state .logo-lg { height: 60px; opacity: 0.6; }
        .chat-area .empty-state .title { font-size: 22px; font-weight: 600; color: #777; }
        .message-row { display: flex; gap: 12px; align-items: flex-start; max-width: 85%; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-row.assistant { align-self: flex-start; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
        .avatar.assistant-avatar { background: #0f3460; color: #00CBF5; }
        .avatar.user-avatar { background: #2a2a4a; color: #14E9FC; }
        .message-content { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
        .message-row.assistant .message-content { background: #16213e; border: 1px solid #1a2a4a; }
        .message-row.user .message-content { background: #0f3460; }
        .message-content pre { background: #0a0a1a; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; margin: 8px 0; border: 1px solid #1a2a4a; }
        .message-content code { font-family: 'Courier New', monospace; font-size: 12px; background: #0a0a1a; padding: 2px 6px; border-radius: 4px; }
        .message-actions { display: flex; gap: 6px; margin-top: 6px; opacity: 0; transition: 0.2s; }
        .message-row:hover .message-actions { opacity: 1; }
        .message-actions button { background: #2a2a4a; border: none; color: #888; cursor: pointer; font-size: 11px; padding: 4px 10px; border-radius: 4px; font-family: 'Montserrat', sans-serif; transition: 0.2s; }
        .message-actions button:hover { background: #3a3a5a; color: #e0e0e0; }
        .input-area { padding: 14px 20px; border-top: 1px solid #16213e; display: flex; gap: 10px; background: #1a1a2e; }
        .input-area textarea { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid #2a2a4a; background: #16213e; color: #e0e0e0; font-family: 'Montserrat', sans-serif; font-size: 13px; outline: none; resize: none; height: 44px; transition: 0.2s; }
        .input-area textarea:focus { border-color: #00CBF5; }
        .input-area button { padding: 10px 18px; background: #00CBF5; color: #1a1a2e; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 14px; transition: 0.2s; }
        .input-area button:hover { background: #14E9FC; }
        .input-area button:disabled { background: #2a2a4a; color: #666; cursor: not-allowed; }
        .attach-btn { padding: 10px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px; color: #00CBF5; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 18px; }
        .attach-btn:hover { color: #14E9FC; border-color: #00CBF5; }
        .remove-attach-btn { padding: 10px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px; color: #E74C3C; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 16px; display: none; }
        .remove-attach-btn:hover { color: #FF6B6B; border-color: #E74C3C; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-row">
            <img src="deepseek_logo.png" alt="DeepSeek Flash" onerror="this.style.display='none'">
            <span class="logo-text"><span style="color:#8B5CF6;">V4 Flash</span></span>
        </div>
        <button class="new-chat" onclick="newChat()">+ Новый чат</button>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <a href="index.html">← На главную</a>
        </div>
    </div>
    <div class="main">
        <div class="top-bar">
            <button class="mode-btn active" data-mode="chat" onclick="setMode('chat')">💬 Chat</button>
            <button class="mode-btn" data-mode="reasoner" onclick="setMode('reasoner')">🧠 Reasoner</button>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <img src="deepseek_logo.png" class="logo-lg" alt="DeepSeek Flash" onerror="this.style.display='none'">
                <div class="title">DeepSeek V4 Flash</div>
                <div style="color:#666;font-size:13px;">Задайте любой вопрос или прикрепите файл</div>
            </div>
        </div>
        <div class="input-area">
            <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">📎</button>
            <button class="remove-attach-btn" id="removeFileBtn" onclick="removeFile()" title="Удалить вложение">✕</button>
            <textarea id="userInput" placeholder="Введите сообщение..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}" oninput="this.style.height='44px';this.style.height=Math.min(this.scrollHeight,200)+'px';"></textarea>
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://api.фото-бот.рф";
        let currentMode = 'chat';
        let chats = [];
        let currentChatId = null;
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let pendingFileData = null;
        let pendingFileName = '';
        let pendingFileMime = '';

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            loadChats();
        }

        function loadChats() {
            const saved = localStorage.getItem('v4flash_chats');
            if (saved) { chats = JSON.parse(saved); renderChatList(); if (chats.length > 0) openChat(chats[0].id); }
        }
        function saveChats() { localStorage.setItem('v4flash_chats', JSON.stringify(chats)); }
        function newChat() {
            const chat = { id: Date.now(), title: 'Новый чат', messages: [] };
            chats.unshift(chat); currentChatId = chat.id;
            saveChats(); renderChatList(); renderMessages();
        }
        function openChat(id) { currentChatId = id; renderChatList(); renderMessages(); }
        function toggleChatMenu(e, id) {
            e.stopPropagation();
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
            const dropdown = document.getElementById('menu_' + id);
            if (dropdown) dropdown.classList.toggle('show');
        }
        function renameChat(id) {
            const chat = chats.find(c => c.id === id);
            const newName = prompt('Новое название:', chat?.title || '');
            if (newName && chat) { chat.title = newName; saveChats(); renderChatList(); }
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
        }
        function deleteChat(id) {
            if (!confirm('Удалить чат?')) return;
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) currentChatId = chats.length > 0 ? chats[0].id : null;
            saveChats(); renderChatList(); renderMessages();
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
        }
        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => `
                <div class="chat-item${c.id === currentChatId ? ' active' : ''}" onclick="openChat(${c.id})">
                    <span class="chat-name">${c.title}</span>
                    <button class="chat-menu-btn" onclick="toggleChatMenu(event, ${c.id})">⋯</button>
                    <div class="chat-menu-dropdown" id="menu_${c.id}">
                        <button onclick="renameChat(${c.id})">✏️ Переименовать</button>
                        <button class="delete" onclick="deleteChat(${c.id})">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        function renderMessages() {
            const chat = chats.find(c => c.id === currentChatId);
            const area = document.getElementById('chatArea');
            if (!chat || chat.messages.length === 0) {
                area.innerHTML = `<div class="empty-state"><img src="deepseek_logo.png" class="logo-lg" alt="DeepSeek Flash" onerror="this.style.display='none'"><div class="title">DeepSeek V4 Flash</div><div style="color:#666;font-size:13px;">Задайте любой вопрос или прикрепите файл</div></div>`;
            } else {
                area.innerHTML = chat.messages.map((m, i) => `
                    <div class="message-row ${m.role}">
                        <div class="avatar ${m.role}-avatar">${m.role === 'user' ? '👤' : '🐋'}</div>
                        <div>
                            <div class="message-content">${formatMessage(m.content)}</div>
                            <div class="message-actions">
                                ${m.role === 'user' ? `<button onclick="editMessage(${i})">✏️</button>` : ''}
                                <button onclick="copyMessage(${i})">📋</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            area.scrollTop = area.scrollHeight;
        }
        function formatMessage(text) {
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }
        function copyMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) navigator.clipboard.writeText(chat.messages[index].content);
        }
        function editMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                document.getElementById('userInput').value = chat.messages[index].content;
                document.getElementById('userInput').focus();
            }
        }
        function setMode(mode) { currentMode = mode; document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode)); }
        function autoNameChat(chat) {
            const lastAssistant = [...chat.messages].reverse().find(m => m.role === 'assistant');
            if (lastAssistant && chat.title === 'Новый чат') {
                chat.title = lastAssistant.content.replace(/[#*`>\n]/g, ' ').split(' ').slice(0, 6).join(' ') || 'Новый чат';
                if (chat.title.length > 40) chat.title = chat.title.substring(0, 40) + '...';
            }
        }
        function removeFile() {
            pendingFileData = null;
            pendingFileName = '';
            pendingFileMime = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('removeFileBtn').style.display = 'none';
            const ind = document.getElementById('fileIndicator');
            if (ind) ind.remove();
        }
        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            removeFile();
            const reader = new FileReader();
            reader.onload = function(ev) {
                const base64 = ev.target.result.split(',')[1];
                pendingFileData = base64;
                pendingFileName = file.name;
                pendingFileMime = file.type;
                const indicator = document.createElement('div');
                indicator.id = 'fileIndicator';
                indicator.style.cssText = 'padding:6px 12px;background:#16213e;border-radius:8px;font-size:11px;color:#00CBF5;margin-bottom:4px;';
                indicator.textContent = '📎 ' + file.name;
                document.querySelector('.input-area').insertBefore(indicator, document.getElementById('userInput'));
                document.getElementById('removeFileBtn').style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }
        async function sendMessage() {
            if (isSending) return;
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !pendingFileData) return;
            if (!currentUserId) { alert('Авторизуйтесь на главной странице'); return; }
            if (!currentChatId) newChat();
            input.value = ''; input.style.height = '44px';
            isSending = true; document.getElementById('sendBtn').disabled = true;

            const chat = chats.find(c => c.id === currentChatId);
            const displayText = text || (pendingFileName ? `[Файл: ${pendingFileName}]` : '');
            chat.messages.push({ role: 'user', content: displayText });
            saveChats(); renderChatList(); renderMessages();

            const placeholderId = 'msg_' + Date.now();
            const area = document.getElementById('chatArea');
            const typingRow = document.createElement('div');
            typingRow.className = 'message-row assistant'; typingRow.id = placeholderId;
            typingRow.innerHTML = '<div class="avatar assistant-avatar">🐋</div><div><div class="message-content">Думаю...</div></div>';
            area.appendChild(typingRow); area.scrollTop = area.scrollHeight;

            try {
                const resp = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, message: text, model: 'flash', mode: currentMode, chat_id: currentChatId, file_data: pendingFileData || '', file_name: pendingFileName, file_mime: pendingFileMime })
                });
                const data = await resp.json();
                const el = document.getElementById(placeholderId); if (el) el.remove();
                if (data.reply) {
                    const content = data.reasoning ? `💭 Размышление:\n${data.reasoning}\n\n📝 Ответ:\n${data.reply}` : data.reply;
                    chat.messages.push({ role: 'assistant', content: content });
                    autoNameChat(chat);
                } else {
                    chat.messages.push({ role: 'assistant', content: '⚠️ Ошибка. Попробуйте позже.' });
                }
                saveChats(); renderChatList(); renderMessages();
            } catch (e) {
                const el = document.getElementById(placeholderId); if (el) el.remove();
                chat.messages.push({ role: 'assistant', content: '⚠️ Ошибка соединения.' });
                saveChats(); renderMessages();
            }
            pendingFileData = null; pendingFileName = ''; pendingFileMime = '';
            const ind = document.getElementById('fileIndicator'); if (ind) ind.remove();
            document.getElementById('removeFileBtn').style.display = 'none';
            isSending = false; document.getElementById('sendBtn').disabled = false;
        }
        document.addEventListener('click', () => document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show')));
    </script>
</body>
</html>

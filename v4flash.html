                        <div class="input-row">
                            <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
                            <textarea id="userInput" placeholder="Введите сообщение..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();if(isSending){stopTyping();}else{sendMessage();}}" oninput="this.style.height='auto';var h=this.scrollHeight;this.style.height=Math.min(h,300)+'px';" onfocus="if(!this._init){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,300)+'px';this._init=true;}"></textarea>
                        </div>
                        <div class="input-toolbar">
                            <button class="mode-btn" id="reasonerToggle" onclick="toggleReasoner()" style="font-size:11px;padding:4px 10px;">Reasoner</button>
                            <span class="file-name-inline" id="fileNameInline"></span>
                            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" transform="rotate(-45 12 12)"/></svg>
                            <button id="sendBtn" onclick="sendMessage()" title="Отправить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="nav-container" id="navContainer"></div>

    <script>
        var autoScroll = true;

        const SERVER_URL = CONFIG.SERVER_URL;
        let currentMode = 'chat';
        let chats = [];
        let currentChatId = null;
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let typingInterval = null;
        let pendingFile = null;
        let activeStreamId = null;

        window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
        window.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); });
        function toggleTheme() {
            document.body.classList.toggle('light');
            var isLight = document.body.classList.contains('light');
            localStorage.setItem('photobot_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
            var hlTheme = document.getElementById('highlightTheme');
            if (hlTheme) {
                hlTheme.href = isLight 
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
            }
            document.querySelectorAll('.floating-code-header').forEach(function(h) {
                h.style.background = isLight ? '#f8f8f8' : '#1a1a2e';
                h.style.color = isLight ? '#555' : '#aaa';
                h.querySelectorAll('button').forEach(function(b) {
                    b.style.color = isLight ? '#555' : '#aaa';
                });
            });
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                if (pre._textarea) {
                    pre._textarea.style.background = isLight ? '#ffffff' : '#0d0d1a';
                    pre._textarea.style.color = isLight ? '#111' : '#e0e0e0';
                    pre._textarea.style.border = isLight ? '1px solid rgba(0,0,0,0.15)' : '1px solid rgba(255,255,255,0.1)';
                }
            });
        }
        (function() {
            var saved = localStorage.getItem('photobot_theme');
            var isLight = saved === 'light';
            if (isLight) {
                document.body.classList.add('light');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            var hlTheme = document.getElementById('highlightTheme');
            if (hlTheme) {
                hlTheme.href = isLight 
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
            }
            var savedMode = localStorage.getItem('photobot_mode');
            if (savedMode === 'reasoner') {
                currentMode = 'reasoner';
                var btn = document.getElementById('reasonerToggle');
                if (btn) btn.classList.add('active');
            }
            var savedSidebar = localStorage.getItem('photobot_sidebar');
            if (savedSidebar === 'collapsed') {
                var main = document.querySelector('.main');
                var sidebar = document.querySelector('.sidebar');
                var toggle = document.getElementById('sidebarToggle');
                if (main) {
                    main.style.transition = 'none';
                }
                if (sidebar) sidebar.classList.add('collapsed');
                if (toggle) {
                    toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
                    toggle.title = 'Развернуть панель';
                }
                document.body.classList.add('collapsed-sidebar');
                if (main) {
                    main.offsetHeight;
                    main.style.transition = '';
                }
            }
        })();

        function scrollToBottom() {
            var main = document.querySelector('.main');
            if (!main) return;
            main.style.scrollBehavior = 'auto';
            main.scrollTop = main.scrollHeight;
            main.style.scrollBehavior = 'smooth';
            autoScroll = true;
        }

        var mainEl = document.querySelector('.main');
        if (mainEl) {
            mainEl.addEventListener('scroll', function(e) {
                if (e.target !== mainEl) return;
                var btn = document.getElementById('scrollBottomBtn');
                if (!mainEl) return;
                var atBottom = mainEl.scrollHeight - mainEl.scrollTop - mainEl.clientHeight < 5;
                if (atBottom) {
                    btn.style.display = 'none';
                    autoScroll = true;
                } else {
                    btn.style.display = 'flex';
                    autoScroll = false;
                }
            }, true);
        }

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            if (!sessionToken || !currentUserId) {
                alert('Сессия устарела. Авторизуйтесь заново на главной странице.');
                window.location.href = 'index.html';
            } else {
                loadChatsFromServer();
                updateBalance();
            }
        } else {
            alert('Авторизуйтесь на главной странице');
            window.location.href = 'index.html';
        }

        async function loadChatsFromServer() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_chat_history?user_id=${currentUserId}&model=flash&session_token=${sessionToken}`);
                if (resp.status === 403) {
                    alert('Сессия устарела. Авторизуйтесь заново.');
                    window.location.href = 'index.html';
                    return;
                }
                const data = await resp.json();
                if (data.history) {
                    chats = [];
                    for (const [chatId, messages] of Object.entries(data.history)) {
                        const title = data.titles && data.titles[chatId] ? data.titles[chatId] : ('Чат ' + chatId);
                        chats.push({ id: chatId, title: title, messages: messages });
                    }
                    chats.sort((a, b) => a.id.localeCompare(b.id));
                }
            } catch (e) {
                console.error('loadChatsFromServer error:', e);
            }
            if (chats.length === 0) {
                const chat = { id: String(Date.now()), title: 'Новый чат', messages: [] };
                chats.push(chat);
            }
            renderChatList();
            var savedId = localStorage.getItem('photobot_active_chat');
            var found = savedId ? chats.find(function(c) { return c.id === savedId; }) : null;
            currentChatId = found ? found.id : (chats.length > 0 ? chats[chats.length - 1].id : null);
            if (currentChatId) openChat(currentChatId);
        }
        async function updateBalance() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_balance?user_id=${currentUserId}&session_token=${sessionToken}`);
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('balanceDisplay').textContent = `${data.flash.toFixed(1)} Stars`;
                }
            } catch(e) {
                console.error(e);
            }
        }
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function newChat() {
            const chat = { id: Date.now().toString(), title: 'Новый чат', messages: [] };
            chats.push(chat);
            currentChatId = chat.id;
            renderChatList();
            renderMessages();
        }
        function openChat(id) {
            closePreview();
            currentChatId = id;
            localStorage.setItem('photobot_active_chat', id);
            renderChatList();
            renderMessages();
            setTimeout(function() {
                var main = document.querySelector('.main');
                if (main) {
                    main.style.scrollBehavior = 'auto';
                    main.scrollTop = main.scrollHeight;
                    main.style.scrollBehavior = 'smooth';
                }
            }, 150);
        }
        function toggleChatMenu(e, id) {
            e.stopPropagation();
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
            const dropdown = document.getElementById('menu_' + id);
            if (dropdown) dropdown.classList.toggle('show');
        }
        async function renameChat(id) {
            const chat = chats.find(c => c.id === id);
            const newName = prompt('Новое название:', chat?.title || '');
            if (newName && chat) {
                chat.title = newName;
                renderChatList();
                try {
                    await fetch(`${SERVER_URL}/rename_chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                        body: JSON.stringify({ user_id: currentUserId, model: 'flash', chat_id: String(id), title: newName })
                    });
                } catch (e) {}
            }
        }
        async function deleteChat(id) {
            if (!confirm('Удалить чат?')) return;
            try {
                await fetch(`${SERVER_URL}/delete_chat?user_id=${currentUserId}&model=flash&chat_id=${id}&session_token=${sessionToken}`, {
                    method: 'DELETE'
                });
            } catch (e) {}
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) currentChatId = chats.length > 0 ? chats[chats.length - 1].id : null;
            renderChatList();
            renderMessages();
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
        }
        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => `
                <div class="chat-item${c.id === currentChatId ? ' active' : ''}" onclick="openChat('${c.id}')">
                    <span class="chat-name">${c.title}</span>
                    <button class="chat-menu-btn" onclick="toggleChatMenu(event, '${c.id}')">...</button>
                    <div class="chat-menu-dropdown" id="menu_${c.id}">
                        <button onclick="renameChat('${c.id}')">Переименовать</button>
                        <button class="delete" onclick="deleteChat('${c.id}')">Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        function filterChats() {
            var query = document.getElementById('chatSearch').value.toLowerCase();
            document.querySelectorAll('.chat-item').forEach(function(item) {
                var name = item.querySelector('.chat-name').textContent.toLowerCase();
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }
        function toggleSidebar() {
            var sidebar = document.querySelector('.sidebar');
            var toggle = document.getElementById('sidebarToggle');
            sidebar.classList.toggle('collapsed');
            document.body.classList.toggle('collapsed-sidebar');
            if (sidebar.classList.contains('collapsed')) {
                toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
                toggle.title = 'Развернуть панель';
                localStorage.setItem('photobot_sidebar', 'collapsed');
            } else {
                toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
                toggle.title = 'Свернуть панель';
                localStorage.setItem('photobot_sidebar', 'expanded');
            }
            var main = document.querySelector('.main');
            if (main) {
                var rafId;
                var tick = function() {
                    updateFloatingButtons();
                    rafId = requestAnimationFrame(tick);
                };
                rafId = requestAnimationFrame(tick);
                main.addEventListener('transitionend', function() {
                    cancelAnimationFrame(rafId);
                    updateFloatingButtons();
                }, { once: true });
            }
        }
        function renderMessages() {
            document.querySelectorAll('.floating-copy-btn, .floating-download-btn, .floating-preview-btn, .floating-code-header').forEach(function(btn) { btn.remove(); });
            const chat = chats.find(c => c.id === currentChatId);
            const area = document.getElementById('chatArea');
            if (!chat || chat.messages.length === 0) {
                area.innerHTML = `<div class="empty-state"><img src="deepseek_logo.png" class="logo-lg" alt="DeepSeek V4 Flash" onerror="this.style.display='none'"><div class="title">DeepSeek V4 Flash</div><div style="color:#666;font-size:13px;">Задайте любой вопрос или прикрепите файл</div></div>`;
            } else {
                area.innerHTML = chat.messages.map((m, i) => {
                    let actionsHtml = '<div class="message-actions">';
                    if (m.role === 'user') {
                        actionsHtml += `<button onclick="copyMessage(${i})" id="copy-btn-${i}" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
                        actionsHtml += `<button onclick="editMessage(${i})" title="Редактировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>`;
                    } else {
                        actionsHtml += `<button onclick="copyMessage(${i})" id="copy-btn-${i}" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
                        actionsHtml += `<button onclick="downloadMessage(${i})" id="download-btn-${i}" title="Скачать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>`;
                        if (m.interrupted) actionsHtml += `<button onclick="continueMessage(${i})" title="Продолжить"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>`;
                    }
                    actionsHtml += '</div>';
                    var dataAttr = ' data-msg-index="' + i + '"';
                    var reasoningHtml = '';
                    var contentToShow = m.content;
                    if (m.reasoning) {
                        reasoningHtml = '<div class="reasoning-block">' + formatMessage(m.reasoning) + '</div>';
                        var endIdx = m.content.indexOf('\n\nОтвет:\n');
                        if (endIdx !== -1) {
                            contentToShow = m.content.substring(endIdx + '\n\nОтвет:\n'.length);
                        }
                    } else if (m._reasoningInProgress && m.content) {
                        var startIdx = m.content.indexOf('Размышление:\n');
                        if (startIdx !== -1) {
                            reasoningHtml = '<div class="reasoning-block">' + escapeHtml(m.content.substring(startIdx + 'Размышление:\n'.length)).replace(/\n/g, '<br>') + '</div>';
                            contentToShow = '';
                        }
                    }
                    return '<div class="message-row ' + m.role + '"' + dataAttr + '><div><div class="message-content">' + reasoningHtml + formatMessage(contentToShow) + '</div>' + actionsHtml + '</div></div>';
                }).join('');
            }
            hljs.highlightAll();
            setupFloatingCopyButtons();
            buildNavContainer();
            var main = document.querySelector('.main');
            if (main) {
                main.style.scrollBehavior = 'auto';
                main.scrollTop = main.scrollHeight;
                main.style.scrollBehavior = 'smooth';
            }
        }
        function copyMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            navigator.clipboard.writeText(chat.messages[index].content);
            const btn = document.getElementById('copy-btn-' + index);
            if (btn) {
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                setTimeout(function() { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'; }, 2000);
            }
        }
        function downloadMessage(index) {
            var chat = chats.find(function(c) { return c.id === currentChatId; });
            if (!chat) return;
            var msg = chat.messages[index];
            if (!msg) return;
            var content = msg.content || '';
            var reasoning = msg.reasoning || '';
            var fullText = reasoning ? 'Размышление:\n' + reasoning + '\n\nОтвет:\n' + content : content;
            
            var existing = document.getElementById('download-dropdown-' + index);
            if (existing) { existing.remove(); return; }
            
            var dropdown = document.createElement('div');
            dropdown.id = 'download-dropdown-' + index;
            dropdown.style.cssText = 'position:fixed;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px;z-index:20;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,0.4);';
            if (document.body.classList.contains('light')) {
                dropdown.style.background = '#ffffff';
                dropdown.style.border = '1px solid rgba(0,0,0,0.1)';
                dropdown.style.boxShadow = '0 8px 24px rgba(0,0,0,0.15)';
            }
            
            var formats = [
                { label: '📄 Текст (.txt)', ext: 'txt', mime: 'text/plain;charset=utf-8' },
                { label: '📝 Word (.doc)', ext: 'doc', mime: 'application/msword' }
            ];
            
            formats.forEach(function(f) {
                var btn = document.createElement('button');
                btn.textContent = f.label;
                btn.style.cssText = 'display:block;width:100%;padding:8px 12px;border:none;background:transparent;color:#e0e0e0;font-size:12px;cursor:pointer;text-align:left;border-radius:4px;font-family:Inter,sans-serif;white-space:nowrap;';
                if (document.body.classList.contains('light')) {
                    btn.style.color = '#333';
                }
                btn.onmouseenter = function() { btn.style.background = document.body.classList.contains('light') ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.08)'; };
                btn.onmouseleave = function() { btn.style.background = 'transparent'; };
                btn.onclick = function() {
                    var output = fullText;
                    if (f.ext === 'doc') {
                        output = '<html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;font-size:14px;line-height:1.6;white-space:pre-wrap;padding:20px;}</style></head><body>' + output.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') + '</body></html>';
                    }
                    var blob = new Blob([output], { type: f.mime });
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = 'response.' + f.ext;
                    a.click();
                    URL.revokeObjectURL(url);
                    dropdown.remove();
                };
                dropdown.appendChild(btn);
            });
            
            var downloadBtn = document.getElementById('download-btn-' + index);
            if (downloadBtn) {
                var rect = downloadBtn.getBoundingClientRect();
                dropdown.style.top = (rect.bottom + 4) + 'px';
                dropdown.style.left = rect.left + 'px';
                document.body.appendChild(dropdown);
                setTimeout(function() {
                    document.addEventListener('click', function closeDrop(e) {
                        if (!dropdown.contains(e.target) && e.target !== downloadBtn) {
                            dropdown.remove();
                            document.removeEventListener('click', closeDrop);
                        }
                    });
                }, 10);
            }
        }
        function editMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                var input = document.getElementById('userInput');
                input.value = chat.messages[index].content;
                input.focus();
                input.dispatchEvent(new Event('input', { bubbles: true }));
            }
        }
        function setMode(mode) { currentMode = mode; }
        function toggleReasoner() {
            if (currentMode === 'reasoner') {
                currentMode = 'chat';
                document.getElementById('reasonerToggle').classList.remove('active');
            } else {
                currentMode = 'reasoner';
                document.getElementById('reasonerToggle').classList.add('active');
            }
            localStorage.setItem('photobot_mode', currentMode);
        }
        function autoNameChat(chat) {
            const lastAssistant = [...chat.messages].reverse().find(m => m.role === 'assistant');
            if (lastAssistant && !lastAssistant.interrupted && chat.title.startsWith('Чат ')) {
                chat.title = lastAssistant.content.replace(/[#*`>\n]/g, ' ').split(' ').slice(0, 6).join(' ') || 'Новый чат';
                if (chat.title.length > 40) chat.title = chat.title.substring(0, 40) + '...';
            }
        }

        function updateFileList() {
            const inline = document.getElementById('fileNameInline');
            if (!pendingFile) { 
                if (inline) inline.innerHTML = ''; 
                return; 
            }
            if (inline) inline.innerHTML = '📎 ' + escapeHtml(pendingFile.name) + ' <button onclick="pendingFile=null;updateFileList();" style="background:transparent;border:none;color:#e74c3c;cursor:pointer;font-size:14px;padding:0;line-height:1;">✕</button>';
        }

        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const base64 = ev.target.result.split(',')[1];
                pendingFile = { name: file.name, mime: file.type, data: base64 };
                updateFileList();
            };
            reader.readAsDataURL(file);
            document.getElementById('fileInput').value = '';
        }
        function setupDragDrop() {
            const inputArea = document.getElementById('inputArea');
            const dropZone = document.getElementById('dropZone');
            
            if (!inputArea || !dropZone) return;
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                inputArea.addEventListener(eventName, function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                });
            });
            
            ['dragenter', 'dragover'].forEach(eventName => {
                inputArea.addEventListener(eventName, function() {
                    dropZone.style.display = 'flex';
                });
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                inputArea.addEventListener(eventName, function() {
                    dropZone.style.display = 'none';
                });
            });
            
            inputArea.addEventListener('drop', function(e) {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    const reader = new FileReader();
                    reader.onload = function(ev) {

        function formatMessage(text) {
            var B = String.fromCharCode(96);
            if (/^\s*<(!DOCTYPE|html)/i.test(text)) {
                text = B + B + B + 'html\n' + text + '\n' + B + B + B;
            }
            let parts = [];
            let lastIndex = 0;
            const regex = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({type: 'text', content: text.substring(lastIndex, match.index)});
                }
                parts.push({type: 'code', lang: match[1], content: match[2]});
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
                var remaining = text.substring(lastIndex);
                var openCode = remaining.match(new RegExp('^([\\s\\S]*?)' + B + B + B + '(\\w*)\\r?\\n([\\s\\S]*)'));
                if (openCode) {
                    if (openCode[1]) {
                        parts.push({type: 'text', content: openCode[1]});
                    }
                    parts.push({type: 'code', lang: openCode[2], content: openCode[3]});
                } else {
                    parts.push({type: 'text', content: remaining});
                }
            }
            let result = '';
            for (const part of parts) {
                if (part.type === 'code') {
                    var lang = part.lang || '';
                    result += '<pre><code class="' + (lang ? 'language-' + escapeHtml(lang) : '') + '">' + escapeHtml(part.content) + '</code></pre>';
                } else {
                    result += escapeHtml(part.content).replace(/`([^`]+)`/g, '<code>' + '$1' + '</code>').replace(/\n/g, '<br>');
                }
            }
            return result;
        }

                    previewBtn.onmouseleave = function() { previewBtn.style.background = 'transparent'; };
                    previewBtn.onclick = function() {
                        var code = pre._editorActive && pre._textarea ? pre._textarea.value : (pre.querySelector('code') ? pre.querySelector('code').textContent : '');
                        var panel = document.getElementById('previewPanel');
                        var iframe = document.getElementById('previewIframe');
                        var handle = document.getElementById('resizeHandle');
                        if (!panel) {
                            panel = document.createElement('div');
                            panel.id = 'previewPanel';
                            panel.className = 'preview-panel';
                            panel.innerHTML = '<div class="preview-header"><span class="preview-title">Предпросмотр</span><button class="preview-close" onclick="closePreview()">✕</button></div><iframe id="previewIframe" class="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>';
                            document.body.appendChild(panel);
                            iframe = document.getElementById('previewIframe');
                        }
                        if (!handle) {
                            handle = document.createElement('div');
                            handle.id = 'resizeHandle';
                            handle.className = 'resize-handle';
                            document.body.appendChild(handle);
                            handle._startX = 0;
                            handle._startWidth = 50;
                            handle.addEventListener('pointerdown', function(e) {
                                e.preventDefault();
                                handle.setPointerCapture(e.pointerId);
                                handle._startX = e.clientX;
                                handle._startWidth = parseInt(getComputedStyle(document.body).getPropertyValue('--preview-width')) || 50;
                                handle.classList.add('dragging');
                                document.body.style.userSelect = 'none';
                            });
                            handle.addEventListener('pointermove', function(e) {
                                if (!handle.classList.contains('dragging')) return;
                                var dx = handle._startX - e.clientX;
                                var mainWidth = document.querySelector('.main').clientWidth;
                                var minChat = 400;
                                var maxPw = ((mainWidth - minChat) / window.innerWidth) * 100;
                                if (maxPw < 20) maxPw = 20;
                                if (maxPw > 80) maxPw = 80;
                                var newWidth = Math.max(20, Math.min(maxPw, handle._startWidth + (dx / window.innerWidth) * 100));
                                document.body.style.setProperty('--preview-width', newWidth + '%');
                                handle.style.right = newWidth + '%';
                                updateFloatingButtons();
                            });
                            handle.addEventListener('pointerup', function(e) {
                                handle.classList.remove('dragging');
                                document.body.style.userSelect = '';
                                handle.releasePointerCapture(e.pointerId);
                            });
                            handle.addEventListener('pointercancel', function(e) {
                                handle.classList.remove('dragging');
                                document.body.style.userSelect = '';
                                handle.releasePointerCapture(e.pointerId);
                            });
                        }
                        document.body.style.setProperty('--preview-width', '50%');
                        panel.classList.add('active');
                        handle.classList.add('active');
                        handle.style.right = '50%';
                        document.querySelector('.main').classList.add('preview-open');
                        updateFloatingButtons();
                        var main = document.querySelector('.main');
                        if (main) {
                            var rafId;
                            var tick = function() {
                                updateFloatingButtons();
                                rafId = requestAnimationFrame(tick);
                            };
                            rafId = requestAnimationFrame(tick);
                            main.addEventListener('transitionend', function() {
                                cancelAnimationFrame(rafId);
                                updateFloatingButtons();
                            }, { once: true });
                        }
                        iframe.srcdoc = code;
                    };
                    actions.appendChild(previewBtn);
                }
                if (document.body.classList.contains('light')) {
                    editBtn.style.color = '#555';
                    copyBtn.style.color = '#555';
                    downloadBtn.style.color = '#555';
                    if (typeof previewBtn !== 'undefined') previewBtn.style.color = '#555';
                }
                updateFloatingButtons();
            });
        }

        function toggleCodeEditor(pre) {
            var codeEl = pre.querySelector('code');
            if (!codeEl) return;

            if (pre._editorActive) {
                var textarea = pre._textarea;
                var newCode = textarea ? textarea.value : '';
                codeEl.textContent = newCode;
                if (textarea) textarea.remove();
                if (pre._editorToolbar) pre._editorToolbar.remove();
                codeEl.style.display = '';
                pre._editorActive = false;
                pre._textarea = null;
                pre._editorToolbar = null;
                if (typeof hljs !== 'undefined' && hljs.highlightElement) {
                    hljs.highlightElement(codeEl);
                }
            } else {
                var originalCode = codeEl.textContent;
                pre._originalCode = originalCode;
                codeEl.style.display = 'none';

                var toolbar = document.createElement('div');
                toolbar.style.cssText = 'display:flex;gap:6px;padding:6px 0;align-items:center;';
                toolbar.innerHTML = '<span style="font-size:11px;color:#aaa;font-family:Inter,sans-serif;">Редактор</span>' +
                    '<button class="editor-apply-btn" style="background:#00CBF5;border:none;color:#201F28;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Inter,sans-serif;font-weight:600;">✅ Применить</button>' +
                    '<button class="editor-cancel-btn" style="background:transparent;border:1px solid #666;color:#aaa;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Inter,sans-serif;">↩ Отмена</button>';
                pre.appendChild(toolbar);
                pre._editorToolbar = toolbar;

                var textarea = document.createElement('textarea');
                textarea.value = originalCode;
                textarea.style.cssText = 'width:100%;min-height:200px;background:#0d0d1a;color:#e0e0e0;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:10px;font-family:\'Courier New\',monospace;font-size:13px;resize:vertical;outline:none;';
                if (document.body.classList.contains('light')) {
                    textarea.style.background = '#ffffff';
                    textarea.style.color = '#111';
                    textarea.style.border = '1px solid rgba(0,0,0,0.15)';
                }
                pre.appendChild(textarea);
                pre._textarea = textarea;
                pre._editorActive = true;

                toolbar.querySelector('.editor-apply-btn').onclick = function() {
                    toggleCodeEditor(pre);
                };
                toolbar.querySelector('.editor-cancel-btn').onclick = function() {
                    var orig = pre._originalCode || '';
                    codeEl.textContent = orig;
                    toggleCodeEditor(pre);
                };
            }
        }
        function updateFloatingButtons() {
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                var header = pre._floatHeader;
                if (!header) return;
                var rect = pre.getBoundingClientRect();
                var topBar = document.querySelector('.top-bar');
                var topBarBottom = topBar ? topBar.getBoundingClientRect().bottom : 0;
                var visibleTop = Math.max(rect.top, topBarBottom);
                var visibleBottom = Math.min(rect.bottom, window.innerHeight);
                var visibleHeight = visibleBottom - visibleTop;
                var visible = visibleHeight >= 80;
                if (visible) {
                    header.style.display = 'flex';
                    var headerHeight = header.offsetHeight || 28;
                    var top = visibleTop;
                    var bottomLimit = rect.bottom - headerHeight;
                    if (top > bottomLimit) {
                        top = bottomLimit;
                    }
                    if (top < topBarBottom) {
                        top = topBarBottom;
                    }
                    header.style.top = top + 'px';
                    header.style.left = rect.left + 'px';
                    header.style.right = 'auto';
                    header.style.width = rect.width + 'px';
                } else {
                    header.style.display = 'none';
                }
            });
        }

        function buildNavContainer() {
            var container = document.getElementById('navContainer');
            if (!container) return;
            var chat = chats.find(c => c.id === currentChatId);
            if (!chat || chat.messages.length === 0) { container.innerHTML = ''; return; }
            var html = '';
            for (var i = 0; i < chat.messages.length; i++) {
                if (chat.messages[i].role === 'user' && chat.messages[i].content) {
                    var preview = chat.messages[i].content.substring(0, 80);
                    html += '<div class="nav-strip" data-msg-index="' + i + '" onclick="scrollToMsg(' + i + ')"><div class="nav-bar"></div><span class="nav-text">' + escapeHtml(preview) + '</span></div>';
                }
            }
            container.innerHTML = html;
        }
        function updateActiveNavFromScroll() {
            var main = document.querySelector('.main');
            if (!main) return;
            var rows = main.querySelectorAll('.message-row[data-msg-index]');
            var areaRect = main.getBoundingClientRect();
            var closestIndex = null;
            var closestDist = Infinity;
            for (var r = 0; r < rows.length; r++) {
                var rect = rows[r].getBoundingClientRect();
                var mid = rect.top + rect.height / 2;
                var dist = Math.abs(mid - (areaRect.top + areaRect.height / 2));
                if (dist < closestDist) {
                    closestDist = dist;
                    closestIndex = rows[r].getAttribute('data-msg-index');
                }
            }
            document.querySelectorAll('.nav-strip').forEach(function(s) { s.classList.remove('active'); });
            if (closestIndex !== null) {
                var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + closestIndex + '"]');
                if (activeStrip) {
                    activeStrip.classList.add('active');
                    var container = document.getElementById('navContainer');
                    if (container) {
                        var stripTop = activeStrip.offsetTop;
                        var containerH = container.clientHeight;
                        container.scrollTo({ top: stripTop - containerH / 2 + activeStrip.offsetHeight / 2, behavior: 'smooth' });
                    }
                }
            }
        }
        var mainEl2 = document.querySelector('.main');
        if (mainEl2) {
            mainEl2.addEventListener('scroll', updateActiveNavFromScroll);
        }
        document.getElementById('navContainer').addEventListener('wheel', function(e) {
            e.stopPropagation();
        });
        function scrollToMsg(index) {
            var main = document.querySelector('.main');
            if (!main) return;
            main.style.scrollBehavior = 'auto';
            var target = main.querySelector('.message-row[data-msg-index="' + index + '"]');
            if (target) {
                target.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
            main.style.scrollBehavior = 'smooth';
            document.querySelectorAll('.nav-strip').forEach(function(s) { s.classList.remove('active'); });
            var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + index + '"]');
            if (activeStrip) { activeStrip.classList.add('active'); }
        }

        function closePreview() {
            var panel = document.getElementById('previewPanel');
            var handle = document.getElementById('resizeHandle');
            if (panel) panel.classList.remove('active');
            if (handle) handle.classList.remove('active');
            document.querySelector('.main').classList.remove('preview-open');
            var main = document.querySelector('.main');
            if (main) {
                var rafId;
                var tick = function() {
                    updateFloatingButtons();
                    rafId = requestAnimationFrame(tick);
                };
                rafId = requestAnimationFrame(tick);
                main.addEventListener('transitionend', function() {
                    cancelAnimationFrame(rafId);
                    updateFloatingButtons();
                }, { once: true });
            }
        }

        window.addEventListener('load', function() {
            setupFloatingCopyButtons();
        });
        window.addEventListener('scroll', updateFloatingButtons, true);
        window.addEventListener('resize', updateFloatingButtons);
    </script>
</body>
</html>

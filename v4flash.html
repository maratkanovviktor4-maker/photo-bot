<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — DeepSeek V4 Flash</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
        body.light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
        body.light ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }
        body { font-family: 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; background: #201F28; color: #e0e0e0; height: 100vh; display: flex; overflow: hidden; width: 100vw; }
        body.light { background: #ffffff; color: #111111; }
        .sidebar { width: 280px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); display: flex; flex-direction: column; padding: 16px; border-right: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
        body.light .sidebar { background: rgba(240,240,240,0.8); border-right: 1px solid rgba(0,0,0,0.08); }
        .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .logo-row img { height: 32px; }
        .logo-text { font-size: 15px; font-weight: 600; color: #00CBF5; margin-top: 4px; font-family: 'Inter', sans-serif; }
        .new-chat { width: 100%; padding: 10px; background: linear-gradient(90deg, #00CBF5, #14E9FC); color: #201F28; border: 2px solid transparent; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; margin-bottom: 12px; transition: 0.3s ease; box-shadow: 0 4px 16px rgba(0,203,245,0.3); }
        .new-chat:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,203,245,0.4); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #a0a0b0; margin-bottom: 2px; transition: 0.15s; position: relative; font-family: 'Inter', sans-serif; }
        body.light .chat-item { color: #555; }
        .chat-item:hover { background: rgba(0,203,245,0.1); color: #e0e0e0; }
        body.light .chat-item:hover { background: rgba(0,0,0,0.05); color: #111; }
        .chat-item.active { background: rgba(0,203,245,0.15); color: #00CBF5; font-weight: 600; }
        body.light .chat-item.active { background: rgba(0,0,0,0.08); }
        .chat-item .chat-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .chat-menu-btn { width: 24px; height: 24px; border-radius: 4px; border: none; background: transparent; color: #666; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 6px; font-family: 'Inter', sans-serif; }
        .chat-item .chat-menu-btn:hover { background: rgba(0,203,245,0.2); color: #e0e0e0; }
        .chat-menu-dropdown { position: absolute; right: 0; top: 100%; background: rgba(34,34,34,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 4px; z-index: 10; display: none; min-width: 140px; }
        body.light .chat-menu-dropdown { background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.1); }
        .chat-menu-dropdown.show { display: block; }
        .chat-menu-dropdown button { display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; color: #e0e0e0; font-size: 12px; cursor: pointer; text-align: left; border-radius: 4px; font-family: 'Inter', sans-serif; }
        body.light .chat-menu-dropdown button { color: #333; }
        .chat-menu-dropdown button:hover { background: rgba(0,203,245,0.15); }
        .chat-menu-dropdown button.delete { color: #e74c3c; }
        .chat-menu-dropdown button.delete:hover { background: rgba(231,76,60,0.15); }
        .sidebar-footer { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; margin-top: 8px; }
        body.light .sidebar-footer { border-top: 1px solid rgba(0,0,0,0.08); }
        .sidebar-footer a { color: #888; text-decoration: none; font-size: 12px; display: block; text-align: center; font-family: 'Inter', sans-serif; transition: 0.2s; }
        .sidebar-footer a:hover { color: #00CBF5; }
        .main { flex: 1; display: flex; flex-direction: column; background: #201F28; max-width: calc(100vw - 280px); overflow: hidden; width: calc(100vw - 280px); }
        body.light .main { background: #ffffff; }
        .top-bar { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); background: #201F28; flex-shrink: 0; }
        body.light .top-bar { background: rgba(240,240,240,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.08); }
        .mode-btn { padding: 6px 16px; border-radius: 16px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent; font-family: 'Inter', sans-serif; transition: 0.3s ease; background: rgba(34,34,34,0.8); color: #a0a0b0; }
        body.light .mode-btn { background: rgba(0,0,0,0.05); color: #555; }
        .mode-btn.active { background: linear-gradient(90deg, #00CBF5, #14E9FC); border-color: transparent; color: #201F28; font-weight: 600; box-shadow: 0 0 16px rgba(0,203,245,0.7); }
        body.light .mode-btn.active { background: linear-gradient(90deg, #00CBF5, #14E9FC); border-color: transparent; color: #201F28; font-weight: 600; box-shadow: 0 0 16px rgba(0,203,245,0.7); }
        .mode-btn:hover:not(.active) { border-color: #00CBF5; color: #e0e0e0; }
        body.light .mode-btn:hover:not(.active) { color: #111; }
        #balanceDisplay { font-size: 12px; color: #00CBF5; font-family: 'Inter', sans-serif; white-space: nowrap; margin-right: auto; }
        .chat-wrapper { width: 100%; max-width: 775px; display: flex; flex-direction: column; flex: 1; min-height: 0; margin: 0 auto; position: relative; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; position: relative; min-height: 0; }
        .scroll-bottom-btn { position: absolute; bottom: 10px; right: 20px; width: 44px; height: 44px; border-radius: 50%; background: rgba(0,203,245,0.85); color: #201F28; border: none; cursor: pointer; font-size: 22px; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,203,245,0.4); transition: 0.3s ease; z-index: 10002; }
        .scroll-bottom-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,203,245,0.6); }
        .chat-area .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #555; }
        body.light .chat-area .empty-state { color: #999; }
        .chat-area .empty-state .logo-lg { height: 60px; opacity: 0.6; }
        .chat-area .empty-state .title { font-size: 22px; font-weight: 600; color: #777; font-family: 'Inter', sans-serif; }
        body.light .chat-area .empty-state .title { color: #333; }
        .message-row { display: flex; gap: 12px; align-items: flex-start; max-width: 100%; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; max-width: 90%; }
        .message-row.assistant { align-self: flex-start; }
        .message-content { padding: 10px 14px; border-radius: 12px; font-size: 16px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; max-width: 100%; overflow-x: hidden; }
        .message-row.assistant .message-content { background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); }
        body.light .message-row.assistant .message-content { background: #ffffff; color: #111; }
        .message-row.user .message-content { background: rgba(0,203,245,0.15); border-radius: 20px; }
        body.light .message-row.user .message-content { background: #EDF3FE; color: #111; }
        .message-content pre { background: #0a0a1a; padding: 14px; border-radius: 10px; overflow-x: auto; font-size: 14px; margin: 8px 0; border: none; white-space: pre-wrap; word-break: break-all; position: relative; }
        body.light .message-content pre { background: #f5f5f5; border: none; color: #111; }
        .message-content pre code { font-family: 'Courier New', monospace; font-size: 14px; background: transparent; padding: 0; border-radius: 0; display: block; color: inherit; }
        .message-content code { font-family: 'Courier New', monospace; font-size: 14px; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; color: #e0e0e0; }
        body.light .message-content code { background: #f5f5f5; color: #111; }
        .message-actions { display: flex; gap: 6px; margin-top: 6px; }
        .message-row.user .message-actions { justify-content: flex-end; }
        .message-row.assistant .message-actions { justify-content: flex-start; }
        .message-actions button { background: transparent; border: none; color: #888; cursor: pointer; padding: 6px 8px; border-radius: 8px; font-family: 'Inter', sans-serif; transition: background 0.15s; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
        .message-actions button:hover { background: rgba(255,255,255,0.08); }
        body.light .message-actions button { background: transparent; border: none; color: #555; }
        body.light .message-actions button:hover { background: rgba(0,0,0,0.06); }
        .input-area { padding: 0; border-top: none; display: flex; gap: 0; align-items: flex-end; background: #201F28; flex-shrink: 0; overflow: visible; position: relative; flex-wrap: wrap; margin-bottom: 25px; }
        body.light .input-area { background: #ffffff; border-top: none; margin-bottom: 25px; }
        .input-area textarea { flex: 1; padding: 0; border-radius: 0; border: none; background: transparent; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; font-size: 15px; outline: none; resize: none; min-height: 48px; max-height: 300px; overflow-y: auto; min-width: 0; width: 100%; }
        .input-area textarea:focus { outline: none; border: none; box-shadow: none; }
        body.light .input-area textarea { background: transparent; border: none; color: #111; }
        body.light .input-area textarea:focus { outline: none; border: none; box-shadow: none; }
        .input-area textarea:focus { border-color: #00CBF5; box-shadow: 0 0 0 3px rgba(0,203,245,0.15); }
        #sendBtn { width: 36px; height: 36px; padding: 0; background: linear-gradient(90deg, #00CBF5, #14E9FC); color: #201F28; border: 2px solid transparent; border-radius: 50%; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 16px; transition: 0.3s ease; flex-shrink: 0; box-shadow: 0 4px 16px rgba(0,203,245,0.3); display: inline-flex; align-items: center; justify-content: center; }
        #sendBtn:disabled { background: rgba(0,203,245,0.3); color: rgba(32,31,40,0.4); cursor: not-allowed; box-shadow: none; transform: none; }
        #sendBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,203,245,0.4); }
        .attach-btn { padding: 8px; background: rgba(34,34,34,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #00CBF5; cursor: pointer; font-family: 'Inter', sans-serif; transition: 0.3s ease; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        body.light .attach-btn { background: #e8e8e8; border: 1px solid rgba(0,0,0,0.1); }
        .attach-btn:hover { color: #14E9FC; border-color: #00CBF5; background: rgba(0,203,245,0.1); }
        .file-name-inline { font-size: 12px; color: #00CBF5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-left: auto; margin-right: 0; }
        .theme-btn { padding: 6px 12px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); color: #aaa; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600; transition: 0.3s ease; }
        body.light .theme-btn { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); color: #555; }
        .thinking-dots::after { content: ''; animation: dots 1.5s infinite; }
        @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
        .thinking-dots { display: inline; }
        .thinking-dots::after { content: ''; animation: dots 1.5s infinite; }
        .file-list { width: 100%; display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 6px 0 6px; }
        .file-tag { display: inline-flex; align-items: center; background: rgba(0,203,245,0.15); border: 1px solid rgba(0,203,245,0.3); border-radius: 6px; padding: 3px 8px; font-size: 12px; color: #00CBF5; gap: 6px; }
        body.light .file-tag { background: rgba(0,203,245,0.1); color: #005f73; }
        .file-tag button { background: transparent; border: none; color: #e74c3c; cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
        .file-tag button:hover { color: #ff6b6b; }
        .input-row-wrapper { width: 100%; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; transition: border-color 0.2s, box-shadow 0.2s; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .input-row-wrapper:focus-within { border-color: rgba(255,255,255,0.08); }
        body.light .input-row-wrapper { background: #ffffff; border: 1px solid rgba(0,0,0,0.15); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        body.light .input-row-wrapper:focus-within { border-color: rgba(0,0,0,0.15); }
        .input-row { display: flex; gap: 8px; align-items: flex-end; width: 100%; padding: 8px 12px 0 12px; }
        .input-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; }
    </style>
<script src="config.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="logo-row">
            <img src="deepseek_logo.png" alt="DeepSeek Flash" onerror="this.style.display='none'">
            <span class="logo-text"><span style="color:#8B5CF6;">V4 Flash</span></span>
        </div>
        <button class="new-chat" onclick="newChat()">Новый чат</button>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <a href="index.html">На главную</a>
        </div>
    </div>
    <div class="main">
        <div class="top-bar">
            <span id="balanceDisplay"> ...</span>
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle" style="margin-left: auto;">☀️</button>
        </div>
        <div class="chat-wrapper">
            <div class="chat-area" id="chatArea">
                <div class="empty-state">
                    <img src="deepseek_logo.png" class="logo-lg" alt="DeepSeek Flash" onerror="this.style.display='none'">
                    <div class="title">DeepSeek V4 Flash</div>
                    <div style="color:#666;font-size:13px;">Задайте любой вопрос или прикрепите файл</div>
                </div>
            </div>
            <div class="input-area" id="inputArea">
                <div id="dropZone" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;display:none;align-items:center;justify-content:center;background:rgba(0,203,245,0.1);border:2px dashed #00CBF5;border-radius:10px;font-size:14px;color:#00CBF5;">Отпустите файл для загрузки</div>
                <div class="file-list" id="fileList"></div>
                <div class="input-row-wrapper">
                    <div class="input-row">
                        <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
                        <textarea id="userInput" placeholder="Введите сообщение..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}" oninput="this.style.height='auto';var h=this.scrollHeight;this.style.height=Math.min(h,300)+'px';" onfocus="if(!this._init){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,300)+'px';this._init=true;}"></textarea>
                    </div>
                    <div class="input-toolbar">
                        <button class="mode-btn" id="reasonerToggle" onclick="toggleReasoner()" style="font-size:11px;padding:4px 10px;">Reasoner</button>
                        <span class="file-name-inline" id="fileNameInline"></span>
                        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
                        <button id="sendBtn" onclick="sendMessage()" title="Отправить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
                    </div>
                </div>
            </div>
            <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom()">↓</button>
        </div>
    </div>

    <script>
        var autoScroll = true;

        const SERVER_URL = CONFIG.SERVER_URL;
        let currentMode = 'chat';
        let chats = [];
        let currentChatId = null;
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let typingInterval = null;
        let pendingFile = null;

        window.addEventListener('wheel', function(e) {
            const area = document.getElementById('chatArea');
            if (!area || isSending) return;
            const target = e.target;
            if (target && (target.closest('.chat-list') || target.closest('.chat-menu-dropdown') || target.closest('.sidebar'))) return;
            if (target && target.closest('#userInput')) return;
            area.scrollTop += e.deltaY;
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
        window.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); });
        function toggleTheme() {
            document.body.classList.toggle('light');
            var isLight = document.body.classList.contains('light');
            localStorage.setItem('photobot_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
        }
        (function() {
            var saved = localStorage.getItem('photobot_theme');
            if (saved === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            var savedMode = localStorage.getItem('photobot_mode');
            if (savedMode === 'reasoner') {
                currentMode = 'reasoner';
                var btn = document.getElementById('reasonerToggle');
                if (btn) btn.classList.add('active');
            }
        })();

        function scrollToBottom() {
            var area = document.getElementById('chatArea');
            area.scrollTop = area.scrollHeight;
            autoScroll = true;
        }

        document.addEventListener('scroll', function(e) {
            var btn = document.getElementById('scrollBottomBtn');
            var area = document.getElementById('chatArea');
            if (!area) return;
            var atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 300;
            if (atBottom) {
                btn.style.display = 'none';
                autoScroll = true;
            } else {
                btn.style.display = 'flex';
                autoScroll = false;
            }
        }, true);

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            if (!sessionToken || !currentUserId) {
                alert('Сессия устарела. Авторизуйтесь заново на главной странице.');
                window.location.href = 'index.html';
            } else {
                loadChatsFromServer();
                updateBalance();
            }
        } else {
            alert('Авторизуйтесь на главной странице');
            window.location.href = 'index.html';
        }

        async function loadChatsFromServer() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_chat_history?user_id=${currentUserId}&model=flash&session_token=${sessionToken}`);
                if (resp.status === 403) {
                    alert('Сессия устарела. Авторизуйтесь заново.');
                    window.location.href = 'index.html';
                    return;
                }
                const data = await resp.json();
                if (data.history) {
                    chats = [];
                    for (const [chatId, messages] of Object.entries(data.history)) {
                        const title = data.titles && data.titles[chatId] ? data.titles[chatId] : ('Чат ' + chatId);
                        chats.push({ id: chatId, title: title, messages: messages });
                    }
                    chats.sort((a, b) => a.id.localeCompare(b.id));
                }
            } catch (e) {
                console.error('loadChatsFromServer error:', e);
            }
            if (chats.length === 0) {
                const chat = { id: String(Date.now()), title: 'Новый чат', messages: [] };
                chats.push(chat);
            }
            renderChatList();
            currentChatId = chats[chats.length - 1].id;
            openChat(currentChatId);
        }
        async function updateBalance() {
            try {
                const resp = await fetch(`${SERVER_URL}/get_balance?user_id=${currentUserId}&session_token=${sessionToken}`);
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('balanceDisplay').textContent = `${data.flash.toFixed(1)} Stars`;
                }
            } catch(e) {
                console.error(e);
            }
        }
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function newChat() {
            const chat = { id: Date.now().toString(), title: 'Новый чат', messages: [] };
            chats.push(chat);
            currentChatId = chat.id;
            renderChatList();
            renderMessages();
        }
        function openChat(id) {
            currentChatId = id;
            renderChatList();
            renderMessages();
            setTimeout(function() {
                var area = document.getElementById('chatArea');
                if (area) area.scrollTop = area.scrollHeight;
            }, 150);
        }
        function toggleChatMenu(e, id) {
            e.stopPropagation();
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
            const dropdown = document.getElementById('menu_' + id);
            if (dropdown) dropdown.classList.toggle('show');
        }
        async function renameChat(id) {
            const chat = chats.find(c => c.id === id);
            const newName = prompt('Новое название:', chat?.title || '');
            if (newName && chat) {
                chat.title = newName;
                renderChatList();
                try {
                    await fetch(`${SERVER_URL}/rename_chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                        body: JSON.stringify({ user_id: currentUserId, model: 'flash', chat_id: String(id), title: newName })
                    });
                } catch (e) {}
            }
        }
        async function deleteChat(id) {
            if (!confirm('Удалить чат?')) return;
            try {
                await fetch(`${SERVER_URL}/delete_chat?user_id=${currentUserId}&model=flash&chat_id=${id}&session_token=${sessionToken}`, {
                    method: 'DELETE'
                });
            } catch (e) {}
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) currentChatId = chats.length > 0 ? chats[chats.length - 1].id : null;
            renderChatList();
            renderMessages();
            document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show'));
        }
        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => `
                <div class="chat-item${c.id === currentChatId ? ' active' : ''}" onclick="openChat('${c.id}')">
                    <span class="chat-name">${c.title}</span>
                    <button class="chat-menu-btn" onclick="toggleChatMenu(event, '${c.id}')">...</button>
                    <div class="chat-menu-dropdown" id="menu_${c.id}">
                        <button onclick="renameChat('${c.id}')">Переименовать</button>
                        <button class="delete" onclick="deleteChat('${c.id}')">Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        function renderMessages() {
            document.querySelectorAll('.floating-copy-btn').forEach(function(btn) { btn.remove(); });
            const chat = chats.find(c => c.id === currentChatId);
            const area = document.getElementById('chatArea');
            if (!chat || chat.messages.length === 0) {
                area.innerHTML = `<div class="empty-state"><img src="deepseek_logo.png" class="logo-lg" alt="DeepSeek V4 Flash" onerror="this.style.display='none'"><div class="title">DeepSeek V4 Flash</div><div style="color:#666;font-size:13px;">Задайте любой вопрос или прикрепите файл</div></div>`;
            } else {
                area.innerHTML = chat.messages.map((m, i) => {
                    let actionsHtml = '<div class="message-actions">';
                    if (m.role === 'user') {
                        actionsHtml += `<button onclick="editMessage(${i})" title="Редактировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>`;
                        actionsHtml += `<button onclick="copyMessage(${i})" id="copy-btn-${i}" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
                    } else {
                        actionsHtml += `<button onclick="copyMessage(${i})" id="copy-btn-${i}" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
                        if (m.interrupted) actionsHtml += `<button onclick="continueMessage(${i})" title="Продолжить"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>`;
                    }
                    actionsHtml += '</div>';
                    return `<div class="message-row ${m.role}"><div><div class="message-content">${formatMessage(m.content)}</div>${actionsHtml}</div></div>`;
                }).join('');
            }
            setTimeout(function() {
                var area = document.getElementById('chatArea');
                if (area) area.scrollTop = area.scrollHeight;
            }, 100);
        }
        function copyMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            navigator.clipboard.writeText(chat.messages[index].content);
            const btn = document.getElementById('copy-btn-' + index);
            if (btn) {
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                setTimeout(function() { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'; }, 2000);
            }
        }
        function editMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                var input = document.getElementById('userInput');
                input.value = chat.messages[index].content;
                input.focus();
                input.dispatchEvent(new Event('input', { bubbles: true }));
            }
        }
        function setMode(mode) { currentMode = mode; }
        function toggleReasoner() {
            if (currentMode === 'reasoner') {
                currentMode = 'chat';
                document.getElementById('reasonerToggle').classList.remove('active');
            } else {
                currentMode = 'reasoner';
                document.getElementById('reasonerToggle').classList.add('active');
            }
            localStorage.setItem('photobot_mode', currentMode);
        }
        function autoNameChat(chat) {
            const lastAssistant = [...chat.messages].reverse().find(m => m.role === 'assistant');
            if (lastAssistant && chat.title.startsWith('Чат ')) {
                chat.title = lastAssistant.content.replace(/[#*`>\n]/g, ' ').split(' ').slice(0, 6).join(' ') || 'Новый чат';
                if (chat.title.length > 40) chat.title = chat.title.substring(0, 40) + '...';
            }
        }

        function updateFileList() {
            const inline = document.getElementById('fileNameInline');
            if (!pendingFile) { 
                if (inline) inline.innerHTML = ''; 
                return; 
            }
            if (inline) inline.innerHTML = '📎 ' + escapeHtml(pendingFile.name) + ' <button onclick="pendingFile=null;updateFileList();" style="background:transparent;border:none;color:#e74c3c;cursor:pointer;font-size:14px;padding:0;line-height:1;">✕</button>';
        }

        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const base64 = ev.target.result.split(',')[1];
                pendingFile = { name: file.name, mime: file.type, data: base64 };
                updateFileList();
            };
            reader.readAsDataURL(file);
            document.getElementById('fileInput').value = '';
        }
        function setupDragDrop() {
            const inputArea = document.getElementById('inputArea');
            const dropZone = document.getElementById('dropZone');
            
            if (!inputArea || !dropZone) return;
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                inputArea.addEventListener(eventName, function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                });
            });
            
            ['dragenter', 'dragover'].forEach(eventName => {
                inputArea.addEventListener(eventName, function() {
                    dropZone.style.display = 'flex';
                });
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                inputArea.addEventListener(eventName, function() {
                    dropZone.style.display = 'none';
                });
            });
            
            inputArea.addEventListener('drop', function(e) {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const base64 = ev.target.result.split(',')[1];
                        pendingFile = { name: file.name, mime: file.type, data: base64 };
                        updateFileList();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        function setupPaste() {
            const userInput = document.getElementById('userInput');
            if (!userInput) return;
            
            userInput.addEventListener('paste', function(e) {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        e.preventDefault();
                        const blob = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            const base64 = ev.target.result.split(',')[1];
                            pendingFile = { name: 'screenshot.png', mime: blob.type, data: base64 };
                            updateFileList();
                        };
                        reader.readAsDataURL(blob);
                        break;
                    }
                }
            });
        }

        setupDragDrop();
        setupPaste();
        var input = document.getElementById('userInput');
        var btn = document.getElementById('sendBtn');
        function updateSendBtn() {
            var hasText = input.value.trim().length > 0;
            var hasFile = pendingFile !== null;
            btn.disabled = !(hasText || hasFile);
        }
        input.addEventListener('input', updateSendBtn);
        updateSendBtn();

        function sendBtnArrow() {
            var btn = document.getElementById('sendBtn');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
            btn.onclick = sendMessage;
        }
        function sendBtnStop() {
            var btn = document.getElementById('sendBtn');
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>';
            btn.onclick = stopTyping;
        }
        async function sendMessage() {
            if (isSending) return;
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !pendingFile) return;
            if (!currentUserId) { alert('Авторизуйтесь на главной странице'); return; }
            if (!currentChatId) { newChat(); }
            input.value = ''; input.style.height = 'auto'; input._init = false;
            isSending = true;
            sendBtnStop();

            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            let displayText = text || (pendingFile ? '[Файл: ' + pendingFile.name + ']' : '');
            chat.messages.push({ role: 'user', content: displayText });
            renderChatList();
            renderMessages();

            const placeholderId = 'msg_' + Date.now();
            const area = document.getElementById('chatArea');
            const typingRow = document.createElement('div');
            typingRow.className = 'message-row assistant'; typingRow.id = placeholderId;
            typingRow.innerHTML = '<div><div class="message-content"><span class="thinking-dots">Думаю</span></div></div>';
            area.appendChild(typingRow);
            area.scrollTop = area.scrollHeight;

            try {
                const resp = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, message: text, model: 'flash', mode: currentMode, chat_id: currentChatId, file_data: pendingFile ? pendingFile.data : '', file_name: pendingFile ? pendingFile.name : '', file_mime: pendingFile ? pendingFile.mime : '' })
                });
                const el = document.getElementById(placeholderId); if (el) el.remove();
                if (resp.status === 403) {
                    chat.messages.push({ role: 'assistant', content: 'Сессия устарела. Авторизуйтесь заново на главной странице.' });
                    renderMessages();
                    isSending = false; sendBtnArrow();
                    return;
                }
                if (resp.status === 402) {
                    const data = await resp.json();
                    chat.messages.push({ role: 'assistant', content: 'Недостаточно средств.' });
                    renderMessages(); updateBalance();
                    isSending = false; sendBtnArrow();
                    return;
                }
                if (!resp.ok) {
                    chat.messages.push({ role: 'assistant', content: 'Ошибка сервера. Попробуйте позже.' });
                    renderMessages();
                    isSending = false; sendBtnArrow();
                    return;
                }
                const data = await resp.json();
                if (data.reply) {
                    const fullContent = data.reasoning ? 'Размышление:\n' + data.reasoning + '\n\nОтвет:\n' + data.reply : data.reply;
                    chat.messages.push({ role: 'assistant', content: '', finished: false });
                    const msgIndex = chat.messages.length - 1;
                    renderChatList();
                    const area2 = document.getElementById('chatArea');
                    const newRow = document.createElement('div');
                    newRow.className = 'message-row assistant';
                    newRow.innerHTML = '<div><div class="message-content" id="stream-' + msgIndex + '"></div><div class="message-actions" id="actions-' + msgIndex + '"><button onclick="copyMessage(' + msgIndex + ')" id="copy-btn-' + msgIndex + '" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div></div>';
                    area2.appendChild(newRow);
                    let pos = 0;
                    const streamDiv = document.getElementById('stream-' + msgIndex);
                    const streamAction = document.getElementById('actions-' + msgIndex);
                    const words = fullContent.split(/(\s+)/);
                    var streamActive = true;
                    function streamNext() {
                        if (!streamActive) return;
                        let chunk = '';
                        let wordCount = 0;
                        while (pos < words.length && wordCount < 2) {
                            chunk += words[pos];
                            wordCount++;
                            pos++;
                        }
                        if (chunk) {
                            chat.messages[msgIndex].content = words.slice(0, pos).join('');
                            streamDiv.innerHTML = formatMessage(chat.messages[msgIndex].content);
                            if (autoScroll) {
                                document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                            }
                            typingInterval = setTimeout(streamNext, 20);
                        } else {
                            chat.messages[msgIndex].finished = true;
                            typingInterval = null;
                            streamAction.innerHTML = '<button onclick="copyMessage(' + msgIndex + ')" id="copy-btn-' + msgIndex + '" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';
                            autoNameChat(chat);
                            renderChatList();
                            if (autoScroll) {
                                document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                            }
                            isSending = false;
                            sendBtnArrow();
                        }
                    }
                    streamNext();
                } else {
                    chat.messages.push({ role: 'assistant', content: 'Ошибка. Попробуйте позже.' });
                    renderMessages();
                }
            } catch (e) {
                const el = document.getElementById(placeholderId); if (el) el.remove();
                chat.messages.push({ role: 'assistant', content: 'Ошибка соединения.' });
                renderMessages();
            }
            pendingFile = null;
            updateFileList();
            isSending = false;
            updateBalance();
        }
        function formatMessage(text) {
            var B = String.fromCharCode(96);
            if (/^\s*<(!DOCTYPE|html)/i.test(text)) {
                text = B + B + B + 'html\n' + text + '\n' + B + B + B;
            }
            let parts = [];
            let lastIndex = 0;
            const regex = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({type: 'text', content: text.substring(lastIndex, match.index)});
                }
                parts.push({type: 'code', lang: match[1], content: match[2]});
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
                parts.push({type: 'text', content: text.substring(lastIndex)});
            }
            let result = '';
            for (const part of parts) {
                if (part.type === 'code') {
                    result += '<pre><code>' + escapeHtml(part.content) + '</code></pre>';
                } else {
                    result += escapeHtml(part.content).replace(/`([^`]+)`/g, '<code>' + '$1' + '</code>').replace(/\n/g, '<br>');
                }
            }
            return result;
        }
        function stopTyping() {
            if (typingInterval) {
                clearTimeout(typingInterval);
                typingInterval = null;
            }
            const chat = chats.find(c => c.id === currentChatId);
            if (chat && chat.messages.length > 0) {
                const lastMsg = chat.messages[chat.messages.length - 1];
                if (lastMsg.role === 'assistant' && !lastMsg.finished) {
                    lastMsg.interrupted = true;
                }
            }
            renderMessages();
            isSending = false;
            sendBtnArrow();
        }
        async function continueMessage(index) {
            if (isSending) return;
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            const msg = chat.messages[index];
            if (!msg || msg.role !== 'assistant' || !msg.interrupted) return;
            isSending = true;
            sendBtnStop();
            renderMessages();
            await new Promise(r => setTimeout(r, 50));
            const streamDiv = document.querySelectorAll('.message-row.assistant .message-content')[index];
            const streamAction = document.querySelectorAll('.message-row.assistant .message-actions')[index];
            msg.interrupted = false;
            msg.finished = false;
            const remaining = msg.content;
            const words = remaining.split(/(\s+)/);
            let pos = 0;
            chat.messages[index].content = '';
            if (streamDiv) streamDiv.innerHTML = '';
            function streamNext() {
                let chunk = '';
                let wordCount = 0;
                while (pos < words.length && wordCount < 2) {
                    chunk += words[pos];
                    wordCount++;
                    pos++;
                }
                if (chunk) {
                    chat.messages[index].content = words.slice(0, pos).join('');
                    if (streamDiv) streamDiv.innerHTML = formatMessage(chat.messages[index].content);
                    if (autoScroll) {
                        document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                    }
                    typingInterval = setTimeout(streamNext, 20);
                } else {
                    chat.messages[index].finished = true;
                    chat.messages[index].interrupted = false;
                    typingInterval = null;
                    if (streamAction) streamAction.innerHTML = '<button onclick="copyMessage(' + index + ')" id="copy-btn-' + index + '" title="Копировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';
                    autoNameChat(chat);
                    renderChatList();
                    if (autoScroll) {
                        document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                    }
                    isSending = false;
                    sendBtnArrow();
                }
            }
            streamNext();
        }
        document.addEventListener('click', () => document.querySelectorAll('.chat-menu-dropdown').forEach(d => d.classList.remove('show')));
        function setupFloatingCopyButtons() {
            document.querySelectorAll('.floating-copy-btn').forEach(function(btn) { btn.remove(); });
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                if (pre.querySelector('.floating-copy-btn')) return;
                var btn = document.createElement('button');
                btn.className = 'floating-copy-btn';
                btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                btn.title = 'Копировать';
                btn.style.cssText = 'position:fixed; background:transparent; border:none; color:#888; cursor:pointer; padding:6px 8px; border-radius:8px; font-family:Inter,sans-serif; z-index:9999; display:none; line-height:1; transition:background 0.15s;';
                btn.onmouseenter = function() { btn.style.background = 'rgba(255,255,255,0.08)'; };
                btn.onmouseleave = function() { btn.style.background = 'transparent'; };
                btn.onclick = function() {
                    var code = pre.querySelector('code').textContent;
                    navigator.clipboard.writeText(code);
                    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                    setTimeout(function() { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'; }, 2000);
                };
                document.body.appendChild(btn);
                if (document.body.classList.contains('light')) {
                    btn.style.color = '#555';
                    btn.onmouseenter = function() { btn.style.background = 'rgba(0,0,0,0.06)'; };
                    btn.onmouseleave = function() { btn.style.background = 'transparent'; };
                }
                pre._floatBtn = btn;
            });
        }

        function updateFloatingButtons() {
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                var btn = pre._floatBtn;
                if (!btn) return;
                var rect = pre.getBoundingClientRect();
                var visible = rect.bottom > 0 && rect.top < window.innerHeight;
                if (visible) {
                    btn.style.display = 'block';
                    btn.style.top = Math.max(rect.top, 60) + 'px';
                    btn.style.right = (window.innerWidth - rect.right + 8) + 'px';
                } else {
                    btn.style.display = 'none';
                }
            });
        }

        var chatAreaObserver = new MutationObserver(function() {
            setupFloatingCopyButtons();
            updateFloatingButtons();
        });
        window.addEventListener('load', function() {
            var chatArea = document.getElementById('chatArea');
            if (chatArea) {
                chatAreaObserver.observe(chatArea, { childList: true, subtree: true });
            }
            setupFloatingCopyButtons();
            updateFloatingButtons();
        });
        window.addEventListener('scroll', updateFloatingButtons, true);
        window.addEventListener('resize', updateFloatingButtons);
    </script>
</body>
</html>

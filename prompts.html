<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — База промтов</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #201F28; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; position: relative; }
        body.light { background: #ffffff; color: #111; }
        body.light::before { opacity: 0.3; }
        body::before { content: ''; position: fixed; top: -30%; left: -20%; width: 140%; height: 140%; background: radial-gradient(ellipse at 25% 30%, rgba(0,203,245,0.15) 0%, transparent 50%), radial-gradient(ellipse at 75% 50%, rgba(20,233,252,0.12) 0%, transparent 50%), radial-gradient(ellipse at 40% 80%, rgba(255,255,255,0.05) 0%, transparent 50%); filter: blur(60px); pointer-events: none; z-index: 0; }
        .header, .categories, .back-link { position: relative; z-index: 1; }
        .header { display: flex; flex-direction: row; justify-content: center; gap: 20px; align-items: center; margin-bottom: 40px; }
        .header a { text-decoration: none; transition: 0.3s ease; }
        .header a:hover { transform: translateY(-2px); }
        .logo-pb { font-size: 48px; font-weight: 700; letter-spacing: 4px; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,203,245,0.3)); transition: 0.3s ease; }
        .logo-pb:hover { filter: drop-shadow(0 4px 12px rgba(0,203,245,0.5)); transform: translateY(-1px); }
        .logo-pb .p { color: #00CBF5; }
        .logo-pb .b { color: #14E9FC; }
        .logo-sub { font-size: 16px; font-weight: 700; letter-spacing: 2px; margin-top: -2px; }
        .logo-sub .photo { color: #00CBF5; }
        .logo-sub .bot { color: #14E9FC; }
        .header img[alt="DeepSeek"] { height: 40px; margin-top: 3px; filter: drop-shadow(0 2px 6px rgba(139,92,246,0.3)); transition: 0.3s ease; }
        .header img[alt="DeepSeek"]:hover { filter: drop-shadow(0 4px 12px rgba(139,92,246,0.5)); transform: translateY(-1px); }
        h1 { font-size: 24px; margin-bottom: 32px; color: #fff; text-align: center; position: relative; z-index: 1; }
        body.light h1 { color: #111; }
        .categories { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 400px; }
        .category-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 20px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; color: #fff; text-decoration: none; font-size: 16px; font-weight: 600; transition: 0.3s ease; text-align: center; }
        body.light .category-btn { background: #f0f0f0; border: 1px solid rgba(0,0,0,0.08); color: #111; }
        .category-btn:hover { border-color: #00CBF5; background: rgba(0,203,245,0.1); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,203,245,0.15); }
        .category-btn .icon { font-size: 24px; }
        .back-link { margin-top: 40px; color: #888; text-decoration: none; font-size: 12px; transition: 0.2s; }
        .back-link:hover { color: #00CBF5; }
        .coming-soon { opacity: 0.4; pointer-events: none; }
        .lang-btn { padding: 6px 12px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); color: #aaa; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600; transition: 0.3s ease; }
        .lang-btn.active { background: linear-gradient(135deg, #00CBF5, #14E9FC); border-color: transparent; color: #201F28; box-shadow: 0 4px 12px rgba(0,203,245,0.3); }
        .lang-btn:hover { border-color: #00CBF5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,203,245,0.15); }
        .theme-btn { padding: 6px 12px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); color: #aaa; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600; transition: 0.3s ease; }
        body.light .theme-btn { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); color: #555; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
    </style>
</head>
<body>
    <div style="position:fixed;top:20px;right:20px;display:flex;gap:4px;z-index:1000;">
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️</button>
    </div>
    <div class="header">
        <a href="index.html"><div class="logo-pb"><span class="p">P</span><span class="b">B</span></div><div class="logo-sub"><span class="photo">Photo</span><span class="bot">Bot</span></div></a>
        <div style="position:relative; display:flex; flex-direction:column; align-items:center; cursor:pointer;" onclick="toggleDeepSeekMenu()">
            <img src="deepseek_logo.png" alt="DeepSeek">
            <div id="deepseekMenu" style="display:none; position:absolute; top:calc(50% - 20px); left:calc(50% + 20px); transform:translate(-50%, -50%); background:rgba(26,26,46,0.9); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:6px; z-index:100; min-width:160px; box-shadow:0 12px 40px rgba(0,0,0,0.6);">
                <div style="color:#666; font-size:9px; padding:6px 12px 4px; text-transform:uppercase; letter-spacing:2px; opacity:0.8;" data-t="choose_model">Выберите модель</div>
                <a href="v4flash.html" style="display:flex; align-items:center; gap:8px; padding:8px 10px; color:#8B5CF6; text-decoration:none; font-size:12px; border-radius:10px; font-weight:500; transition:0.2s ease;" onmouseover="this.style.background='rgba(139,92,246,0.15)'" onmouseout="this.style.background='transparent'">V4 Flash <span style="font-size:9px;color:#555;margin-left:auto;" data-t="fast">Fast</span></a>
                <a href="v4pro.html" style="display:flex; align-items:center; gap:8px; padding:8px 10px; color:#F59E0B; text-decoration:none; font-size:12px; border-radius:10px; font-weight:500; transition:0.2s ease;" onmouseover="this.style.background='rgba(245,158,11,0.15)'" onmouseout="this.style.background='transparent'">V4 Pro <span style="font-size:9px;color:#555;margin-left:auto;" data-t="best">Best</span></a>
            </div>
        </div>
    </div>
    <h1 data-t="prompts_title">База промтов</h1>
    <div class="categories">
        <a href="prompts_male.html" class="category-btn"><span class="icon">M</span> <span data-t="prompts_male">Мужская фотосессия с ИИ</span></a>
        <a href="prompts_female.html" class="category-btn"><span class="icon">W</span> <span data-t="prompts_female">Женская фотосессия с ИИ</span></a>
        <span class="category-btn coming-soon"><span class="icon">K</span> <span data-t="prompts_kids">Детская фотосессия (скоро)</span></span>
        <span class="category-btn coming-soon"><span class="icon">A</span> <span data-t="prompts_anime">Аниме-образы (скоро)</span></span>
    </div>
    <a href="/" class="back-link" data-t="home">На главную</a>
    <script src="lang.js"></script>
    <script>
        let currentLang = localStorage.getItem('photobot_lang') || 'en';
        function setLanguage(lang) { currentLang = lang; localStorage.setItem('photobot_lang', lang); document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang)); applyTranslations(); }
        function t(key) { return (translations[currentLang] && translations[currentLang][key]) || key; }
        function applyTranslations() { document.querySelectorAll('[data-t]').forEach(el => { const key = el.getAttribute('data-t'); el.textContent = t(key); }); }
        function toggleTheme() { document.body.classList.toggle('light'); var isLight = document.body.classList.contains('light'); localStorage.setItem('photobot_theme', isLight ? 'light' : 'dark'); document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️'; }
        (function() { var saved = localStorage.getItem('photobot_theme'); if (saved === 'light') { document.body.classList.add('light'); document.getElementById('themeToggle').textContent = '🌙'; } })();
        document.addEventListener('DOMContentLoaded', function() { document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === currentLang)); applyTranslations(); });
        function toggleDeepSeekMenu() { const menu = document.getElementById('deepseekMenu'); if (menu.style.display === 'block') { menu.style.opacity = '0'; menu.style.transform = 'translateX(-50%) translateY(-4px)'; setTimeout(() => { menu.style.display = 'none'; }, 150); } else { menu.style.display = 'block'; menu.style.opacity = '0'; menu.style.transform = 'translateX(-50%) translateY(-4px)'; requestAnimationFrame(() => { menu.style.transition = 'opacity 0.15s, transform 0.15s'; menu.style.opacity = '1'; menu.style.transform = 'translateX(-50%) translateY(0)'; }); } }
        document.addEventListener('click', function(e) { if (!e.target.closest('[onclick="toggleDeepSeekMenu()"]')) { const menu = document.getElementById('deepseekMenu'); if (menu.style.display === 'block') { menu.style.opacity = '0'; menu.style.transform = 'translateX(-50%) translateY(-4px)'; setTimeout(() => { menu.style.display = 'none'; }, 150); } } });
    </script>
</body>
</html>

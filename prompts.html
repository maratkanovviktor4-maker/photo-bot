<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — База промтов</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #201F28;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .logo-pb {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 4px;
        }
        .logo-pb .p { color: #00CBF5; }
        .logo-pb .b { color: #14E9FC; }
        .logo-sub {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .logo-sub .photo { color: #00CBF5; }
        .logo-sub .bot { color: #14E9FC; }
        h1 {
            font-size: 24px;
            margin-bottom: 32px;
            color: #fff;
            text-align: center;
        }
        .categories {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px;
        }
        .category-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: #222;
            border: 1px solid #2A2A2A;
            border-radius: 16px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: 0.2s;
            text-align: center;
        }
        .category-btn:hover {
            border-color: #00CBF5;
            background: #282828;
        }
        .category-btn .icon {
            font-size: 24px;
        }
        .back-link {
            margin-top: 40px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
        .back-link:hover { color: #00CBF5; }
        .coming-soon {
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="logo-pb"><span class="p">P</span><span class="b">B</span></div>
    <div class="logo-sub"><span class="photo">Photo</span><span class="bot">Bot</span></div>
    <h1>📋 База промтов</h1>
    
    <div class="categories">
        <a href="prompts_male.html" class="category-btn">
            <span class="icon">💪</span> Мужская фотосессия с ИИ
        </a>
        <a href="prompts_female.html" class="category-btn">
            <span class="icon">🌸</span> Женская фотосессия с ИИ
        </a>
        <span class="category-btn coming-soon">
            <span class="icon">👶</span> Детская фотосессия (скоро)
        </span>
        <span class="category-btn coming-soon">
            <span class="icon">🎨</span> Аниме-образы (скоро)
        </span>
    </div>

    <a href="/" class="back-link">← На главную</a>
</body>
</html>

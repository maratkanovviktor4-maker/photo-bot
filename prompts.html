<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — База промтов</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #201F28;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            position: sticky;
            top: 0;
            background: #201F28;
            z-index: 10;
        }
        .logo-pb {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
        }
        .logo-pb .p { color: #00CBF5; }
        .logo-pb .b { color: #14E9FC; }
        .logo-sub {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .logo-sub .photo { color: #00CBF5; }
        .logo-sub .bot { color: #14E9FC; }
        .header h1 {
            font-size: 18px;
            color: #aaa;
            font-weight: 400;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 16px 60px;
        }
        .prompt-card {
            margin-bottom: 32px;
            background: #222;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2A2A2A;
        }
        .prompt-card .image-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 14px;
            position: relative;
        }
        .prompt-card .image-placeholder .mode-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            color: #00CBF5;
            font-weight: 600;
        }
        .prompt-card .card-body {
            padding: 16px;
        }
        .prompt-card textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #ddd;
            padding: 12px;
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
            outline: none;
            transition: 0.2s;
        }
        .prompt-card textarea:focus {
            border-color: #00CBF5;
        }
        .prompt-card .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .prompt-card .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Montserrat', sans-serif;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-copy {
            background: #00CBF5;
            color: #201F28;
        }
        .btn-copy:hover { background: #14E9FC; }
        .btn-bot {
            background: #2A2A2A;
            color: #fff;
            border: 1px solid #444;
        }
        .btn-bot:hover { background: #333; border-color: #00CBF5; }
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #00CBF5;
            color: #201F28;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .back-link {
            display: block;
            text-align: center;
            padding: 20px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
        .back-link:hover { color: #00CBF5; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-pb"><span class="p">P</span><span class="b">B</span></div>
        <div class="logo-sub"><span class="photo">Photo</span><span class="bot">Bot</span></div>
        <h1>📋 База промтов</h1>
    </div>

    <div class="container" id="container"></div>

    <a href="/" class="back-link">← На главную</a>
    <div class="toast" id="toast">Скопировано!</div>

    <script>
        const modes = ["Свободный", "Обои", "Документы", "Пляж", "Цветы", "Шашлыки", "День рождения", "Свободный", "Обои", "Свободный", "Документы", "Пляж", "Свободный", "Обои", "Свободный"];
        
        const container = document.getElementById('container');
        for (let i = 0; i < 15; i++) {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `
                <div class="image-placeholder">
                    <div class="mode-tag">${modes[i]}</div>
                    🖼️ Пример #${i + 1}
                </div>
                <div class="card-body">
                    <textarea placeholder="Промт для генерации..."></textarea>
                    <div class="card-actions">
                        <button class="btn btn-copy" onclick="copyPrompt(this)">📋 Копировать</button>
                        <a class="btn btn-bot" href="https://t.me/PhotoDocumentsBot_bot" target="_blank">🤖 В бот</a>
                        <a class="btn btn-bot" href="/">📱 В приложение</a>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        function copyPrompt(btn) {
            const textarea = btn.parentElement.parentElement.querySelector('textarea');
            navigator.clipboard.writeText(textarea.value || textarea.placeholder);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }
    </script>
</body>
</html>

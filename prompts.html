<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — База промтов</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #201F28;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(ellipse at 25% 30%, rgba(0,203,245,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 75% 50%, rgba(20,233,252,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 40% 80%, rgba(255,255,255,0.05) 0%, transparent 50%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }
        .logo-pb, .logo-sub, h1, .categories, .back-link {
            position: relative;
            z-index: 1;
        }
        .logo-pb {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 4px;
        }
        .logo-pb .p { color: #00CBF5; }
        .logo-pb .b { color: #14E9FC; }
        .logo-sub {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .logo-sub .photo { color: #00CBF5; }
        .logo-sub .bot { color: #14E9FC; }
        h1 {
            font-size: 24px;
            margin-bottom: 32px;
            color: #fff;
            text-align: center;
        }
        .categories {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px;
        }
        .category-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(34,34,34,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s ease;
            text-align: center;
        }
        .category-btn:hover {
            border-color: #00CBF5;
            background: rgba(0,203,245,0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,203,245,0.15);
        }
        .category-btn .icon {
            font-size: 24px;
        }
        .back-link {
            margin-top: 40px;
            color: #888;
            text-decoration: none;
            font-size: 12px;
            transition: 0.2s;
        }
        .back-link:hover { color: #00CBF5; }
        .coming-soon {
            opacity: 0.4;
            pointer-events: none;
        }
        .lang-btn { padding: 6px 12px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); color: #aaa; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600; transition: 0.3s ease; }
        .lang-btn.active { background: linear-gradient(135deg, #00CBF5, #14E9FC); border-color: transparent; color: #201F28; box-shadow: 0 4px 12px rgba(0,203,245,0.3); }
        .lang-btn:hover { border-color: #00CBF5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,203,245,0.15); }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
    </style>
</head>
<body>
    <div style="position:fixed;top:20px;right:20px;display:flex;gap:4px;z-index:1000;">
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
    </div>
    <div class="logo-pb"><span class="p">P</span><span class="b">B</span></div>
    <div class="logo-sub"><span class="photo">Photo</span><span class="bot">Bot</span></div>
    <h1>База промтов</h1>
    
    <div class="categories">
        <a href="prompts_male.html" class="category-btn">
            <span class="icon">M</span> Мужская фотосессия с ИИ
        </a>
        <a href="prompts_female.html" class="category-btn">
            <span class="icon">W</span> Женская фотосессия с ИИ
        </a>
        <span class="category-btn coming-soon">
            <span class="icon">K</span> Детская фотосессия (скоро)
        </span>
        <span class="category-btn coming-soon">
            <span class="icon">A</span> Аниме-образы (скоро)
        </span>
    </div>

    <a href="/" class="back-link">На главную</a>

    <script>
        let currentLang = localStorage.getItem('photobot_lang') || 'en';
        function setLanguage(lang) { currentLang = lang; localStorage.setItem('photobot_lang', lang); document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang)); }
        document.addEventListener('DOMContentLoaded', function() { document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === currentLang)); });
    </script>
</body>
</html>

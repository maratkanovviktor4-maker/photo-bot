<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — Фото на документы</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }
        .container {
            display: flex;
            max-width: 1800px;
            width: 100%;
            padding: 16px;
            gap: 20px;
        }
        .collages {
            width: 920px;
            flex-shrink: 0;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            padding-top: 20px;
        }
        .collages img {
            width: 450px;
            border-radius: 10px;
            border: 2px solid #333;
            transition: 0.2s;
            cursor: pointer;
        }
        .collages img:hover { border-color: #4a90d9; }
        .collages img.active {
            border-color: #4a90d9;
            box-shadow: 0 0 12px rgba(74,144,217,0.5);
        }
        .center-panel {
            width: 450px;
            flex-shrink: 0;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .header h2 { font-size: 17px; }
        .sub-block {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            font-size: 13px;
            color: #aaa;
            display: none;
        }
        .sub-block a {
            display: inline-block;
            padding: 8px 16px;
            background: #2aabee;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            margin: 6px 0;
        }
        .sub-block img { margin-top: 8px; border-radius: 8px; }
        .sub-ok {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            font-size: 13px;
            color: #4a90d9;
            display: none;
        }
        .mode-btn {
            display: block;
            width: 100%;
            padding: 8px;
            margin: 4px 0;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: 0.2s;
        }
        .mode-btn.active { background: #4a90d9; border-color: #4a90d9; }
        .mode-btn:hover { background: #333; }
        .mode-btn.active:hover { background: #5aa0e9; }
        #preview {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            margin: 8px 0;
            border-radius: 8px;
            display: none;
        }
        #status {
            text-align: center;
            color: #aaa;
            margin: 6px 0;
            font-size: 12px;
        }
        .actions { display: flex; gap: 5px; margin-top: 6px; }
        .actions button {
            flex: 1;
            padding: 8px;
            background: #4a90d9;
            border: none;
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }
        .actions button:disabled { background: #555; cursor: not-allowed; }
        .actions button.retry-btn { background: #e67e22; }
        .actions button.save-btn { background: #27ae60; }
        input[type="file"] {
            width: 100%;
            margin: 5px 0;
            color: #fff;
            font-size: 12px;
        }
        input[type="text"] {
            width: 100%;
            padding: 7px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
            font-size: 12px;
        }
        .hint { font-size: 10px; color: #888; margin: 3px 0 6px 0; }
        .preview-note {
            text-align: center;
            font-size: 11px;
            color: #f0a030;
            margin: 5px 0;
        }
        .result-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
            min-width: 0;
        }
        .result-panel .placeholder {
            color: #555;
            font-size: 15px;
            text-align: center;
        }
        .result-container {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            max-width: 300px;
        }
        #resultCanvas {
            width: 100%;
            border-radius: 10px;
            display: block;
        }
        .size-btns { display: flex; gap: 4px; margin-top: 6px; }
        .size-btn {
            flex: 1;
            padding: 6px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
        }
        .size-btn.active { background: #4a90d9; border-color: #4a90d9; }
        .auth-block {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 16px;
            margin: 10px 0;
            text-align: center;
            display: none;
        }
        .auth-block input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 8px;
        }
        .auth-block .send-btn {
            width: 100%;
            padding: 10px;
            background: #555;
            border: none;
            color: #aaa;
            border-radius: 8px;
            font-size: 14px;
            cursor: not-allowed;
            font-weight: bold;
            transition: 0.2s;
        }
        .auth-block .send-btn.active {
            background: #4a90d9;
            color: #fff;
            cursor: pointer;
        }
        .auth-info {
            text-align: center;
            color: #4a90d9;
            font-size: 13px;
            padding: 10px;
            display: none;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
                padding: 8px;
                gap: 12px;
            }
            .collages {
                width: 100%;
                order: 1;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .collages img {
                width: 100%;
                max-width: 100%;
            }
            .center-panel {
                width: 100%;
                order: 2;
            }
            .result-panel {
                width: 100%;
                order: 3;
                padding-top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="collages" id="collages">
            <img src="collages/collage_documents.jpg" alt="Документы" data-mode="documents" class="active">
            <img src="collages/collage_beach.jpg" alt="Пляж" data-mode="beach">
            <img src="collages/collage_birthday.jpg" alt="День рождения" data-mode="birthday">
            <img src="collages/collage_bbq.jpg" alt="Шашлыки" data-mode="bbq">
            <img src="collages/collage_wallpaper.jpg" alt="Обои" data-mode="wallpaper">
        </div>

        <div class="center-panel">
            <div class="header">
                <h2>📸 PhotoBot</h2>
            </div>

            <button class="mode-btn" onclick="openBot()" style="text-align:center;background:#2aabee;margin-bottom:8px;">🔑 Войти через Telegram</button>

            <div class="auth-block" id="authBlock">
                <div style="font-size:13px;color:#aaa;margin-bottom:6px;">Введите код авторизации из бота</div>
                <input type="text" id="authCode" maxlength="4" placeholder="0000" inputmode="numeric" pattern="[0-9]*">
                <button class="send-btn" id="sendBtn" disabled>Отправить</button>
            </div>

            <div class="auth-info" id="authInfo">👤 Вошли как <span id="authName"></span></div>

            <div class="sub-block" id="subscribeBlock">
                📛 Подпишитесь на нас в <a href="https://t.me/PhotoDocumentsBot_bot" target="_blank">Telegram</a>
                <br><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://t.me/PhotoDocumentsBot_bot" width="200" height="200" alt="QR-код">
            </div>
            <div class="sub-ok" id="subscribeOk">
                ✅ Вы подписаны
            </div>
            
            <div id="modes">
                <button class="mode-btn active" data-mode="documents">📄 Фото на документы</button>
                <button class="mode-btn" data-mode="beach">🌅 Закат на пляже</button>
                <button class="mode-btn" data-mode="birthday">🎂👑 День рождения</button>
                <button class="mode-btn" data-mode="bbq">🥩 На шашлыках</button>
                <button class="mode-btn" data-mode="wallpaper">🖼️ Обои для ПК</button>
            </div>

            <div id="wallpaperSize" style="display:none;">
                <div class="size-btns">
                    <button class="size-btn active" data-wp="phone">📱 Телефон</button>
                    <button class="size-btn" data-wp="pc">🖥️ ПК</button>
                    <button class="size-btn" data-wp="ultrawide">🖥️ Ультрашир.</button>
                </div>
            </div>

            <input type="text" id="caption" placeholder="Подпись (например: серая рубашка / 23 красное)">
            <div class="hint" id="modeHint">📄 Фото на документы: в подписи укажите одежду (например: серая рубашка)</div>
            
            <input type="file" id="photoInput" accept="image/*">
            
            <img id="preview" alt="Превью">
            
            <div class="actions">
                <button id="generate" onclick="startGeneration()">⚡ Сгенерировать</button>
            </div>
            
            <div id="status"></div>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="placeholder">🖼️ Здесь появится результат</div>
            <div class="result-container" id="resultContainer">
                <canvas id="resultCanvas"></canvas>
            </div>
            <div class="preview-note" id="previewNote" style="display:none;"></div>
            <div class="actions" id="resultActions" style="display:none;">
                <button class="save-btn" id="saveBtn">💾 Сохранить</button>
                <button class="retry-btn" onclick="retryGeneration()">🔄 Попробовать ещё раз</button>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = "http://192.168.9.2:5000";
        let selectedMode = "documents";
        let uploadedFile = null;
        let resultBlob = null;
        let wallpaperSize = "pc";
        let currentUserId = null;
        let currentUsername = null;
        let isSubscribed = false;

        const hints = {
            documents: "📄 Фото на документы: в подписи укажите одежду (например: серая рубашка)",
            beach: "🌅 Закат на пляже: в подписи укажите одежду (например: белое платье)",
            birthday: "🎂👑 День рождения: в подписи укажите число и цвет платья (например: 23 красное)",
            bbq: "🥩 На шашлыках: подпись не требуется",
            wallpaper: "🖼️ Обои: введите промт в поле подписи"
        };

        const wallpaperSizes = {
            phone: [1440, 2560],
            pc: [2560, 1440],
            ultrawide: [3440, 1440]
        };

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            currentUsername = auth.username;
            showAuthInfo(currentUsername ? '@' + currentUsername : 'ID:' + currentUserId);
            showSubscribeBlock();
            checkSubscription();
        }

        window.addEventListener('focus', function() {
            if (!currentUserId) {
                document.getElementById('authBlock').style.display = 'block';
            }
            if (currentUserId) checkSubscription();
        });

        function openBot() {
            document.getElementById('authBlock').style.display = 'block';
            window.open('https://t.me/PhotoDocumentsBot_bot?start=site', '_blank');
        }

        document.getElementById('authCode').addEventListener('input', function() {
            const btn = document.getElementById('sendBtn');
            if (this.value.length === 4) {
                btn.classList.add('active');
                btn.disabled = false;
                btn.style.cursor = 'pointer';
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
                btn.style.cursor = 'not-allowed';
            }
        });

        document.getElementById('sendBtn').addEventListener('click', async function() {
            const code = document.getElementById('authCode').value;
            if (code.length !== 4) return;

            try {
                const resp = await fetch(`${SERVER_URL}/verify_code`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code: code })
                });
                const data = await resp.json();
                if (data.success) {
                    currentUserId = data.user_id;
                    currentUsername = data.username;
                    isSubscribed = data.subscribed;
                    const displayName = currentUsername ? '@' + currentUsername : 'ID:' + currentUserId;
                    localStorage.setItem('photobot_auth', JSON.stringify({ user_id: currentUserId, username: currentUsername }));
                    showAuthInfo(displayName);
                    document.getElementById('authBlock').style.display = 'none';
                    if (isSubscribed) {
                        document.getElementById('subscribeBlock').style.display = 'none';
                        document.getElementById('subscribeOk').style.display = 'block';
                    } else {
                        document.getElementById('subscribeBlock').style.display = 'block';
                    }
                } else {
                    alert(data.error === 'Not subscribed' ? 'Вы не подписаны на бота. Подпишитесь и попробуйте снова.' : 'Неверный код авторизации');
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            }
        });

        function showAuthInfo(name) {
            document.getElementById('authInfo').style.display = 'block';
            document.getElementById('authName').textContent = name;
            document.querySelector('button[onclick="openBot()"]').style.display = 'none';
        }

        function showSubscribeBlock() {
            document.getElementById('subscribeBlock').style.display = 'block';
        }

        document.querySelectorAll("#collages img").forEach(img => {
            img.addEventListener("click", function() { selectMode(this.dataset.mode); });
        });
        document.querySelectorAll(".mode-btn").forEach(btn => {
            if (!btn.onclick) {
                btn.addEventListener("click", function() { selectMode(this.dataset.mode); });
            }
        });
        document.querySelectorAll(".size-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                wallpaperSize = this.dataset.wp;
            });
        });

        function selectMode(mode) {
            selectedMode = mode;
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            const btn = document.querySelector(`.mode-btn[data-mode="${mode}"]`);
            if (btn) btn.classList.add("active");
            document.querySelectorAll("#collages img").forEach(i => i.classList.remove("active"));
            const collage = document.querySelector(`#collages img[data-mode="${mode}"]`);
            if (collage) collage.classList.add("active");
            document.getElementById("modeHint").textContent = hints[mode];
            
            if (mode === "wallpaper") {
                document.getElementById("wallpaperSize").style.display = "block";
            } else {
                document.getElementById("wallpaperSize").style.display = "none";
            }
            resetResult();
        }

        async function checkSubscription() {
            if (!currentUserId) return;
            try {
                const resp = await fetch(`${SERVER_URL}/check_subscription`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: currentUserId })
                });
                const data = await resp.json();
                isSubscribed = data.subscribed;
                if (isSubscribed) {
                    document.getElementById("subscribeBlock").style.display = "none";
                    document.getElementById("subscribeOk").style.display = "block";
                } else {
                    document.getElementById("subscribeBlock").style.display = "block";
                    document.getElementById("subscribeOk").style.display = "none";
                }
            } catch (err) {}
        }

        document.getElementById("photoInput").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (file) {
                uploadedFile = file;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById("preview").src = ev.target.result;
                    document.getElementById("preview").style.display = "block";
                };
                reader.readAsDataURL(file);
                resetResult();
            }
        });

        function resetResult() {
            document.getElementById("resultContainer").style.display = "none";
            document.getElementById("resultActions").style.display = "none";
            document.getElementById("previewNote").style.display = "none";
            document.getElementById("status").textContent = "";
            document.querySelector(".result-panel .placeholder").style.display = "block";
            resultBlob = null;
        }

        async function startGeneration() {
            if (!currentUserId) {
                document.getElementById('authBlock').style.display = 'block';
                return;
            }
            await checkSubscription();
            if (!isSubscribed) {
                document.getElementById("subscribeBlock").style.display = "block";
                document.getElementById("subscribeOk").style.display = "none";
                return;
            }
            await runGeneration();
        }

        async function retryGeneration() {
            document.getElementById("resultContainer").style.display = "none";
            document.getElementById("resultActions").style.display = "none";
            document.getElementById("previewNote").style.display = "none";
            document.getElementById("status").textContent = "";
            await runGeneration();
        }

        function getPreviewNote() {
            if (selectedMode === "documents") {
                return "👆 Это образец. Полный размер 832×1152";
            }
            if (selectedMode === "wallpaper") {
                const [w, h] = wallpaperSizes[wallpaperSize];
                return `👆 Это образец. Полный размер ${w}×${h}`;
            }
            return "👆 Это образец. Полный размер 1080×1344";
        }

        async function runGeneration() {
            const genBtn = document.getElementById("generate");
            genBtn.disabled = true;
            genBtn.textContent = "⏳ Генерация...";
            document.getElementById("resultActions").style.display = "none";
            
            const caption = document.getElementById("caption").value || "черная рубашка";
            
            try {
                if (!uploadedFile) return;
                const formData = new FormData();
                formData.append("image", uploadedFile);
                formData.append("mode", selectedMode);
                formData.append("caption", caption);
                
                document.getElementById("status").textContent = "⚡ Генерация...";
                const resp = await fetch(`${SERVER_URL}/generate`, {
                    method: "POST",
                    body: formData
                });
                
                if (resp.ok) {
                    resultBlob = await resp.blob();
                    await drawWatermarkedPreview(resultBlob);
                    document.querySelector(".result-panel .placeholder").style.display = "none";
                    document.getElementById("previewNote").textContent = getPreviewNote();
                    document.getElementById("previewNote").style.display = "block";
                    document.getElementById("resultActions").style.display = "flex";
                    document.getElementById("status").textContent = "";
                    
                    // Назначаем обработчик на кнопку Сохранить
                    document.getElementById("saveBtn").onclick = function() {
                        const url = URL.createObjectURL(resultBlob);
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = "photobot_result.jpg";
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        setTimeout(() => URL.revokeObjectURL(url), 1000);
                    };
                } else {
                    document.getElementById("status").textContent = "⚠️ Ошибка генерации. Попробуйте ещё раз.";
                }
            } catch (err) {
                document.getElementById("status").textContent = "🔧 Ошибка: " + err.message;
            }
            
            genBtn.disabled = false;
            genBtn.textContent = "⚡ Сгенерировать";
        }

        async function drawWatermarkedPreview(blob) {
            const img = new Image();
            const url = URL.createObjectURL(blob);
            
            img.onload = function() {
                const canvas = document.getElementById("resultCanvas");
                const ctx = canvas.getContext("2d");
                
                let drawWidth = img.width;
                let drawHeight = img.height;
                
                const ratio = Math.min(400 / img.width, 400 / img.height);
                drawWidth = Math.round(img.width * ratio);
                drawHeight = Math.round(img.height * ratio);
                
                canvas.width = drawWidth;
                canvas.height = drawHeight;
                
                ctx.drawImage(img, 0, 0, drawWidth, drawHeight);
                
                ctx.fillStyle = "rgba(128, 128, 128, 0.25)";
                ctx.font = `bold ${Math.max(drawWidth, drawHeight) / 6}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                const spacing = Math.max(drawWidth, drawHeight) / 3;
                for (let y = -spacing; y < drawHeight + spacing; y += spacing) {
                    for (let x = -spacing; x < drawWidth + spacing; x += spacing) {
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(-25 * Math.PI / 180);
                        ctx.fillText("ОБРАЗЕЦ", 0, 0);
                        ctx.restore();
                    }
                }
                
                document.getElementById("resultContainer").style.display = "block";
                URL.revokeObjectURL(url);
            };
            
            img.src = url;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — Мужская фотосессия с ИИ</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #201F28;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0,203,245,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, rgba(20,233,252,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(0,203,245,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .header, .container, .back-link, .toast {
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            padding: 20px 20px 10px;
            background: #201F28;
        }
        .logo-pb {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
        }
        .logo-pb .p { color: #00CBF5; }
        .logo-pb .b { color: #14E9FC; }
        .logo-sub {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .logo-sub .photo { color: #00CBF5; }
        .logo-sub .bot { color: #14E9FC; }
        .header h1 {
            font-size: 20px;
            color: #fff;
            font-weight: 600;
            margin-top: 8px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 16px 60px;
        }
        .prompt-card {
            margin-bottom: 32px;
            background: #222;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2A2A2A;
        }
        .prompt-card .image-placeholder {
            width: 100%;
            max-width: 550px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 14px;
            margin: 0 auto;
        }
        .prompt-card .image-placeholder img {
            width: 100%;
            height: auto;
            display: block;
        }
        .prompt-card .card-body {
            padding: 16px;
        }
        .prompt-card .card-number {
            color: #00CBF5;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .prompt-card textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #ddd;
            padding: 12px;
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
            outline: none;
            transition: 0.2s;
        }
        .prompt-card textarea:focus { border-color: #00CBF5; }
        .prompt-card .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .prompt-card .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Montserrat', sans-serif;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-align: center;
        }
        .btn-copy {
            background: #00CBF5;
            color: #201F28;
        }
        .btn-copy:hover { background: #14E9FC; }
        .btn-telegram {
            background: #2A2A2A;
            color: #fff;
            border: 1px solid #444;
        }
        .btn-telegram:hover { background: #333; border-color: #00CBF5; }
        .btn-app {
            background: #2A2A2A;
            color: #666;
            border: 1px solid #333;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #00CBF5;
            color: #201F28;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .back-link {
            display: block;
            text-align: center;
            padding: 20px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
        .back-link:hover { color: #00CBF5; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-pb"><span class="p">P</span><span class="b">B</span></div>
        <div class="logo-sub"><span class="photo">Photo</span><span class="bot">Bot</span></div>
        <h1>💪 Мужская фотосессия с ИИ<br>10 промтов для создания мужских образов</h1>
    </div>

    <div class="container" id="container"></div>

    <a href="prompts.html" class="back-link">← К базе промтов</a>
    <div class="toast" id="toast">Скопировано!</div>

    <script>
        const prompts = [
            { img: "prompts_img/male_1.jpg", text: "Close-up portrait of a man with intense gaze, cinematic moody lighting, sharp jawline, stubble texture, wearing a black turtleneck, dark minimalist background, shot on 85mm lens, f/1.8, high contrast, grainy film aesthetic --ar 4:5 --v 6.1" },
            { img: "prompts_img/male_2.jpg", text: "Эпичный портрет мужчины в средневековых кожаных доспехах с мехом на плечах, с мечом за спиной, стоящего на фоне древнего замка или мистического леса в тумане, драматичное освещение с лучами света сквозь облака, героическая фэнтези-атмосфера" },
            { img: "prompts_img/male_3.jpg", text: "A confident man leaning against a classic vintage car at sunset, golden hour light, wearing a leather jacket and jeans, urban background with soft bokeh, realistic skin tones, high fashion editorial style, 8k resolution" },
            { img: "prompts_img/male_4.jpg", text: "Футуристичный портрет мужчины в чёрной технологичной куртке с неоновыми вставками и киберпанк-аксессуарами на фоне ночной улицы города будущего с гигантской голографической рекламой и неоновыми вывесками, синий и фиолетовый неоновый свет, дерзкая футуристическая атмосфера" },
            { img: "prompts_img/male_5.jpg", text: "Photorealistic full-body shot of a stylish man walking through a rainy neon-lit street, reflections on the pavement, detailed raindrops on his coat, sharp focus, hyper-detailed skin, shot on Sony A7R IV, 35mm lens, masterpiece quality." },
            { img: "prompts_img/male_6.jpg", text: "Дерзкий портрет мужчины в грубой кожаной куртке, защитные очки-авиаторы и джинсы, сидящего верхом на классическом мотоцикле на пустынном шоссе, золотистый закатный свет пробивается сквозь лёгкую дорожную пыль, атмосфера свободы и скорости." },
            { img: "prompts_img/male_7.jpg", text: "Футуристичный портрет мужчины в белом космическом скафандре с отражающим шлемом в руках, стоящего на фоне звёздного неба, планет или космической станции, холодное синеватое освещение с яркими звёздами, атмосфера космических исследований и будущего" },
            { img: "prompts_img/male_8.jpg", text: "Male model portrait, outdoor, winter forest background, wearing a heavy wool sweater, cold blue morning light, natural look, no filters, 100mm portrait lens, professional color grading" },
            { img: "prompts_img/male_9.jpg", text: "Preserve the man's facial features exactly as in the source photo without any changes. Man seated on massive gothic throne made of dark wood with rich carvings, relaxed pose, gaze straight ahead, medium shot, eye level, balanced static composition. He wears dark leather jacket with open collar exposing chest, tight leather pants, pendant on chain around neck. Interior with arched architecture, chandelier visible in background, light smoke in room. Dramatic directional lighting from above and slightly from side, deep sharp shadows, high contrast. Mysterious tense mood. Shot on 85mm portrait lens with shallow depth of field. Photorealistic, detailed, dark fantasy editorial aesthetic. 8K resolution. Color palette muted and dark: black, grey, bronze tones" },
            { img: "prompts_img/male_10.jpg", text: "Расслабленный портрет мужчины в стильной чёрной рубашке с закатанными рукавами, сидящего на низком диване в восточном лаунже, рядом кальян с дымом, мягкое тёплое освещение от декоративных светильников, уютная вечерняя атмосфера" }
        ];

        const container = document.getElementById('container');
        prompts.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `
                <div class="image-placeholder">
                    ${item.img ? `<img src="${item.img}" alt="Пример #${i + 1}" onerror="this.parentElement.innerHTML='🖼️ Пример #${i + 1}'">` : `🖼️ Пример #${i + 1}`}
                </div>
                <div class="card-body">
                    <div class="card-number">#${i + 1}</div>
                    <textarea placeholder="Введите промт...">${item.text}</textarea>
                    <div class="card-actions">
                        <button class="btn btn-copy" onclick="copyPrompt(this)">📋 Скопировать</button>
                        <a class="btn btn-telegram" href="https://t.me/PhotoDocumentsBot_bot" target="_blank">✈️ Скопировать в Telegram</a>
                        <button class="btn btn-app" disabled>📱 Будет доступно позже</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        function copyPrompt(btn) {
            const textarea = btn.parentElement.parentElement.querySelector('textarea');
            navigator.clipboard.writeText(textarea.value || textarea.placeholder);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }
    </script>
</body>
</html>

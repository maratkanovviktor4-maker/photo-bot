<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — Хранилище генераций</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #201F28; color: #fff; min-height: 100vh; position: relative; }
        body.light { background: #f0f0f0; color: #111; }
        body.light::before { opacity: 0.3; }
        body::before { content: ''; position: fixed; top: -30%; left: -20%; width: 140%; height: 140%; background: radial-gradient(ellipse at 25% 30%, rgba(0,203,245,0.15) 0%, transparent 50%), radial-gradient(ellipse at 75% 50%, rgba(20,233,252,0.12) 0%, transparent 50%), radial-gradient(ellipse at 40% 80%, rgba(255,255,255,0.05) 0%, transparent 50%); filter: blur(60px); pointer-events: none; z-index: 0; }
        .header, .container, .nav-links { position: relative; z-index: 1; }
        .header { text-align: center; padding: 20px 20px 10px; }
        .header-inner { display: flex; flex-direction: row; justify-content: center; gap: 20px; align-items: center; margin-bottom: 16px; }
        .header-inner a { text-decoration: none; transition: 0.3s ease; }
        .header-inner a:hover { transform: translateY(-2px); }
        .logo-pb { font-size: 48px; font-weight: 700; letter-spacing: 4px; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,203,245,0.3)); transition: 0.3s ease; }
        .logo-pb:hover { filter: drop-shadow(0 4px 12px rgba(0,203,245,0.5)); transform: translateY(-1px); }
        .logo-pb .p { color: #00CBF5; }
        .logo-pb .b { color: #14E9FC; }
        .logo-sub { font-size: 16px; font-weight: 700; letter-spacing: 2px; margin-top: -2px; }
        .logo-sub .photo { color: #00CBF5; }
        .logo-sub .bot { color: #14E9FC; }
        .header img[alt="DeepSeek"] { height: 40px; margin-top: 3px; filter: drop-shadow(0 2px 6px rgba(139,92,246,0.3)); transition: 0.3s ease; }
        .header img[alt="DeepSeek"]:hover { filter: drop-shadow(0 4px 12px rgba(139,92,246,0.5)); transform: translateY(-1px); }
        .header h1 { font-size: 20px; color: #fff; font-weight: 600; margin-top: 8px; }
        body.light .header h1 { color: #111; }
        .container { max-width: 700px; margin: 120px auto 0; padding: 0 16px 60px; }
        .storage-item { margin-bottom: 16px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; padding: 12px; gap: 12px; transition: 0.3s ease; }
        body.light .storage-item { background: #ffffff; border: 1px solid rgba(0,0,0,0.08); }
        .storage-item:hover { border-color: rgba(0,203,245,0.2); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
        .storage-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; cursor: pointer; flex-shrink: 0; transition: 0.3s ease; }
        .storage-item img:hover { transform: scale(1.05); }
        .storage-item .item-info { flex: 1; min-width: 0; }
        .storage-item .item-date { color: #888; font-size: 11px; margin-bottom: 8px; }
        .storage-item .item-actions { display: flex; gap: 6px; }
        .storage-item .item-actions button { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: 0.3s ease; }
        .btn-delete { background: #E74C3C; color: #fff; }
        .btn-delete:hover { background: #FF6B6B; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(231,76,60,0.3); }
        .btn-play { background: #9b59b6; color: #fff; }
        .btn-play:hover { background: #af7ac5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(155,89,182,0.3); }
        .audio-player { width: 100%; height: 32px; margin-top: 6px; border-radius: 8px; }
        .audio-icon { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #9b59b6, #8e44ad); border-radius: 10px; flex-shrink: 0; font-size: 40px; }
        .unviewed-dot { width: 8px; height: 8px; background: #00CBF5; border-radius: 50%; flex-shrink: 0; margin-left: 8px; }
        .empty-state { text-align: center; color: #555; padding: 60px 20px; font-size: 14px; }
        .nav-links { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .nav-links a { padding: 10px 20px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.06); color: #fff; border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; transition: 0.3s ease; text-align: center; }
        body.light .nav-links a { background: #e8e8e8; border: 1px solid rgba(0,0,0,0.08); color: #111; }
        .nav-links a:hover { border-color: #00CBF5; background: rgba(0,203,245,0.1); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,203,245,0.15); }
        .nav-links a.nav-home { background: linear-gradient(90deg, #00CBF5, #14E9FC); color: #201F28; border: none; box-shadow: 0 4px 16px rgba(0,203,245,0.3); }
        .nav-links a.nav-home:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,203,245,0.4); }
        .lang-btn { padding: 6px 12px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); color: #aaa; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600; transition: 0.3s ease; }
        .lang-btn.active { background: linear-gradient(135deg, #00CBF5, #14E9FC); border-color: transparent; color: #201F28; box-shadow: 0 4px 12px rgba(0,203,245,0.3); }
        .lang-btn:hover { border-color: #00CBF5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,203,245,0.15); }
        .theme-btn { padding: 6px 12px; background: rgba(34,34,34,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); color: #aaa; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600; transition: 0.3s ease; }
        body.light .theme-btn { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); color: #555; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
    </style>
<script src="config.js"></script>
</head>
<body>
    <div style="position:fixed;top:20px;right:20px;display:flex;gap:4px;z-index:1000;">
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️</button>
    </div>
    <div class="header">
        <div class="header-inner">
            <a href="index.html">
                <div class="logo-pb"><span class="p">P</span><span class="b">B</span></div>
                <div class="logo-sub"><span class="photo">Photo</span><span class="bot">Bot</span></div>
            </a>
            <div style="position:relative; display:flex; flex-direction:column; align-items:center; cursor:pointer;" onclick="toggleDeepSeekMenu()">
                <img src="deepseek_logo.png" alt="DeepSeek">
                <div id="deepseekMenu" style="display:none; position:absolute; top:calc(50% - 20px); left:calc(50% + 20px); transform:translate(-50%, -50%); background:rgba(26,26,46,0.9); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:6px; z-index:100; min-width:160px; box-shadow:0 12px 40px rgba(0,0,0,0.6);">
                    <div style="color:#666; font-size:9px; padding:6px 12px 4px; text-transform:uppercase; letter-spacing:2px; opacity:0.8;" data-t="choose_model">Выберите модель</div>
                    <a href="v4flash.html" style="display:flex; align-items:center; gap:8px; padding:8px 10px; color:#8B5CF6; text-decoration:none; font-size:12px; border-radius:10px; font-weight:500; transition:0.2s ease;" onmouseover="this.style.background='rgba(139,92,246,0.15)'" onmouseout="this.style.background='transparent'">V4 Flash <span style="font-size:9px;color:#555;margin-left:auto;" data-t="fast">Fast</span></a>
                    <a href="v4pro.html" style="display:flex; align-items:center; gap:8px; padding:8px 10px; color:#F59E0B; text-decoration:none; font-size:12px; border-radius:10px; font-weight:500; transition:0.2s ease;" onmouseover="this.style.background='rgba(245,158,11,0.15)'" onmouseout="this.style.background='transparent'">V4 Pro <span style="font-size:9px;color:#555;margin-left:auto;" data-t="best">Best</span></a>
                </div>
            </div>
        </div>
        <h1 data-t="storage_title">Хранилище генераций</h1>
    </div>

    <div class="container" id="container">
        <div class="empty-state" id="emptyState" data-t="loading">Загрузка...</div>
    </div>

    <div class="nav-links">
        <a href="index.html" class="nav-home" data-t="home">На главную</a>
        <a href="prompts.html" data-t="prompts">База промтов</a>
    </div>

    <script src="lang.js"></script>
    <script>
        const SERVER_URL = CONFIG.SERVER_URL;
        let sessionToken = '';
        let currentUserId = null;

        let currentLang = localStorage.getItem('photobot_lang') || 'en';
        function setLanguage(lang) { currentLang = lang; localStorage.setItem('photobot_lang', lang); document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang)); applyTranslations(); }
        function t(key) { return (translations[currentLang] && translations[currentLang][key]) || key; }
        function applyTranslations() { document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.getAttribute('data-t')); }); }
        document.addEventListener('DOMContentLoaded', function() { document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === currentLang)); applyTranslations(); });

        function toggleTheme() { document.body.classList.toggle('light'); var isLight = document.body.classList.contains('light'); localStorage.setItem('photobot_theme', isLight ? 'light' : 'dark'); document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️'; }
        (function() { var saved = localStorage.getItem('photobot_theme'); if (saved === 'light') { document.body.classList.add('light'); document.getElementById('themeToggle').textContent = '🌙'; } })();

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            if (!sessionToken || !currentUserId) {
                alert('Сессия устарела. Авторизуйтесь заново на главной странице.');
                window.location.href = 'index.html';
            }
        } else {
            alert('Авторизуйтесь на главной странице');
            window.location.href = 'index.html';
        }

        function toggleDeepSeekMenu() {
            const menu = document.getElementById('deepseekMenu');
            if (menu.style.display === 'block') {
                menu.style.opacity = '0';
                menu.style.transform = 'translateX(-50%) translateY(-4px)';
                setTimeout(() => { menu.style.display = 'none'; }, 150);
            } else {
                menu.style.display = 'block';
                menu.style.opacity = '0';
                menu.style.transform = 'translateX(-50%) translateY(-4px)';
                requestAnimationFrame(() => {
                    menu.style.transition = 'opacity 0.15s, transform 0.15s';
                    menu.style.opacity = '1';
                    menu.style.transform = 'translateX(-50%) translateY(0)';
                });
            }
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('[onclick="toggleDeepSeekMenu()"]')) {
                const menu = document.getElementById('deepseekMenu');
                if (menu.style.display === 'block') {
                    menu.style.opacity = '0';
                    menu.style.transform = 'translateX(-50%) translateY(-4px)';
                    setTimeout(() => { menu.style.display = 'none'; }, 150);
                }
            }
        });

        function renderAudioItem(jobId, mode, caption, category) {
            const div = document.createElement('div');
            div.className = 'storage-item';
            const icon = document.createElement('div');
            icon.className = 'audio-icon';
            icon.textContent = '🎵';
            div.appendChild(icon);
            const info = document.createElement('div');
            info.className = 'item-info';
            const date = document.createElement('div');
            date.className = 'item-date';
            const match = jobId.match(/(\d{8})_(\d{6})/);
            if (match) {
                const d = match[1]; const t = match[2];
                date.textContent = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)} ${t.slice(0,2)}:${t.slice(2,4)}:${t.slice(4,6)}`;
            } else { date.textContent = jobId; }
            info.appendChild(date);
            const promptEl = document.createElement('div');
            promptEl.style.cssText = 'color:#aaa;font-size:11px;margin-bottom:4px;word-break:break-all;';
            promptEl.textContent = caption || t('no_prompt');
            info.appendChild(promptEl);
            const catEl = document.createElement('div');
            catEl.style.cssText = 'color:#9b59b6;font-size:10px;margin-bottom:6px;';
            catEl.textContent = category || mode || '';
            info.appendChild(catEl);
            const audio = document.createElement('audio');
            audio.className = 'audio-player';
            audio.controls = true;
            audio.src = `${SERVER_URL}/get_audio_file?job_id=${jobId}&user_id=${currentUserId}&session_token=${sessionToken}`;
            audio.onerror = function() { this.style.display = 'none'; };
            info.appendChild(audio);
            const actions = document.createElement('div');
            actions.className = 'item-actions';
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.textContent = t('delete');
            deleteBtn.onclick = async function() {
                if (!confirm(t('confirm_delete'))) return;
                try {
                    await fetch(`${SERVER_URL}/delete_audio?job_id=${jobId}&user_id=${currentUserId}&session_token=${sessionToken}`, { method: 'DELETE' });
                    loadStorage();
                } catch(e) {}
            };
            actions.appendChild(deleteBtn);
            info.appendChild(actions);
            div.appendChild(info);
            return div;
        }

        async function loadStorage() {
            if (!currentUserId) {
                document.getElementById('container').innerHTML = `<div class="empty-state">${t('auth_required')}</div>`;
                return;
            }
            try {
                const resp = await fetch(`${SERVER_URL}/history?user_id=${currentUserId}&source=web&session_token=${sessionToken}`);
                if (resp.status === 403) {
                    alert('Сессия устарела. Авторизуйтесь заново.');
                    window.location.href = 'index.html';
                    return;
                }
                const container = document.getElementById('container');
                container.innerHTML = '';
                let hasItems = false;
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.files && data.files.length > 0) {
                        hasItems = true;
                        data.files.forEach((file) => {
                            const div = document.createElement('div');
                            div.className = 'storage-item';
                            const img = document.createElement('img');
                            img.src = `${SERVER_URL}/history_file?file=${file}&source=web&session_token=${sessionToken}`;
                            img.onerror = function() { this.style.display = 'none'; };
                            img.onclick = function() {
                                const modal = document.createElement('div');
                                modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer';
                                const full = new Image();
                                full.src = img.src;
                                full.style.maxWidth = '95%'; full.style.maxHeight = '95%'; full.style.objectFit = 'contain';
                                modal.appendChild(full);
                                modal.onclick = () => modal.remove();
                                document.body.appendChild(modal);
                            };
                            div.appendChild(img);
                            const info = document.createElement('div');
                            info.className = 'item-info';
                            const date = document.createElement('div');
                            date.className = 'item-date';
                            const match = file.match(/(\d{8})_(\d{6})/);
                            if (match) {
                                const d = match[1]; const t = match[2];
                                date.textContent = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)} ${t.slice(0,2)}:${t.slice(2,4)}:${t.slice(4,6)}`;
                            } else { date.textContent = file; }
                            info.appendChild(date);
                            const promptEl = document.createElement('div');
                            promptEl.style.cssText = 'color:#aaa;font-size:11px;margin-bottom:8px;word-break:break-all;';
                            promptEl.textContent = t('loading_prompt');
                            info.appendChild(promptEl);
                            const txtFile = file.replace('.jpg', '.txt');
                            fetch(`${SERVER_URL}/history_file?file=${txtFile}&source=web&session_token=${sessionToken}`)
                                .then(r => { if (!r.ok) throw new Error(); return r.text(); })
                                .then(txt => { promptEl.textContent = txt || t('no_prompt'); })
                                .catch(() => { promptEl.textContent = t('no_prompt'); });
                            const actions = document.createElement('div');
                            actions.className = 'item-actions';
                            const deleteBtn = document.createElement('button');
                            deleteBtn.className = 'btn-delete';
                            deleteBtn.textContent = t('delete');
                            deleteBtn.onclick = async function() {
                                if (!confirm(t('confirm_delete'))) return;
                                try {
                                    await fetch(`${SERVER_URL}/delete_history_file?file=${file}&source=web&session_token=${sessionToken}`, { method: 'DELETE' });
                                    loadStorage();
                                } catch(e) {}
                            };
                            actions.appendChild(deleteBtn);
                            info.appendChild(actions);
                            div.appendChild(info);
                            container.appendChild(div);
                        });
                    }
                }
                const audioResp = await fetch(`${SERVER_URL}/audio_history?user_id=${currentUserId}&session_token=${sessionToken}`);
                if (audioResp.ok) {
                    const audioData = await audioResp.json();
                    if (audioData.results && audioData.results.length > 0) {
                        hasItems = true;
                        audioData.results.forEach(item => {
                            container.appendChild(renderAudioItem(item.job_id, item.mode, item.caption, item.category));
                        });
                    }
                }
                try {
                    await fetch(`${SERVER_URL}/mark_viewed?user_id=${currentUserId}&source=web&session_token=${sessionToken}`, { method: 'POST' });
                } catch(e) {}
                if (!hasItems) {
                    container.innerHTML = `<div class="empty-state">${t('empty_storage')}</div>`;
                }
            } catch (e) {
                document.getElementById('container').innerHTML = `<div class="empty-state">${t('error_loading')}</div>`;
            }
        }

        loadStorage();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — Хранилище генераций</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: #201F28; color: #fff; min-height: 100vh; position: relative; }
        body::before { content: ''; position: fixed; top: -30%; left: -20%; width: 140%; height: 140%; background: radial-gradient(ellipse at 25% 30%, rgba(0,203,245,0.15) 0%, transparent 50%), radial-gradient(ellipse at 75% 50%, rgba(20,233,252,0.12) 0%, transparent 50%), radial-gradient(ellipse at 40% 80%, rgba(255,255,255,0.05) 0%, transparent 50%); filter: blur(60px); pointer-events: none; z-index: 0; }
        .header, .container, .nav-links { position: relative; z-index: 1; }
        .header { text-align: center; padding: 20px 20px 10px; }
        .header-inner { display: flex; flex-direction: row; justify-content: center; gap: 20px; align-items: center; margin-bottom: 16px; }
        .header-inner a { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .logo-pb { font-size: 48px; font-weight: 700; letter-spacing: 4px; line-height: 1; }
        .logo-pb .p { color: #00CBF5; }
        .logo-pb .b { color: #14E9FC; }
        .logo-sub { font-size: 16px; font-weight: 700; letter-spacing: 2px; margin-top: -2px; }
        .logo-sub .photo { color: #00CBF5; }
        .logo-sub .bot { color: #14E9FC; }
        .header h1 { font-size: 20px; color: #fff; font-weight: 600; margin-top: 8px; }
        .container { max-width: 700px; margin: 120px auto 0; padding: 0 16px 60px; }
        .storage-item { margin-bottom: 16px; background: #222; border-radius: 16px; overflow: hidden; border: 1px solid #2A2A2A; display: flex; align-items: center; padding: 12px; gap: 12px; }
        .storage-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; cursor: pointer; flex-shrink: 0; }
        .storage-item .item-info { flex: 1; min-width: 0; }
        .storage-item .item-date { color: #888; font-size: 11px; margin-bottom: 4px; }
        .storage-item .item-note { color: #aaa; font-size: 12px; margin-bottom: 8px; }
        .storage-item .item-actions { display: flex; gap: 6px; }
        .storage-item .item-actions button { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; font-family: 'Montserrat', sans-serif; transition: 0.2s; }
        .storage-item .btn-download { background: #27AE60; color: #fff; }
        .storage-item .btn-download:hover { background: #2ECC71; }
        .storage-item .btn-delete { background: #E74C3C; color: #fff; }
        .storage-item .btn-delete:hover { background: #FF6B6B; }
        .empty-state { text-align: center; color: #555; padding: 60px 20px; font-size: 14px; }
        .nav-links { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .nav-links a { padding: 10px 20px; background: #222; border: 1px solid #2A2A2A; color: #fff; border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: 0.2s; text-align: center; }
        .nav-links a:hover { border-color: #00CBF5; background: #2A2A2A; }
        .nav-links a.nav-home { background: #00CBF5; color: #201F28; border: none; }
        .nav-links a.nav-home:hover { background: #14E9FC; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <a href="index.html">
                <div class="logo-pb"><span class="p">P</span><span class="b">B</span></div>
                <div class="logo-sub"><span class="photo">Photo</span><span class="bot">Bot</span></div>
            </a>
            <div style="position:relative; display:flex; flex-direction:column; align-items:center; cursor:pointer;" onclick="toggleDeepSeekMenu()">
                <img src="deepseek_logo.png" alt="DeepSeek" style="height:40px; margin-top:3px;">
                <div id="deepseekMenu" style="display:none; position:absolute; top:110%; left:50%; transform:translateX(-50%); background:#1a1a2e; border:1px solid #2a2a4a; border-radius:12px; padding:8px; z-index:100; min-width:160px; box-shadow:0 8px 32px rgba(0,0,0,0.4);">
                    <div style="color:#888; font-size:10px; padding:4px 12px 8px; text-transform:uppercase; letter-spacing:1px;">Выберите модель</div>
                    <a href="v4flash.html" style="display:flex; align-items:center; gap:8px; padding:10px 12px; color:#8B5CF6; text-decoration:none; font-size:13px; border-radius:8px; font-weight:500; transition:0.15s;" onmouseover="this.style.background='#1a2a4a'" onmouseout="this.style.background='transparent'">⚡ V4 Flash <span style="font-size:10px;color:#666;margin-left:auto;">Fast</span></a>
                    <a href="v4pro.html" style="display:flex; align-items:center; gap:8px; padding:10px 12px; color:#F59E0B; text-decoration:none; font-size:13px; border-radius:8px; font-weight:500; transition:0.15s;" onmouseover="this.style.background='#1a2a4a'" onmouseout="this.style.background='transparent'">🧠 V4 Pro <span style="font-size:10px;color:#666;margin-left:auto;">Best</span></a>
                </div>
            </div>
        </div>
        <h1>📦 Хранилище генераций</h1>
    </div>

    <div class="container" id="container">
        <div class="empty-state" id="emptyState">Загрузка...</div>
    </div>

    <div class="nav-links">
        <a href="index.html" class="nav-home">🏠 На главную</a>
        <a href="prompts.html">📋 База промтов</a>
    </div>

    <script>
        const SERVER_URL = "https://api.фото-бот.рф";
        let sessionToken = '';
        let currentUserId = null;

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
        }

        function toggleDeepSeekMenu() {
            const menu = document.getElementById('deepseekMenu');
            if (menu.style.display === 'block') {
                menu.style.opacity = '0';
                menu.style.transform = 'translateX(-50%) translateY(-4px)';
                setTimeout(() => { menu.style.display = 'none'; }, 150);
            } else {
                menu.style.display = 'block';
                menu.style.opacity = '0';
                menu.style.transform = 'translateX(-50%) translateY(-4px)';
                requestAnimationFrame(() => {
                    menu.style.transition = 'opacity 0.15s, transform 0.15s';
                    menu.style.opacity = '1';
                    menu.style.transform = 'translateX(-50%) translateY(0)';
                });
            }
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('[onclick="toggleDeepSeekMenu()"]')) {
                const menu = document.getElementById('deepseekMenu');
                if (menu.style.display === 'block') {
                    menu.style.opacity = '0';
                    menu.style.transform = 'translateX(-50%) translateY(-4px)';
                    setTimeout(() => { menu.style.display = 'none'; }, 150);
                }
            }
        });

        async function loadStorage() {
            if (!currentUserId) {
                document.getElementById('container').innerHTML = '<div class="empty-state">Авторизуйтесь на главной странице</div>';
                return;
            }
            try {
                const resp = await fetch(`${SERVER_URL}/history?user_id=${currentUserId}&source=web&session_token=${sessionToken}`);
                const data = await resp.json();
                const container = document.getElementById('container');
                if (!data.files || data.files.length === 0) {
                    container.innerHTML = '<div class="empty-state">Здесь пока ничего нет</div>';
                    return;
                }
                container.innerHTML = '';
                data.files.forEach((file) => {
                    const div = document.createElement('div');
                    div.className = 'storage-item';
                    const img = document.createElement('img');
                    img.src = `${SERVER_URL}/history_file?file=${file}&source=web&session_token=${sessionToken}`;
                    img.onclick = function(e) {
                        if (e.target.tagName === 'BUTTON') return;
                        const modal = document.createElement('div');
                        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer';
                        const full = new Image();
                        full.src = img.src;
                        full.style.maxWidth = '95%';
                        full.style.maxHeight = '95%';
                        full.style.objectFit = 'contain';
                        modal.appendChild(full);
                        modal.onclick = () => modal.remove();
                        document.body.appendChild(modal);
                    };
                    div.appendChild(img);
                    const info = document.createElement('div');
                    info.className = 'item-info';
                    const date = document.createElement('div');
                    date.className = 'item-date';
                    const match = file.match(/(\d{8})_(\d{6})/);
                    if (match) {
                        const d = match[1];
                        const t = match[2];
                        date.textContent = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)} ${t.slice(0,2)}:${t.slice(2,4)}:${t.slice(4,6)}`;
                    } else {
                        date.textContent = file;
                    }
                    info.appendChild(date);
                    const actions = document.createElement('div');
                    actions.className = 'item-actions';
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'btn-download';
                    downloadBtn.textContent = '💾 Скачать';
                    downloadBtn.onclick = function(e) {
                        e.stopPropagation();
                        const a = document.createElement('a');
                        a.href = img.src;
                        a.download = 'photobot.jpg';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    };
                    actions.appendChild(downloadBtn);
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'btn-delete';
                    deleteBtn.textContent = '🗑️ Удалить';
                    deleteBtn.onclick = async function() {
                        if (!confirm('Удалить файл?')) return;
                        try {
                            await fetch(`${SERVER_URL}/delete_history_file?file=${file}&source=web&session_token=${sessionToken}`, { method: 'DELETE' });
                            loadStorage();
                        } catch (e) {}
                    };
                    actions.appendChild(deleteBtn);
                    info.appendChild(actions);
                    div.appendChild(info);
                    container.appendChild(div);
                });
            } catch (e) {
                document.getElementById('container').innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
            }
        }

        loadStorage();
    </script>
</body>
</html>

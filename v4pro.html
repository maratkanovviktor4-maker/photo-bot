<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoBot — DeepSeek V4 Pro</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 280px; background: #16213e; display: flex; flex-direction: column; padding: 16px; border-right: 1px solid #0f3460; flex-shrink: 0; }
        .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .logo-row img { height: 32px; }
        .logo-text { font-size: 15px; font-weight: 600; color: #4A90D9; }
        .new-chat { width: 100%; padding: 10px; background: #0f3460; color: #fff; border: 1px solid #1a5276; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: 500; margin-bottom: 12px; transition: 0.2s; }
        .new-chat:hover { background: #1a5276; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #a0a0b0; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.15s; }
        .chat-item:hover { background: #1a2a4a; color: #e0e0e0; }
        .chat-item.active { background: #1a2a4a; color: #fff; font-weight: 500; }
        .sidebar-footer { border-top: 1px solid #1a2a4a; padding-top: 12px; margin-top: 8px; }
        .sidebar-footer a { color: #666; text-decoration: none; font-size: 12px; display: block; text-align: center; transition: 0.2s; }
        .sidebar-footer a:hover { color: #4A90D9; }
        .main { flex: 1; display: flex; flex-direction: column; background: #1a1a2e; }
        .top-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-bottom: 1px solid #16213e; background: #1a1a2e; }
        .mode-btn { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #2a2a4a; background: #16213e; color: #a0a0b0; font-family: 'Montserrat', sans-serif; transition: 0.2s; }
        .mode-btn.active { background: #4A90D9; border-color: #4A90D9; color: #fff; font-weight: 600; }
        .mode-btn:hover:not(.active) { border-color: #4A90D9; color: #e0e0e0; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .chat-area .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #555; }
        .chat-area .empty-state .logo-lg { height: 60px; opacity: 0.6; }
        .chat-area .empty-state .title { font-size: 22px; font-weight: 600; color: #777; }
        .message-row { display: flex; gap: 12px; align-items: flex-start; max-width: 85%; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-row.assistant { align-self: flex-start; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
        .avatar.assistant-avatar { background: #0f3460; color: #4A90D9; }
        .avatar.user-avatar { background: #2a2a4a; color: #7AB8FF; }
        .message-content { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
        .message-row.assistant .message-content { background: #16213e; border: 1px solid #1a2a4a; }
        .message-row.user .message-content { background: #0f3460; }
        .message-content pre { background: #0a0a1a; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; margin: 8px 0; border: 1px solid #1a2a4a; }
        .message-content code { font-family: 'Courier New', monospace; font-size: 12px; background: #0a0a1a; padding: 2px 6px; border-radius: 4px; }
        .message-actions { display: flex; gap: 8px; margin-top: 6px; opacity: 0; transition: 0.2s; }
        .message-row:hover .message-actions { opacity: 1; }
        .message-actions button { background: #2a2a4a; border: none; color: #888; cursor: pointer; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-family: 'Montserrat', sans-serif; transition: 0.2s; }
        .message-actions button:hover { background: #3a3a5a; color: #e0e0e0; }
        .input-area { padding: 14px 20px; border-top: 1px solid #16213e; display: flex; gap: 10px; background: #1a1a2e; }
        .input-area textarea { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid #2a2a4a; background: #16213e; color: #e0e0e0; font-family: 'Montserrat', sans-serif; font-size: 13px; outline: none; resize: none; height: 44px; transition: 0.2s; }
        .input-area textarea:focus { border-color: #4A90D9; }
        .input-area button { padding: 10px 18px; background: #4A90D9; color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 14px; transition: 0.2s; }
        .input-area button:hover { background: #5AA0E9; }
        .input-area button:disabled { background: #2a2a4a; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-row">
            <img src="deepseek_pro.png" alt="Pro" onerror="this.style.display='none'">
            <span class="logo-text">V4 Pro</span>
        </div>
        <button class="new-chat" onclick="newChat()">+ Новый чат</button>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <a href="index.html">← На главную</a>
        </div>
    </div>
    <div class="main">
        <div class="top-bar">
            <button class="mode-btn active" data-mode="chat" onclick="setMode('chat')">💬 Chat</button>
            <button class="mode-btn" data-mode="reasoner" onclick="setMode('reasoner')">🧠 Reasoner</button>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <img src="deepseek_pro.png" class="logo-lg" alt="DeepSeek" onerror="this.style.display='none'">
                <div class="title">DeepSeek V4 Pro</div>
                <div style="color:#666;font-size:13px;">Задайте любой вопрос</div>
            </div>
        </div>
        <div class="input-area">
            <textarea id="userInput" placeholder="Введите сообщение..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}" oninput="this.style.height='44px';this.style.height=Math.min(this.scrollHeight,200)+'px';"></textarea>
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://api.фото-бот.рф";
        let currentMode = 'chat';
        let chats = [];
        let currentChatId = null;
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            loadChats();
        }

        function loadChats() {
            const saved = localStorage.getItem('v4pro_chats');
            if (saved) {
                chats = JSON.parse(saved);
                renderChatList();
                if (chats.length > 0) openChat(chats[0].id);
            }
        }
        function saveChats() { localStorage.setItem('v4pro_chats', JSON.stringify(chats)); }
        function newChat() {
            const chat = { id: Date.now(), title: 'Новый чат', messages: [] };
            chats.unshift(chat);
            currentChatId = chat.id;
            saveChats();
            renderChatList();
            renderMessages();
        }
        function openChat(id) { currentChatId = id; renderChatList(); renderMessages(); }
        function deleteChat(id) {
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) {
                currentChatId = chats.length > 0 ? chats[0].id : null;
            }
            saveChats();
            renderChatList();
            renderMessages();
        }
        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => 
                `<div class="chat-item${c.id === currentChatId ? ' active' : ''}" onclick="openChat(${c.id})" oncontextmenu="event.preventDefault();deleteChat(${c.id})">${c.title}</div>`
            ).join('');
        }
        function renderMessages() {
            const chat = chats.find(c => c.id === currentChatId);
            const area = document.getElementById('chatArea');
            if (!chat || chat.messages.length === 0) {
                area.innerHTML = `
                    <div class="empty-state">
                        <img src="deepseek_pro.png" class="logo-lg" alt="DeepSeek" onerror="this.style.display='none'">
                        <div class="title">DeepSeek V4 Pro</div>
                        <div style="color:#666;font-size:13px;">Задайте любой вопрос</div>
                    </div>`;
            } else {
                area.innerHTML = chat.messages.map((m, i) => `
                    <div class="message-row ${m.role}">
                        <div class="avatar ${m.role}-avatar">${m.role === 'user' ? '👤' : '🐋'}</div>
                        <div>
                            <div class="message-content">${formatMessage(m.content)}</div>
                            <div class="message-actions">
                                <button onclick="copyMessage(${i})">📋 Копировать</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            area.scrollTop = area.scrollHeight;
        }
        function formatMessage(text) {
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }
        function copyMessage(index) {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) navigator.clipboard.writeText(chat.messages[index].content);
        }
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        }
        async function sendMessage() {
            if (isSending) return;
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            if (!currentUserId) { alert('Авторизуйтесь на главной странице'); return; }

            if (!currentChatId) newChat();
            input.value = '';
            input.style.height = '44px';
            isSending = true;
            document.getElementById('sendBtn').disabled = true;

            const chat = chats.find(c => c.id === currentChatId);
            chat.messages.push({ role: 'user', content: text });
            if (chat.title === 'Новый чат' && chat.messages.length === 1) chat.title = text.substring(0, 30);
            saveChats();
            renderChatList();
            renderMessages();

            const placeholderId = 'msg_' + Date.now();
            const area = document.getElementById('chatArea');
            const typingRow = document.createElement('div');
            typingRow.className = 'message-row assistant';
            typingRow.id = placeholderId;
            typingRow.innerHTML = '<div class="avatar assistant-avatar">🐋</div><div><div class="message-content">Думаю...</div></div>';
            area.appendChild(typingRow);
            area.scrollTop = area.scrollHeight;

            try {
                const resp = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, message: text, model: 'pro', mode: currentMode })
                });
                const data = await resp.json();
                const el = document.getElementById(placeholderId);
                if (el) el.remove();
                if (data.reply) {
                    chat.messages.push({ role: 'assistant', content: data.reply });
                } else {
                    chat.messages.push({ role: 'assistant', content: '⚠️ Ошибка. Попробуйте позже.' });
                }
                saveChats();
                renderMessages();
            } catch (e) {
                const el = document.getElementById(placeholderId);
                if (el) el.remove();
                chat.messages.push({ role: 'assistant', content: '⚠️ Ошибка соединения.' });
                saveChats();
                renderMessages();
            }
            isSending = false;
            document.getElementById('sendBtn').disabled = false;
        }
    </script>
</body>
</html>

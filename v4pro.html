        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 99999; display: none; align-items: center; justify-content: center; animation: modalFadeIn 0.2s ease; }

        .modal-btn-secondary { background: rgba(255, 255, 255, 0.08); color: #a0a0b0; border: 1px solid rgba(255, 255, 255, 0.1) !important; }

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Свернуть панель">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="sidebar">
        <div class="logo-row">
            <img src="deepseek_logo.png" alt="DeepSeek Pro" onerror="this.style.display='none'">
            <span class="logo-text"><span style="color:#F59E0B;">V4 Pro</span></span>
        </div>
        <div class="search-row">
            <input class="chat-search" id="chatSearch" placeholder="Поиск чата..." oninput="filterChats()">
        </div>
        <button class="new-chat" onclick="newChat()">Новый чат</button>
        <div class="chat-list" id="chatList"></div>
        <div class="branches-panel" id="branchesPanel" style="display:none;">
            <div class="branches-label">Ветки</div>
            <div id="branchesList"></div>
        </div>
        <div class="sidebar-footer">
            <a href="index.html">На главную</a>
        </div>
    </div>
    <div class="main">
        <div class="top-bar">
            <span id="balanceDisplay"></span>
            <span id="branchIndicatorTop"></span>
            <select id="personalitySelect" onchange="changePersonality()" style="padding:6px 10px;border-radius:16px;font-size:12px;font-family:Inter,sans-serif;background:rgba(34,34,34,0.8);color:#e0e0e0;border:1px solid rgba(255,255,255,0.08);cursor:pointer;outline:none;margin-right:8px;">
                <option value="default">🤖 Ассистент</option>
            </select>
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle" style="margin-left: auto;">☀️</button>
        </div>
        <div class="chat-wrapper">
            <div class="chat-area" id="chatArea">
                <div class="empty-state">
                    <img src="deepseek_logo.png" class="logo-lg" alt="DeepSeek Pro" onerror="this.style.display='none'">
                    <div class="title">DeepSeek V4 Pro</div>
                    <div style="color:#666;font-size:13px;">Задайте любой вопрос или прикрепите файл</div>
                </div>
            </div>
            <div class="bottom-container">
                <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
                <div class="input-area" id="inputArea">
                    <div id="dropZone" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;display:none;align-items:center;justify-content:center;background:rgba(245,158,11,0.1);border:2px dashed #F59E0B;border-radius:16px;font-size:14px;color:#F59E0B;">Отпустите файл для загрузки</div>
                    <div class="file-list" id="fileList"></div>
                    <div class="input-row-wrapper">
                        <div class="input-row">
                            <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
                            <textarea id="userInput" placeholder="Введите сообщение..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();if(isSending){stopTyping();}else{sendMessage();}}" oninput="this.style.height='auto';var h=this.scrollHeight;this.style.height=Math.min(h,300)+'px';" onfocus="if(!this._init){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,300)+'px';this._init=true;}"></textarea>
                        </div>
                        <div class="input-toolbar">
                            <button class="mode-btn" id="reasonerToggle" onclick="toggleReasoner()" style="font-size:11px;padding:4px 10px;">Reasoner</button>
                            <span class="file-name-inline" id="fileNameInline"></span>
                            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" transform="rotate(-45 12 12)"/></svg></button>
                            <button id="sendBtn" onclick="sendMessage()" title="Отправить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="nav-container" id="navContainer"></div>
    <div id="loadingSpinner" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(32,31,40,0.8);z-index:99998;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
        <div style="width:48px;height:48px;border:4px solid rgba(245,158,11,0.2);border-top-color:#F59E0B;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <div style="color:#F59E0B;font-family:Inter,sans-serif;font-size:14px;font-weight:500;">Загрузка...</div>
    </div>
    <!-- Модалка переименования -->
    <div id="renameModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon" style="background:rgba(245,158,11,0.15);color:#F59E0B;">✏️</div>
            <div class="modal-title" id="renameModalTitle" style="margin-bottom:16px;">Переименовать</div>
            <div style="margin-bottom:20px;">
                <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;font-family:Inter,sans-serif;font-weight:500;">НОВОЕ НАЗВАНИЕ</label>
                <input type="text" id="renameInput" style="width:100%;padding:12px 14px;background:#0d0d1a;color:#e0e0e0;border:2px solid rgba(255,255,255,0.1);border-radius:12px;font-size:14px;font-family:Inter,sans-serif;outline:none;transition:all 0.2s ease;font-weight:500;" placeholder="Введите название...">
            </div>
            <div class="modal-actions" style="gap:12px;">
                <button class="modal-btn-secondary" onclick="closeRenameModal()" style="flex:1;padding:12px;">Отмена</button>
                <button id="renameConfirmBtn" class="modal-btn-primary" onclick="confirmRename()" style="flex:1;padding:12px;">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        var autoScroll = true;
        const SERVER_URL = CONFIG.SERVER_URL;
        let currentPersonality = localStorage.getItem('photobot_personality') || 'default';
        let personalities = {};
        let chats = [];
        let currentChatId = null;
        let currentBranchId = 'main';
        let sessionToken = '';
        let currentUserId = null;
        let isSending = false;
        let currentMode = localStorage.getItem('photobot_mode') || 'chat';
        let typingInterval = null;
        let pendingFile = null;
        let activeStreamId = null;
        let allBranchesCache = {};

        window.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
        window.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); });

        async function loadPersonalities() {
            try {
                var resp = await fetch(SERVER_URL + '/get_personalities?session_token=' + sessionToken);
                if (resp.ok) {
                    var data = await resp.json();
                    personalities = data.personalities;
                    var select = document.getElementById('personalitySelect');
                    select.innerHTML = '';
                    for (var key in personalities) {
                        var opt = document.createElement('option');
                        opt.value = key;
                        opt.textContent = personalities[key].name;
                        if (key === currentPersonality) opt.selected = true;
                        select.appendChild(opt);
                    }
                    var customOpt = document.createElement('option');
                    customOpt.value = 'custom';
                    customOpt.textContent = '🎭 Кастомная...';
                    if (currentPersonality === 'custom') customOpt.selected = true;
                    select.appendChild(customOpt);
                    if (currentPersonality === 'custom') {
                        var customResp = await fetch(SERVER_URL + '/get_custom_personality?user_id=' + currentUserId + '&session_token=' + sessionToken);
                        if (customResp.ok) {
                            var customData = await customResp.json();
                            document.getElementById('customPersonalityInput').value = customData.custom_prompt || '';
                        }
                    }
                }
            } catch(e) { console.error('loadPersonalities:', e); }
        }

        function changePersonality() {
            var val = document.getElementById('personalitySelect').value;
            if (val === 'custom') {
                // Простое редактирование через prompt
                var newPrompt = prompt('Введите кастомную личность:', document.getElementById('customPersonalityInput')?.value || '');
                if (newPrompt !== null) {
                    document.getElementById('customPersonalityInput').value = newPrompt;
                    saveCustomPersonality();
                }
                document.getElementById('personalitySelect').value = currentPersonality;
                return;
            }
            var oldPersonality = currentPersonality;
            currentPersonality = val;
            localStorage.setItem('photobot_personality', val);
            document.getElementById('personalitySelect').value = val;
            var currentChat = chats.find(function(c) { return c.id === currentChatId; });
            if (currentChat && currentChat.messages.length > 0 && oldPersonality !== val) {
                newChat();
                var newChatObj = chats[chats.length - 1];
                if (newChatObj) newChatObj._personality = val;
                renderChatList();
                renderMessages();
                var tempMsg = document.createElement('div');
                tempMsg.style.cssText = 'text-align:center;padding:12px;color:#F59E0B;font-size:13px;font-family:Inter,sans-serif;';
                tempMsg.textContent = '🔄 Новый чат с личностью «' + (personalities[val] ? personalities[val].name : val) + '»';
                document.getElementById('chatArea').appendChild(tempMsg);
                setTimeout(function() { if (tempMsg.parentNode) tempMsg.remove(); }, 3000);
            }
        }

        async function saveCustomPersonality() {
            var prompt = document.getElementById('customPersonalityInput')?.value?.trim() || '';
            if (!prompt) return;
            try {
                await fetch(SERVER_URL + '/save_custom_personality', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, prompt: prompt })
                });
                currentPersonality = 'custom';
                localStorage.setItem('photobot_personality', 'custom');
                document.getElementById('personalitySelect').value = 'custom';
            } catch(e) { console.error(e); }
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            var isLight = document.body.classList.contains('light');
            localStorage.setItem('photobot_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
            var hlTheme = document.getElementById('highlightTheme');
            if (hlTheme) {
                hlTheme.href = isLight 
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
            }
        }

        (function() {
            var saved = localStorage.getItem('photobot_theme');
            var isLight = saved === 'light';
            if (isLight) {
                document.body.classList.add('light');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            var hlTheme = document.getElementById('highlightTheme');
            if (hlTheme) {
                hlTheme.href = isLight 
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
            }
            var savedMode = localStorage.getItem('photobot_mode');
            if (savedMode === 'reasoner') {
                currentMode = 'reasoner';
                var btn = document.getElementById('reasonerToggle');
                if (btn) btn.classList.add('active');
            }
            var savedSidebar = localStorage.getItem('photobot_sidebar');
            if (savedSidebar === 'collapsed') {
                var main = document.querySelector('.main');
                var sidebar = document.querySelector('.sidebar');
                var toggle = document.getElementById('sidebarToggle');
                if (main) main.style.transition = 'none';
                if (sidebar) sidebar.classList.add('collapsed');
                if (toggle) {
                    toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
                    toggle.title = 'Развернуть панель';
                }
                document.body.classList.add('collapsed-sidebar');
                if (main) { main.offsetHeight; main.style.transition = ''; }
            }
        })();

        function scrollToBottom() {
            autoScroll = true;
            var main = document.querySelector('.main');
            if (!main) return;
            main.style.scrollBehavior = 'auto';
            main.scrollTop = main.scrollHeight;
            main.style.scrollBehavior = 'smooth';
            var btn = document.getElementById('scrollBottomBtn');
            if (btn) btn.style.display = 'none';
        }

        var mainEl = document.querySelector('.main');
        if (mainEl) {
            mainEl.addEventListener('scroll', function(e) {
                if (e.target !== mainEl) return;
                var btn = document.getElementById('scrollBottomBtn');
                if (!mainEl) return;
                var atBottom = mainEl.scrollHeight - mainEl.scrollTop - mainEl.clientHeight < 5;
                if (atBottom) { btn.style.display = 'none'; autoScroll = true; }
                else { btn.style.display = 'flex'; autoScroll = false; }
            }, true);
        }

        const savedAuth = localStorage.getItem('photobot_auth');
        if (savedAuth) {
            const auth = JSON.parse(savedAuth);
            currentUserId = auth.user_id;
            sessionToken = auth.session_token || '';
            if (!sessionToken || !currentUserId) {
                showAlertModal('Сессия истекла', 'Сессия устарела. Авторизуйтесь заново на главной странице.', '❌');
                window.location.href = 'index.html';
            } else {
                loadChatsFromServer();
                updateBalance();
                loadPersonalities();
            }
        } else {
            showAlertModal('Требуется авторизация', 'Авторизуйтесь на главной странице', '❌');
            window.location.href = 'index.html';
        }

        async function loadChatsFromServer() {
            showLoading();
            try {
                const resp = await fetch(`${SERVER_URL}/get_chat_history?user_id=${currentUserId}&model=pro&session_token=${sessionToken}&meta_only=true`);
                if (resp.status === 403) {
                    showAlertModal('Сессия истекла', 'Сессия устарела. Авторизуйтесь заново.', '❌');
                    window.location.href = 'index.html';
                    return;
                }
                const data = await resp.json();
                if (data.history) {
                    chats = [];
                    for (const [chatId, messages] of Object.entries(data.history)) {
                        const title = data.titles && data.titles[chatId] ? data.titles[chatId] : ('Чат ' + chatId);
                        const activeBranch = data.active_branches && data.active_branches[chatId] ? data.active_branches[chatId] : 'main';
                        const allBranches = data.all_branches && data.all_branches[chatId] ? data.all_branches[chatId] : {};
                        const personality = data.personalities && data.personalities[chatId] ? data.personalities[chatId] : 'default';
                        var lastTime = 0;
                        if (messages && messages.length > 0) {
                            var lastMsg = messages[messages.length - 1];
                            if (lastMsg && lastMsg.timestamp) lastTime = new Date(lastMsg.timestamp).getTime();
                        }
                        if (!lastTime) lastTime = parseInt(chatId) || 0;
                        chats.push({ id: chatId, title: title, messages: messages, activeBranch: activeBranch, allBranches: allBranches, _personality: personality, lastMessageTime: lastTime });
                    }
                    chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
                }
            } catch (e) { console.error('loadChatsFromServer error:', e); }
            var savedId = localStorage.getItem('photobot_active_chat');
            var found = savedId ? chats.find(function(c) { return c.id === savedId; }) : null;
            currentChatId = found ? found.id : (chats.length > 0 ? chats[chats.length - 1].id : null);
            if (currentChatId) {
                localStorage.setItem('photobot_active_chat', currentChatId);
                var chat = chats.find(function(c) { return c.id === currentChatId; });
                if (chat) {
                    currentBranchId = chat.activeBranch || 'main';
                }
                await loadChatMessages(currentChatId);
            }
            if (chats.length === 0 || !currentChatId) {
                currentChatId = null;
                currentBranchId = 'main';
                localStorage.removeItem('photobot_active_chat');
                renderMessages();
            }
            renderChatList();
            hideLoading();
        }

        async function loadChatMessages(chatId) {
            try {
                const resp = await fetch(`${SERVER_URL}/get_chat_tree?user_id=${currentUserId}&model=pro&chat_id=${chatId}&session_token=${sessionToken}`);
                if (resp.ok) {
                    const data = await resp.json();
                    var chat = chats.find(function(c) { return c.id === chatId; });
                    if (chat) {
                        var branches = {};
                        if (data.branches) {
                            for (var bid in data.branches) {
                                var branchData = data.branches[bid];
                                var msgIds = branchData.msg_ids || branchData;
                                if (Array.isArray(branchData)) msgIds = branchData;
                                var msgs = [];
                                for (var i = 0; i < msgIds.length; i++) {
                                    if (data.messages[msgIds[i]]) msgs.push(data.messages[msgIds[i]]);
                                }
                                var bidName = branchData.name || (chat.allBranches && chat.allBranches[bid] ? chat.allBranches[bid].name : 'Ветка');
                                branches[bid] = { name: bidName, messages: msgs, msg_ids: msgIds, source_role: branchData.source_role || 'user' };
                            }
                        }
                        chat.allBranches = branches;
                        var activeBid = chat.activeBranch || 'main';

        async function createBranchFromMessage(msgIndex) {
            if (isSending) return;
            var chat = chats.find(function(c) { return c.id === currentChatId; });
            if (!chat) return;
            var msg = chat.messages[msgIndex];
            if (!msg) return;
            isSending = true;
            if (typingInterval) { clearTimeout(typingInterval); typingInterval = null; }
            sendBtnStop();
            chat.messages = chat.messages.slice(0, msgIndex + 1);
            renderMessages();
            var placeholderId = null;
            var isAssistantBranch = (msg.role === 'assistant');
            if (!isAssistantBranch) {
                placeholderId = 'branch_' + Date.now();
                var area = document.getElementById('chatArea');
                var loadingRow = document.createElement('div');
                loadingRow.className = 'message-row assistant';
                loadingRow.id = placeholderId;
                loadingRow.innerHTML = '<div><div class="message-content"><svg width="40" height="8" viewBox="0 0 40 8"><circle cx="4" cy="4" r="3" fill="#F59E0B"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle><circle cx="16" cy="4" r="3" fill="#F59E0B"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="28" cy="4" r="3" fill="#F59E0B"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle></svg></div></div>';
                area.appendChild(loadingRow);
                var main = document.querySelector('.main');
                if (main) { main.scrollTop = main.scrollHeight; }
            }
            try {
                var resp = await fetch(SERVER_URL + '/create_branch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({ user_id: currentUserId, model: 'pro', mode: currentMode, chat_id: currentChatId, source_msg_id: msg.msg_id, branch_name: '', prompt: msg.role === 'user' ? (msg.content || '') : '' })
                });
                if (placeholderId) { var el = document.getElementById(placeholderId); if (el) el.remove(); }
                if (!resp.ok) {
                    var errData = await resp.json().catch(() => ({}));
                    showAlertModal('Ошибка', errData.error || 'Неизвестная ошибка', '❌');
                    isSending = false;
                    sendBtnArrow();
                    return;
                }
                var contentType = resp.headers.get('content-type') || '';
                if (contentType.includes('text/event-stream')) {
                    var reader = resp.body.getReader();
                    var decoder = new TextDecoder();
                    var buffer = '';
                    var branchMetaReceived = false;
                    var assistantMsg = null;
                    var streamMsgIndex = null;
                    while (true) {
                        var readResult = await reader.read();
                        if (readResult.done) break;
                        buffer += decoder.decode(readResult.value, { stream: true });
                        var lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i];
                            if (!line.startsWith('data: ')) continue;
                            var dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') continue;
                            try {
                                var parsed = JSON.parse(dataStr);
                                if (!branchMetaReceived) {
                                    var newBranchId = parsed.branch_id;
                                    var branchMessages = parsed.messages || [];
                                    currentBranchId = newBranchId;
                                    chat.activeBranch = newBranchId;
                                    chat.messages = branchMessages.slice();
                                    // Присвоить msg_id из source_msg_id последнему user-сообщению
                                    if (parsed.source_msg_id) {
                                        for (var bm = chat.messages.length - 1; bm >= 0; bm--) {
                                            if (chat.messages[bm].role === 'user') {
                                                chat.messages[bm].msg_id = parsed.source_msg_id;
                                                break;
                                            }
                                        }
                                    }
                                    assistantMsg = { role: 'assistant', content: '', finished: false, _streaming: true, _reasoningBuffer: '', _fullBuffer: '', msg_id: null, _abortController: null };
                                    chat.messages.push(assistantMsg);
                                    streamMsgIndex = chat.messages.length - 1;
                                    var streamId = 'branch_stream_' + streamMsgIndex;
                                    activeStreamId = streamId;
                                    renderMessages();
                                    renderChatList();
                                    branchMetaReceived = true;
                                } else if (parsed.assistant_msg_id) {
                                    if (assistantMsg) {
                                        assistantMsg.msg_id = parsed.assistant_msg_id;
                                        assistantMsg.finished = true;
                                        assistantMsg._streaming = false;
                                    }
                                    if (parsed.source_msg_id && branchMessages.length > 0) {
                                        var lastUserMsg = branchMessages[branchMessages.length - 1];
                                        if (lastUserMsg && lastUserMsg.role === 'user') {
                                            lastUserMsg.msg_id = parsed.source_msg_id;
                                        }
                                    }
                                } else if (parsed.content !== undefined || parsed.reasoning !== undefined) {
                                    if (assistantMsg) {
                                        if (parsed.reasoning) {
                                            assistantMsg._reasoningBuffer = (assistantMsg._reasoningBuffer || '') + parsed.reasoning;
                                        }
                                        if (parsed.content) {
                                            assistantMsg._fullBuffer = (assistantMsg._fullBuffer || '') + parsed.content;
                                        }
                                        var reasoningText = assistantMsg._reasoningBuffer || '';
                                        var contentText = assistantMsg._fullBuffer || '';
                                        assistantMsg.content = contentText;
                                        var msgEl = document.getElementById('stream-' + streamMsgIndex);
                                        if (msgEl) {
                                            var reasoningBlock = reasoningText ? '<div class="reasoning-block">' + formatMessage(reasoningText) + '</div>' : '';
                                            msgEl.innerHTML = reasoningBlock + formatMessage(contentText);
                                            msgEl.querySelectorAll('pre code').forEach(function(block) { if (typeof hljs !== 'undefined') hljs.highlightElement(block); });
                                            setupFloatingCopyButtonsForMsg(msgEl);
                                            updateFloatingButtons();
                                        }
                                        if (autoScroll) {
                                            var main = document.querySelector('.main');
                                            if (main) { main.style.scrollBehavior = 'auto'; main.scrollTop = main.scrollHeight; main.style.scrollBehavior = 'smooth'; }
                                        }
                                    }
                                }
                            } catch (parseErr) {}
                        }
                    }
                    if (assistantMsg && !assistantMsg.finished) {
                        assistantMsg.finished = true;
                        assistantMsg._streaming = false;
                    }
                    if (assistantMsg && assistantMsg._fullBuffer) {
                        assistantMsg.content = assistantMsg._fullBuffer;
                    }
                    chat.lastMessageTime = Date.now();
                    chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
                    autoNameChat(chat);
                    await updateBranchesFromServer();
                    if (chat.allBranches && chat.allBranches[currentBranchId]) {
                        chat.messages = chat.allBranches[currentBranchId].messages || [];
                    }
                    renderMessages();
                    renderChatList();
                    renderBranchesPanel();
                    updateBalance();
                    isSending = false;
                    activeStreamId = null;
                    sendBtnArrow();
                } else {
                    var data = await resp.json();
                    if (data.success) {
                        currentBranchId = data.branch_id;
                        chat.activeBranch = data.branch_id;
                        await updateBranchesFromServer();
                        if (chat.allBranches && chat.allBranches[currentBranchId]) {
                            chat.messages = chat.allBranches[currentBranchId].messages || [];
                        }
                        renderMessages();
                        renderChatList();
                        renderBranchesPanel();
                        updateBalance();
                    } else {
                        showAlertModal('Ошибка', 'Не удалось создать ветку', '❌');
                    }
                    isSending = false;
                    activeStreamId = null;
                    sendBtnArrow();
                }
            } catch (e) {
                if (placeholderId) { var el2 = document.getElementById(placeholderId); if (el2) el2.remove(); }
                console.error('createBranchFromMessage error:', e);
                showAlertModal('Ошибка соединения', 'Проверьте подключение к интернету и попробуйте снова.', '❌');
                isSending = false;
                sendBtnArrow();
            }
        }

        async function regenerateUserMessage(msgIndex) {

            var msg = chat.messages[msgIndex];

                    chat.messages.push(assistantMsg);

        async function selfPlay(msgIndex, promptText) {
                if (isSending) return;

                var currentRole = 'assistant';

                chat.messages.push(currentMsg);
                var currentMsgIndex = chat.messages.length - 1;
                activeStreamId = 'selfplay_' + currentMsgIndex;
                var pending = '';
                renderMessages();

                function finishMsg() {
                    currentMsg.finished = true;
                    currentMsg._streaming = false;
                    currentMsg.content = currentMsg._fullBuffer || '';
                }
                function newMsg(role) {
                    finishMsg();
                    currentRole = role;
                    currentMsg = { role: role, content: '', finished: false, _streaming: true, _fullBuffer: '', msg_id: null };
                    chat.messages.push(currentMsg);
                    currentMsgIndex = chat.messages.length - 1;
                }

                function updateMsgDOM() {
                    var el = document.getElementById('stream-' + currentMsgIndex);
                    if (el) {

                        var main = document.querySelector('.main');
                        if (main) { main.style.scrollBehavior = 'auto'; main.scrollTop = main.scrollHeight; main.style.scrollBehavior = 'smooth'; }
                    }
                }

                function appendText(txt) {
                    currentMsg._fullBuffer += txt;
                    var display = currentMsg._fullBuffer;
                    var colonIdx = display.indexOf(':');
                    if (colonIdx > 0 && (display.substring(0, colonIdx).toUpperCase() === 'USER' || display.substring(0, colonIdx).toUpperCase() === 'ASSISTANT' || display.substring(0, colonIdx).toUpperCase() === 'U' || display.substring(0, colonIdx).toUpperCase() === 'A')) {
                        display = display.substring(colonIdx + 1).trim();
                    }
                    if (display.toUpperCase().startsWith('[КОНСЕНСУС]')) {
                        display = display.substring(11).trim();
                    }
                    currentMsg.content = display;
                    updateMsgDOM();
                }

                try {
                    const resp = await fetch(SERVER_URL + '/selfplay', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                        body: JSON.stringify({
                            user_id: currentUserId,
                            model: 'pro',
                            mode: currentMode,
                            chat_id: currentChatId,
                            branch_id: currentBranchId,
                            source_msg_id: msg.msg_id || '',
                            prompt: promptText
                        })
                    });
                    if (!resp.ok) {
                        var errData = await resp.json().catch(() => ({}));
                        showAlertModal('Ошибка Self-Play', errData.error || 'Неизвестная ошибка', '❌');
                        isSending = false; sendBtnArrow(); return;
                    }
                    var cType = resp.headers.get('content-type') || '';
                    if (!cType.includes('text/event-stream')) {
                        var errJson = await resp.json().catch(() => ({}));
                        showAlertModal('Ошибка', errJson.error || 'Неверный ответ', '❌');
                        isSending = false; sendBtnArrow(); return;
                    }
                    var reader = resp.body.getReader();
                    var decoder = new TextDecoder();
                    var buf = '';
                    while (true) {
                        var r = await reader.read();
                        if (r.done) break;
                        buf += decoder.decode(r.value, { stream: true });
                        var lines = buf.split('\n');
                        buf = lines.pop() || '';
                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i];
                            if (!line.startsWith('data: ')) continue;
                            var s = line.slice(6).trim();
                            if (s === '[DONE]') continue;
                            try {
                                var p = JSON.parse(s);
                                if (p.steps) {
                                    finishMsg();
                                    renderMessages();
                                    chat.lastMessageTime = Date.now();
                                    chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
                                    autoNameChat(chat);
                                    updateBranchesFromServer();
                                    updateBalance();
                                    isSending = false;
                                    activeStreamId = null;
                                    sendBtnArrow();
                                } else if (p.content !== undefined && p.content) {
                                    pending += p.content;
                                    while (pending.indexOf('\n') !== -1) {
                                        var nl = pending.indexOf('\n');
                                        var oneLine = pending.substring(0, nl);
                                        pending = pending.substring(nl + 1);
                                        var trimmed = oneLine.trim();
                                        if (!trimmed) { appendText('\n'); continue; }
                                        var up = trimmed.toUpperCase();
                                        if (up.startsWith('USER:') || up.startsWith('U:')) {
                                            newMsg('user');
                                            appendText(trimmed + '\n');
                                        } else if (up.startsWith('ASSISTANT:') || up.startsWith('A:')) {
                                            newMsg('assistant');
                                            appendText(trimmed + '\n');
                                        } else if (up.startsWith('[КОНСЕНСУС]')) {
                                            if (currentRole !== 'assistant') newMsg('assistant');
                                            appendText(trimmed);
                                        } else {
                                            appendText(trimmed + '\n');
                                        }
                                    }
                                    if (pending) {
                                        appendText(pending);
                                        pending = '';
                                    }
                                    renderMessages();
                                }
                            } catch(e) {}
                        }
                    }
                } catch(e) {
                    console.error('selfPlay error:', e);
                    showAlertModal('Ошибка соединения', 'Проверьте подключение к интернету.', '❌');
                    isSending = false; sendBtnArrow();
                }
        }

        async function sendMessage() {
            if (isSending) return;
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !pendingFile) return;

            }
            input.value = ''; input.style.height = 'auto'; input._init = false;
            isSending = true;
            if (typingInterval) { clearTimeout(typingInterval); typingInterval = null; }
            sendBtnStop();
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            var lastMsg = chat.messages[chat.messages.length - 1];
            if (lastMsg && lastMsg.role === 'assistant' && lastMsg.interrupted) {
                lastMsg.interrupted = false; lastMsg.finished = true;
            }
            let displayText = text || (pendingFile ? '[Файл: ' + pendingFile.name + ']' : '');
            chat.messages.push({ role: 'user', content: displayText });
            chat.lastMessageTime = Date.now();
            chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
            renderChatList();
            renderMessages();
            var assistantMsg = { role: 'assistant', content: '', finished: false, _streaming: true, _reasoningBuffer: '', _fullBuffer: '', msg_id: null, _abortController: null };
            chat.messages.push(assistantMsg);
            const msgIndex = chat.messages.length - 1;
            const streamId = 'stream_' + msgIndex;
            activeStreamId = streamId;
            renderMessages();

            const abortController = new AbortController();
            assistantMsg._abortController = abortController;

            try {
                const resp = await fetch(`${SERVER_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        message: text,
                        model: 'pro',
                        mode: currentMode,
                        chat_id: currentChatId,
                        branch_id: currentBranchId,
                        personality: (chat.messages.length === 1 ? currentPersonality : 'default'),
                        file_data: pendingFile ? pendingFile.data : '',
                        file_name: pendingFile ? pendingFile.name : '',
                        file_mime: pendingFile ? pendingFile.mime : ''
                    }),
                    signal: abortController.signal
                });

                if (resp.status === 403) {
                    chat.messages[msgIndex].content = 'Сессия устарела. Авторизуйтесь заново.';
                    chat.messages[msgIndex].finished = true;
                    renderMessages();
                    isSending = false; sendBtnArrow(); activeStreamId = null;

                    renderMessages();
                    updateBalance();
                    isSending = false; sendBtnArrow(); activeStreamId = null;
                    return;

                    chat.messages[msgIndex].content = 'Ошибка сервера.';
                    chat.messages[msgIndex].finished = true;
                    renderMessages();
                    isSending = false; sendBtnArrow(); activeStreamId = null;
                    return;
                }

                const contentType = resp.headers.get('content-type') || '';
                if (!contentType.includes('text/event-stream')) {
                    const err = await resp.json().catch(() => ({}));
                    chat.messages[msgIndex].content = err.error || 'Неизвестная ошибка сервера.';
                    chat.messages[msgIndex].finished = true;
                    renderMessages();
                    isSending = false; sendBtnArrow(); activeStreamId = null;
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let finalMeta = null;
                assistantMsg._fullBuffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {

                    }

        async function updateBranchesFromServer() {

                if (resp.ok) {

        function formatMessage(text) {
            var B = String.fromCharCode(96);
            if (/^\s*<(!DOCTYPE|html)/i.test(text)) { text = B + B + B + 'html\n' + text + '\n' + B + B + B; }
            let parts = [];
            let lastIndex = 0;
            const regex = new RegExp(B + B + B + '(\\w*)\\r?\\n([\\s\\S]*?)' + B + B + B, 'g');
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) parts.push({type: 'text', content: text.substring(lastIndex, match.index)});
                parts.push({type: 'code', lang: match[1], content: match[2]});
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
                var remaining = text.substring(lastIndex);
                var openCode = remaining.match(new RegExp('^([\\s\\S]*?)' + B + B + B + '(\\w*)\\r?\\n([\\s\\S]*)'));
                if (openCode) {
                    if (openCode[1]) parts.push({type: 'text', content: openCode[1]});
                    parts.push({type: 'code', lang: openCode[2], content: openCode[3]});
                } else { parts.push({type: 'text', content: remaining}); }
            }
            let result = '';
            for (const part of parts) {
                if (part.type === 'code') {
                    var lang = part.lang || '';
                    result += '<pre><code class="' + (lang ? 'language-' + escapeHtml(lang) : '') + '">' + escapeHtml(part.content) + '</code></pre>';
                } else {
                    var text2 = escapeHtml(part.content);
                    text2 = text2.replace(/`([^`]+)`/g, '<code>$1</code>');
                    text2 = text2.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    text2 = text2.replace(/\*(.+?)\*/g, '<em>$1</em>');
                    text2 = text2.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
                    text2 = text2.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                    text2 = text2.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
                    text2 = text2.replace(/^## (.+)$/gm, '<h2>$1</h2>');
                    text2 = text2.replace(/^# (.+)$/gm, '<h1>$1</h1>');
                    text2 = text2.replace(/^---$/gm, '<hr>');
                    text2 = text2.replace(/^[-*]\s(.+)$/gm, '<li>$1</li>');
                    text2 = text2.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');
                    text2 = text2.replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>');
                    text2 = text2.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ol>$1</ol>');
                    text2 = text2.replace(/~~(.+?)~~/g, '<del>$1</del>');
                    text2 = text2.replace(/!\[(.+?)\]\((.+?)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:8px 0;" loading="lazy">');
                    text2 = text2.replace(/^&gt;\s(.+)$/gm, '<blockquote>$1</blockquote>');
                    text2 = text2.replace(/\n/g, '<br>');
                    result += text2;
                }
            }
            return result;
        }

                textarea.value = originalCode;
                textarea.style.cssText = 'width:100%;min-height:200px;background:#0d0d1a;color:#e0e0e0;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:10px;font-family:\'Courier New\',monospace;font-size:13px;resize:vertical;outline:none;';
                if (document.body.classList.contains('light')) { textarea.style.background = '#ffffff'; textarea.style.color = '#111'; textarea.style.border = '1px solid rgba(0,0,0,0.15)'; }
                pre.appendChild(textarea);
                pre._textarea = textarea;
                pre._editorActive = true;
                toolbar.querySelector('.editor-apply-btn').onclick = function() { toggleCodeEditor(pre); };
                toolbar.querySelector('.editor-cancel-btn').onclick = function() { var orig = pre._originalCode || ''; codeEl.textContent = orig; toggleCodeEditor(pre); };
            }
        }

        function updateFloatingButtons() {
            document.querySelectorAll('.message-content pre').forEach(function(pre) {
                var header = pre._floatHeader;
                if (!header) return;
                var rect = pre.getBoundingClientRect();
                var topBar = document.querySelector('.top-bar');
                var topBarBottom = topBar ? topBar.getBoundingClientRect().bottom : 0;
                var visibleTop = Math.max(rect.top, topBarBottom);
                var visibleBottom = Math.min(rect.bottom, window.innerHeight);
                var visibleHeight = visibleBottom - visibleTop;
                var visible = visibleHeight >= 28;
                if (visible) {
                    header.style.display = 'flex';
                    var headerHeight = header.offsetHeight || 28;
                    var top = visibleTop;
                    var bottomLimit = rect.bottom - headerHeight;
                    if (top > bottomLimit) top = bottomLimit;
                    if (top < topBarBottom) top = topBarBottom;
                    header.style.top = top + 'px';
                    header.style.left = rect.left + 'px';
                    header.style.right = 'auto';
                    header.style.width = rect.width + 'px';
                } else { header.style.display = 'none'; }
            });
        }

        function buildNavContainer() {
            var container = document.getElementById('navContainer');
            if (!container) return;
            var chat = chats.find(c => c.id === currentChatId);
            if (!chat || chat.messages.length === 0) { container.innerHTML = ''; return; }
            var html = '';
            for (var i = 0; i < chat.messages.length; i++) {
                if (chat.messages[i].role === 'user' && chat.messages[i].content) {
                    var preview = chat.messages[i].content.substring(0, 80);
                    html += '<div class="nav-strip" data-msg-index="' + i + '" onclick="scrollToMsg(' + i + ')"><div class="nav-bar"></div><span class="nav-text">' + escapeHtml(preview) + '</span></div>';
                }
            }
            container.innerHTML = html;
        }

        function updateActiveNavFromScroll() {
            var main = document.querySelector('.main');
            if (!main) return;
            var rows = main.querySelectorAll('.message-row[data-msg-index]');
            var areaRect = main.getBoundingClientRect();
            var closestIndex = null; var closestDist = Infinity;
            for (var r = 0; r < rows.length; r++) {
                var rect = rows[r].getBoundingClientRect();
                var mid = rect.top + rect.height / 2;
                var dist = Math.abs(mid - (areaRect.top + areaRect.height / 2));
                if (dist < closestDist) { closestDist = dist; closestIndex = rows[r].getAttribute('data-msg-index'); }
            }
            document.querySelectorAll('.nav-strip').forEach(function(s) { s.classList.remove('active'); });
            if (closestIndex !== null) {
                var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + closestIndex + '"]');
                if (activeStrip) { activeStrip.classList.add('active'); var container = document.getElementById('navContainer'); if (container) { var stripTop = activeStrip.offsetTop; var containerH = container.clientHeight; container.scrollTo({ top: stripTop - containerH / 2 + activeStrip.offsetHeight / 2, behavior: 'smooth' }); } }
            }
        }

        var mainEl2 = document.querySelector('.main');
        if (mainEl2) mainEl2.addEventListener('scroll', updateActiveNavFromScroll);
        document.getElementById('navContainer').addEventListener('wheel', function(e) { e.stopPropagation(); });

        function scrollToMsg(index) {
            var main = document.querySelector('.main');
            if (!main) return;
            main.style.scrollBehavior = 'auto';
            var target = main.querySelector('.message-row[data-msg-index="' + index + '"]');
            if (target) target.scrollIntoView({ behavior: 'auto', block: 'center' });
            main.style.scrollBehavior = 'smooth';
            document.querySelectorAll('.nav-strip').forEach(function(s) { s.classList.remove('active'); });
            var activeStrip = document.querySelector('.nav-strip[data-msg-index="' + index + '"]');
            if (activeStrip) activeStrip.classList.add('active');
        }

        function closePreview() {
            var panel = document.getElementById('previewPanel');
            var handle = document.getElementById('resizeHandle');
            if (panel) panel.classList.remove('active');
            if (handle) handle.classList.remove('active');
            document.querySelector('.main').classList.remove('preview-open');
            var main = document.querySelector('.main');
            if (main) { var rafId; var tick = function() { updateFloatingButtons(); rafId = requestAnimationFrame(tick); }; rafId = requestAnimationFrame(tick); main.addEventListener('transitionend', function() { cancelAnimationFrame(rafId); updateFloatingButtons(); }, { once: true }); }
        }

        window.addEventListener('load', function() { setupFloatingCopyButtons(); });
        window.addEventListener('scroll', updateFloatingButtons, true);
        window.addEventListener('resize', updateFloatingButtons);

        function showConfirmModal(title, message, icon, confirmText, cancelText, confirmClass, onConfirm) {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalIcon').textContent = icon || '⚠️';
            document.getElementById('modalIcon').className = 'modal-icon ' + (icon === '❌' ? 'error' : icon === '✅' ? 'success' : icon === 'ℹ️' ? 'info' : 'warning');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            var actions = document.getElementById('modalActions');
            actions.innerHTML = '';
            var cancelBtn = document.createElement('button');
            cancelBtn.className = 'modal-btn-secondary';
            cancelBtn.textContent = cancelText || 'Отмена';
            cancelBtn.onclick = function() { document.getElementById('modalOverlay').classList.remove('active'); };
            actions.appendChild(cancelBtn);
            var confirmBtn = document.createElement('button');
            confirmBtn.className = confirmClass || 'modal-btn-primary';
            confirmBtn.textContent = confirmText || 'Да';
            confirmBtn.onclick = function() { document.getElementById('modalOverlay').classList.remove('active'); if (onConfirm) onConfirm(); };
            actions.appendChild(confirmBtn);
        }

        function showAlertModal(title, message, icon) {
            document.getElementById('alertModalIcon').textContent = icon || 'ℹ️';
            document.getElementById('alertModalIcon').className = 'modal-icon ' + (icon === '❌' ? 'error' : icon === '✅' ? 'success' : icon === '⚠️' ? 'warning' : 'info');
            document.getElementById('alertModalTitle').textContent = title;
            document.getElementById('alertModalMessage').textContent = message;
            document.getElementById('alertModalOverlay').classList.add('active');
        }

        function closeAlertModal() { document.getElementById('alertModalOverlay').classList.remove('active'); }

        document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
        document.getElementById('alertModalOverlay').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { document.getElementById('modalOverlay').classList.remove('active'); document.getElementById('alertModalOverlay').classList.remove('active'); } });

        // Rename modal
        var renameCallback = null;
        function showRenameModal(title, currentName, callback) {
            document.getElementById('renameModalTitle').textContent = title;
            document.getElementById('renameInput').value = currentName;
            renameCallback = callback;
            document.getElementById('renameModal').classList.add('active');
            setTimeout(function() { document.getElementById('renameInput').focus(); document.getElementById('renameInput').select(); }, 100);
        }
        function closeRenameModal() { document.getElementById('renameModal').classList.remove('active'); renameCallback = null; }
        function confirmRename() { var value = document.getElementById('renameInput').value.trim(); if (value && renameCallback) { renameCallback(value); } closeRenameModal(); }
        document.getElementById('renameInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); confirmRename(); } if (e.key === 'Escape') { closeRenameModal(); } });
        document.getElementById('renameModal').addEventListener('click', function(e) { if (e.target === this) closeRenameModal(); });

        function updateBranchIndicator() {
            var el = document.getElementById('branchIndicatorTop');
            var chat = chats.find(function(c) { return c.id === currentChatId; });
            var branchName = '';
            if (chat && chat.allBranches && chat.allBranches[currentBranchId]) { branchName = chat.allBranches[currentBranchId].name || ''; }
            if (currentBranchId && currentBranchId !== 'main' && branchName && branchName !== 'Основная') { el.textContent = '🌿 ' + branchName; el.style.display = 'inline'; }
            else { el.style.display = 'none'; }
        }

        function showLoading() { document.getElementById('loadingSpinner').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loadingSpinner').style.display = 'none'; }

        // Copy history modal
        document.getElementById('copyHistoryModal')?.addEventListener('click', function(e) { if (e.target === this) closeCopyHistoryModal(); });
        document.getElementById('copyHistoryConfirmBtn')?.addEventListener('click', confirmCopyHistory);
        document.querySelector('#copyHistoryModal .modal-btn-secondary')?.addEventListener('click', closeCopyHistoryModal);
    </script>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon" id="modalIcon">⚠️</div>
            <div class="modal-title" id="modalTitle">Подтверждение</div>
            <div class="modal-message" id="modalMessage">Вы уверены?</div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <div id="alertModalOverlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon" id="alertModalIcon">ℹ️</div>
            <div class="modal-title" id="alertModalTitle">Уведомление</div>
            <div class="modal-message" id="alertModalMessage">Сообщение</div>
            <div class="modal-actions">
                <button class="modal-btn-primary" onclick="closeAlertModal()">OK</button>
            </div>
        </div>
    </div>

    <div id="copyHistoryModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon" style="background:rgba(255,165,0,0.15);color:#FFA500;">📋</div>
            <div class="modal-title" style="margin-bottom:16px;">Перенос истории</div>
            <div style="margin-bottom:20px;">
                <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;font-family:Inter,sans-serif;font-weight:500;">ВЕТКА-ПРИЁМНИК</label>
                <div style="position:relative;">
                    <select id="copyBranchSelect" style="width:100%;padding:12px 40px 12px 14px;background:#0d0d1a;color:#e0e0e0;border:2px solid rgba(255,255,255,0.1);border-radius:12px;font-size:14px;font-family:Inter,sans-serif;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;-moz-appearance:none;transition:all 0.2s ease;font-weight:500;">
                    </select>
                    <svg style="position:absolute;right:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;pointer-events:none;opacity:0.5;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
            </div>
            <div class="modal-actions" style="gap:12px;">
                <button class="modal-btn-secondary" onclick="closeCopyHistoryModal()" style="flex:1;padding:12px;">Отмена</button>
                <button id="copyHistoryConfirmBtn" onclick="confirmCopyHistory()" style="flex:1;padding:12px;background:linear-gradient(90deg,#FFA500,#FF8C00);border:none;color:#201F28;border-radius:12px;cursor:pointer;font-family:Inter,sans-serif;font-size:14px;font-weight:600;transition:all 0.2s ease;">Перенести</button>
            </div>
        </div>
    </div>

    <div id="editMessageModal" class="modal-overlay">
        <div class="modal-box" style="max-width:600px;padding:0;background:transparent;border:none;box-shadow:none;">
            <div style="width:100%;background:#1a1a2e;border:2px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
                <div style="display:flex;gap:8px;align-items:flex-end;width:100%;padding:8px 12px 0 12px;">
                    <textarea id="editMessageInput" style="flex:1;padding:0;border-radius:0;border:none;background:transparent;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Helvetica Neue',Arial,sans-serif;font-size:15px;outline:none;resize:none;min-height:48px;max-height:300px;overflow-y:auto;min-width:0;width:100%;line-height:1.5;" placeholder="Введите сообщение..."></textarea>
                </div>
                <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;justify-content:flex-end;">
                    <button onclick="closeEditMessageModal()" style="padding:6px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:#a0a0b0;border-radius:16px;cursor:pointer;font-family:Inter,sans-serif;font-size:12px;font-weight:500;transition:0.3s ease;">Отмена</button>
                    <button id="editMessageConfirmBtn" onclick="confirmEditMessage()" style="padding:6px 16px;background:linear-gradient(90deg,#F59E0B,#FBBF24);border:2px solid transparent;color:#201F28;border-radius:16px;cursor:pointer;font-family:Inter,sans-serif;font-size:12px;font-weight:600;transition:0.3s ease;box-shadow:0 4px 16px rgba(245,158,11,0.3);">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Edit message modal
        var editMessageCallback = null;
        function showEditMessageModal(currentText, callback) {
            var input = document.getElementById('editMessageInput');
            input.value = currentText;
            editMessageCallback = callback;
            document.getElementById('editMessageModal').classList.add('active');
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 300) + 'px';
            setTimeout(function() { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }, 100);
        }
        function closeEditMessageModal() { document.getElementById('editMessageModal').classList.remove('active'); editMessageCallback = null; }
        function confirmEditMessage() { var value = document.getElementById('editMessageInput').value.trim(); if (value && editMessageCallback) { editMessageCallback(value); } closeEditMessageModal(); }
        document.getElementById('editMessageInput').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 300) + 'px'; });
        document.getElementById('editMessageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.shiftKey) {
                return;
            }
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                confirmEditMessage();
            }
            if (e.key === 'Escape') {
                closeEditMessageModal();
            }
        });
        document.getElementById('editMessageModal').addEventListener('click', function(e) { if (e.target === this) closeEditMessageModal(); });

        var chatAreaObserver = new MutationObserver(function() { setupFloatingCopyButtons(); updateFloatingButtons(); });
        window.addEventListener('load', function() {
            var main = document.querySelector('.main');
            if (main) chatAreaObserver.observe(main, { childList: true, subtree: true });
            setupFloatingCopyButtons();
            updateFloatingButtons();
        });
    </script>
    <div id="selfPlayModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon" style="background:rgba(245,158,11,0.15);color:#F59E0B;">🧠</div>
            <div class="modal-title" style="margin-bottom:16px;">Self-Play Диалог</div>
            <div style="margin-bottom:20px;">
                <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;font-family:Inter,sans-serif;font-weight:500;">СУТЬ ДИАЛОГА</label>
                <textarea id="selfPlayPrompt" style="width:100%;padding:12px 14px;background:#0d0d1a;color:#e0e0e0;border:2px solid rgba(255,255,255,0.1);border-radius:12px;font-size:14px;font-family:Inter,sans-serif;outline:none;resize:none;min-height:80px;transition:all 0.2s ease;" placeholder="Что нужно решить? Например: выбрать БД для highload, сравнить Python vs Go..."></textarea>
            </div>
            <div class="modal-actions" style="gap:12px;">
                <button class="modal-btn-secondary" onclick="closeSelfPlayModal()" style="flex:1;padding:12px;">Отмена</button>
                <button id="selfPlayConfirmBtn" class="modal-btn-primary" onclick="confirmSelfPlay()" style="flex:1;padding:12px;">Запустить</button>
            </div>
        </div>
    </div>
</body>
</html>
